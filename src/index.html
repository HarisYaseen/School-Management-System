<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        prime: '#1e293b',
                        accent: '#fb7185',
                    },
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">

    <!-- Sidebar -->
    <aside class="w-24 hover:w-72 bg-prime text-white flex flex-col shadow-2xl relative z-20 transition-all duration-300 ease-in-out group/sidebar">
        <div class="h-24 flex items-center px-7 overflow-hidden">
            <div class="flex items-center gap-4">
                <div class="flex-shrink-0 w-11 h-11 rounded-xl bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-graduation-cap text-white text-xl"></i>
                </div>
                <h1 class="text-xl font-black tracking-widest uppercase text-white/90 opacity-0 group-hover/sidebar:opacity-100 transition-opacity duration-300 whitespace-nowrap">Galaxy <span class="text-accent underline decoration-2 underline-offset-4">ERP</span></h1>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-4 py-4 space-y-2 overflow-y-auto sidebar-scroll overflow-x-hidden">
            <a href="#" class="nav-item flex items-center gap-4 px-4 py-3.5 bg-white text-prime shadow-lg rounded-2xl transition-all duration-300 group" data-page="dashboard">
                <i class="fa-solid fa-grip-vertical flex-shrink-0 w-6 text-center text-lg text-prime"></i>
                <span class="font-extrabold text-[15px] opacity-0 group-hover/sidebar:opacity-100 transition-opacity duration-300 whitespace-nowrap">Dashboard</span>
            </a>
            
            <a href="#" class="nav-item flex items-center gap-4 px-4 py-3.5 text-white hover:bg-white/10 rounded-2xl transition-all duration-300 group" data-page="students">
                <i class="fa-solid fa-user-graduate flex-shrink-0 w-6 text-center text-lg text-white/60 group-hover:text-white"></i>
                <span class="font-extrabold text-[15px] opacity-0 group-hover/sidebar:opacity-100 transition-opacity duration-300 whitespace-nowrap">Students</span>
            </a>

            <a href="#" class="nav-item flex items-center gap-4 px-4 py-3.5 text-white hover:bg-white/10 rounded-2xl transition-all duration-300 group" data-page="teachers">
                <i class="fa-solid fa-chalkboard-user flex-shrink-0 w-6 text-center text-lg text-white/60 group-hover:text-white"></i>
                <span class="font-extrabold text-[15px] opacity-0 group-hover/sidebar:opacity-100 transition-opacity duration-300 whitespace-nowrap">Teachers</span>
            </a>

            <a href="#" class="nav-item flex items-center gap-4 px-4 py-3.5 text-white hover:bg-white/10 rounded-2xl transition-all duration-300 group" data-page="attendance">
                <i class="fa-solid fa-calendar-check flex-shrink-0 w-6 text-center text-lg text-white/60 group-hover:text-white"></i>
                <span class="font-extrabold text-[15px] opacity-0 group-hover/sidebar:opacity-100 transition-opacity duration-300 whitespace-nowrap">Attendance</span>
            </a>
            
            <!-- More items can be added here -->
        </nav>

        <!-- Profile/Logout -->
        <div class="px-4 py-8 space-y-1.5 border-t border-white/5">
            <a href="#" class="flex items-center gap-4 px-4 py-3.5 text-white hover:bg-white/10 rounded-2xl transition-all duration-300 group">
                <i class="fa-solid fa-gear flex-shrink-0 w-6 text-center text-lg text-white/60 group-hover:text-white"></i>
                <span class="font-extrabold text-[15px] opacity-0 group-hover/sidebar:opacity-100 transition-opacity duration-300 whitespace-nowrap">Settings</span>
            </a>
            <div class="flex items-center gap-4 px-4 py-3.5 text-white hover:bg-rose-500/20 hover:text-rose-400 rounded-2xl transition-all duration-300 group cursor-pointer">
                <i class="fa-solid fa-arrow-right-from-bracket flex-shrink-0 w-6 text-center text-lg text-white/50 group-hover:text-rose-400"></i>
                <span class="font-extrabold text-[15px] opacity-0 group-hover/sidebar:opacity-100 transition-opacity duration-300 whitespace-nowrap">Logout</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <!-- Topbar -->
        <header class="h-24 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-10 z-10 w-full">
            <div class="flex items-center gap-8">
                <h2 class="text-2xl font-black text-slate-800" id="page-title">Dashboard</h2>
                
                <!-- Search Bar -->
                <div class="relative w-96 group">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <i class="fa-solid fa-search text-slate-300 group-focus-within:text-prime transition-colors"></i>
                    </div>
                    <input type="text" class="bg-slate-50 text-slate-600 text-sm rounded-xl block w-full pl-11 p-3.5 outline-none font-bold placeholder:font-medium border border-transparent focus:border-slate-200" placeholder="Search for students/teachers/documents...">
                </div>
            </div>

            <div class="flex items-center gap-8">
                <button class="relative w-10 h-10 rounded-xl bg-slate-50 text-slate-400 hover:text-prime hover:bg-slate-100 transition-all flex items-center justify-center">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <div class="absolute top-2.5 right-2.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-white"></div>
                </button>
                
                <div class="flex items-center gap-3 cursor-pointer group">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-bold text-slate-700 leading-tight">Admin User</p>
                        <p class="text-[11px] text-slate-400 font-medium">Principal</p>
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-prime overflow-hidden shadow-lg group-hover:scale-105 transition-transform">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=334155&color=fff&bold=true" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>
        </header>

        <!-- Dynamic Content -->
        <div id="app-content" class="flex-1 overflow-auto bg-[#F8FAFC] p-10 w-full">
            <!-- Dashboard Content -->
            <div id="dashboard-view" class="max-w-[1600px] mx-auto space-y-10">
                <!-- Stats Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8" id="stats-container">
                    <!-- Stat cards will be injected here -->
                    <div class="animate-pulse bg-white p-8 rounded-[2rem] h-32"></div>
                    <div class="animate-pulse bg-white p-8 rounded-[2rem] h-32"></div>
                    <div class="animate-pulse bg-white p-8 rounded-[2rem] h-32"></div>
                    <div class="animate-pulse bg-white p-8 rounded-[2rem] h-32"></div>
                </div>

                <!-- Main Section -->
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                    <div class="lg:col-span-8 space-y-10">
                        <!-- Chart -->
                        <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-50">
                            <h3 class="text-xl font-black text-slate-800 mb-10">Monthly Revenue Graph</h3>
                            <div class="h-80 w-full flex items-end justify-between gap-4 px-2" id="revenue-chart">
                                <!-- Bars will be injected here -->
                            </div>
                        </div>

                        <!-- Widgets Row -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                            <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-50">
                                <h3 class="text-xl font-black text-slate-800 mb-8">Recent Admissions</h3>
                                <div class="space-y-6" id="recent-admissions">
                                    <!-- Students will be injected here -->
                                </div>
                            </div>

                            <div class="bg-prime p-10 rounded-[3rem] shadow-2xl shadow-prime/30 flex flex-col justify-between relative overflow-hidden group">
                                <div>
                                    <p class="text-[10px] font-black text-white/50 uppercase tracking-[0.2em] mb-2">Real-time Outstanding</p>
                                    <h4 class="text-4xl font-black text-white tracking-tight" id="pending-fees">Rs. 0</h4>
                                </div>
                                <div class="mt-10">
                                    <div class="flex justify-between mb-2">
                                         <span class="text-[11px] font-black text-white/60 uppercase">Collection Efficiency</span>
                                         <span class="text-[11px] font-black text-white">74%</span>
                                    </div>
                                    <div class="w-full h-2 bg-white/10 rounded-full overflow-hidden">
                                        <div class="h-full bg-amber-400 rounded-full" style="width: 74%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column -->
                    <div class="lg:col-span-4 space-y-10">
                        <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-50">
                            <h3 class="text-xl font-black text-slate-800 mb-8">Events Calendar</h3>
                            <div class="space-y-8" id="events-list">
                                <!-- Mock events -->
                                <div class="flex gap-4">
                                    <div class="w-3 h-3 rounded-full bg-indigo-500 mt-2"></div>
                                    <div>
                                        <p class="text-xs font-bold text-slate-400 mb-1">08 Jan, 2024</p>
                                        <h4 class="font-bold text-slate-800">Annual Function</h4>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="renderer.js"></script>
</body>
</html>
