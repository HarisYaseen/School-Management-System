<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Student Biodata</title>
    <script src="tailwind.js"></script>
    <script src="fa.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1400px] mx-auto space-y-8">

                <!-- Search Bar -->
                <div class="flex items-center gap-4">
                    <div class="relative flex-1 max-w-xl group">
                        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-prime transition-colors"></i>
                        <input type="text" id="bio-search" oninput="handleBioSearch(this.value)"
                            placeholder="Quick switch student (Name or Roll No)..."
                            class="w-full pl-14 pr-6 py-4 rounded-2xl bg-white border-2 border-slate-100 focus:border-prime text-sm font-bold shadow-sm transition-all outline-none">
                        <div id="bio-search-results" class="absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl shadow-2xl border border-slate-100 z-50 hidden max-h-80 overflow-y-auto"></div>
                    </div>
                    <button onclick="window.location.href='students.html'" class="px-6 py-4 bg-white border-2 border-slate-100 rounded-2xl text-slate-500 font-bold text-sm hover:bg-slate-50 transition-all flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i> Back to Students
                    </button>
                </div>

                <!-- Main Content -->
                <div id="biodata-content">
                    <div class="flex items-center justify-center h-64">
                        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-prime/20"></i>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-sm">
            <h3 class="text-xl font-black text-slate-800 mb-6">Upload Document</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Document Title</label>
                    <input type="text" id="doc-title-input" class="premium-input bg-slate-50 w-full px-4 py-3 rounded-xl text-sm font-bold" placeholder="e.g., Birth Certificate">
                </div>
                <div class="flex gap-3">
                    <button onclick="executeUpload()" class="flex-1 bg-prime text-white py-3 rounded-xl font-black text-sm">Select File & Upload</button>
                    <button onclick="closeModal('upload-modal')" class="px-6 py-3 rounded-xl border-2 border-slate-100 text-slate-400 font-bold text-sm">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('students');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Student Biodata');

        const urlParams = new URLSearchParams(window.location.search);
        let currentStudentId = urlParams.get('id');

        const fmt = (d) => d ? new Date(d).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }) : '—';

        // ── LOAD ──────────────────────────────────────────────
        async function load(id) {
            const sid = id || currentStudentId;
            if (!sid) {
                document.getElementById('biodata-content').innerHTML =
                    '<div class="text-center py-20 text-slate-400 font-bold">Use the search bar above to find a student.</div>';
                return;
            }
            document.getElementById('biodata-content').innerHTML =
                '<div class="flex items-center justify-center h-64"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-prime/20"></i></div>';
            try {
                const data = await window.api.getStudentBiodata(parseInt(sid));
                if (!data || data.error || !data.student) {
                    document.getElementById('biodata-content').innerHTML = `
                        <div class="text-center py-20 space-y-3">
                            <i class="fa-solid fa-user-slash text-5xl text-rose-300"></i>
                            <h3 class="text-xl font-black text-slate-700">Student Not Found</h3>
                            <p class="text-slate-400 text-sm">${data?.error || 'ID: ' + sid}</p>
                            <button onclick="window.location.href='students.html'" class="px-6 py-2 bg-prime text-white rounded-xl font-bold text-sm">Back to Students</button>
                        </div>`;
                    return;
                }
                currentStudentId = sid;
                renderBiodata(data);
            } catch(e) {
                document.getElementById('biodata-content').innerHTML =
                    `<div class="text-center py-20 text-rose-500 font-bold">Error: ${e.message}</div>`;
            }
        }

        // ── RENDER ────────────────────────────────────────────
        function renderBiodata(data) {
            const s = data.student;
            const picUrl = s.picture ? `http://app.sms/pictures/${s.picture.replace('pictures/','')}` : null;
            const avatar = picUrl
                ? `<img src="${picUrl}" class="w-full h-full object-cover rounded-[2rem]">`
                : `<div class="w-full h-full flex items-center justify-center bg-slate-100 text-slate-300 text-5xl font-black">${s.name.charAt(0)}</div>`;

            const siblingsHtml = data.siblings.length
                ? data.siblings.map(sib => `
                    <div onclick="load(${sib.id})" class="flex items-center justify-between p-3 bg-slate-50 rounded-2xl hover:bg-slate-100 cursor-pointer transition-all">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-prime text-white flex items-center justify-center font-black text-xs">${sib.name.charAt(0)}</div>
                            <div>
                                <p class="text-xs font-bold text-slate-700">${sib.name}</p>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">${sib.class_name||''}</p>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-[10px] text-slate-300"></i>
                    </div>`).join('')
                : '<p class="text-xs text-slate-400 italic text-center py-4">No siblings found.</p>';

            const ledgerHtml = data.ledger.length
                ? data.ledger.map(f => `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="px-6 py-3 text-xs font-bold text-slate-500">${fmt(f.created_at)}</td>
                        <td class="px-6 py-3 text-xs font-bold text-slate-700">${f.description||f.type||'—'}</td>
                        <td class="px-6 py-3 text-xs font-bold text-rose-600">${f.debit>0 ? formatCurrency(f.debit) : '—'}</td>
                        <td class="px-6 py-3 text-xs font-bold text-emerald-600">${f.credit>0 ? formatCurrency(f.credit) : '—'}</td>
                        <td class="px-6 py-3"><span class="px-2 py-0.5 rounded-lg text-[9px] font-black uppercase ${f.status==='paid'?'bg-emerald-50 text-emerald-600':'bg-rose-50 text-rose-600'}">${f.status}</span></td>
                    </tr>`).join('')
                : '<tr><td colspan="5" class="px-6 py-8 text-center text-slate-400 italic text-xs">No transactions found.</td></tr>';

            const grouped = {};
            (data.examResults||[]).forEach(r => { if(!grouped[r.exam_name]) grouped[r.exam_name]=[]; grouped[r.exam_name].push(r); });
            const examsHtml = Object.keys(grouped).length
                ? Object.keys(grouped).map((name,i) => {
                    const results = grouped[name];
                    const avg = Math.round(results.reduce((a,r)=>a+r.percentage,0)/results.length);
                    return `<div class="border-b border-slate-50 last:border-0">
                        <button onclick="toggleAccordion('exam-${i}')" class="w-full px-6 py-4 flex items-center justify-between hover:bg-slate-50 text-left transition-all">
                            <div>
                                <p class="text-sm font-black text-slate-800">${name}</p>
                                <p class="text-[10px] font-bold text-slate-400">${results.length} subjects</p>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="text-xs font-black ${avg>=40?'text-emerald-600':'text-rose-600'}">${avg}%</span>
                                <i class="fa-solid fa-chevron-down text-slate-300 transition-transform" id="icon-exam-${i}"></i>
                            </div>
                        </button>
                        <div id="exam-${i}" class="hidden px-6 pb-4 bg-slate-50/50">
                            <table class="w-full text-xs"><thead><tr class="text-[9px] font-black text-slate-400 uppercase">
                                <th class="py-2 text-left">Subject</th><th class="py-2 text-center">Marks</th><th class="py-2 text-right">%</th>
                            </tr></thead><tbody>${results.map(r=>`<tr class="border-t border-slate-100">
                                <td class="py-2 font-bold text-slate-700">${r.subject_name}</td>
                                <td class="py-2 text-center text-slate-600">${r.obtained_marks}/${r.total_marks}</td>
                                <td class="py-2 text-right font-black ${r.percentage>=40?'text-emerald-600':'text-rose-600'}">${r.percentage}%</td>
                            </tr>`).join('')}</tbody></table>
                        </div>
                    </div>`;
                }).join('')
                : '<div class="p-8 text-center text-slate-400 italic text-sm">No exam records found.</div>';

            document.getElementById('biodata-content').innerHTML = `
            <div class="grid grid-cols-12 gap-8">
                <!-- LEFT -->
                <div class="col-span-12 lg:col-span-4 space-y-6">
                    <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 p-8 text-center">
                        <div class="w-36 h-36 rounded-[2rem] bg-prime/5 mx-auto mb-5 p-1.5 ring-4 ring-white shadow-xl overflow-hidden">${avatar}</div>
                        <h2 class="text-2xl font-black text-slate-800">${s.name}</h2>
                        <p class="text-prime font-black text-xs uppercase tracking-widest mt-1">Roll No: ${s.roll_no}</p>
                        <div class="mt-3 inline-flex items-center gap-2 px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-black uppercase border border-emerald-100">
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>${s.status||'Active'}
                        </div>
                        <div class="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-slate-50 text-left">
                            <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Class</p><p class="text-sm font-bold text-slate-700">${s.class_name||'N/A'}</p></div>
                            <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Gender</p><p class="text-sm font-bold text-slate-700">${s.gender||'—'}</p></div>
                            <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Blood Group</p><p class="text-sm font-bold text-slate-700">${s.blood_group||'—'}</p></div>
                            <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Religion</p><p class="text-sm font-bold text-slate-700">${s.religion||'Islam'}</p></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 p-8">
                        <h3 class="text-xs font-black text-slate-600 uppercase tracking-widest mb-5 flex items-center gap-2"><i class="fa-solid fa-address-book text-prime/40"></i>Contact</h3>
                        <div class="space-y-4">
                            <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Guardian</p><p class="text-sm font-bold text-slate-700">${s.guardian_name||'—'}</p></div>
                            <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Phone</p><p class="text-sm font-bold text-slate-700">${s.contact_number||'—'}</p></div>
                            <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Address</p><p class="text-sm font-bold text-slate-700">${s.address||'—'}</p></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 p-8">
                        <h3 class="text-xs font-black text-slate-600 uppercase tracking-widest mb-5 flex items-center justify-between">
                            <span class="flex items-center gap-2"><i class="fa-solid fa-people-group text-prime/40"></i>Siblings</span>
                            <span class="bg-slate-100 text-slate-500 text-[10px] px-2 py-0.5 rounded-full">${data.siblings.length}</span>
                        </h3>
                        <div class="space-y-2">${siblingsHtml}</div>
                    </div>
                </div>

                <!-- RIGHT -->
                <div class="col-span-12 lg:col-span-8 space-y-8">
                    <div class="grid grid-cols-3 gap-5">
                        <div class="bg-prime rounded-[2rem] p-6 text-white shadow-xl shadow-prime/20 relative overflow-hidden">
                            <i class="fa-solid fa-calendar-check absolute -right-3 -bottom-3 text-6xl text-white/10"></i>
                            <p class="text-[10px] font-black text-white/50 uppercase tracking-widest mb-1">Attendance</p>
                            <h4 class="text-4xl font-black">${data.attPct}%</h4>
                            <p class="text-[10px] font-bold text-white/60 mt-1">${data.attPresent} / ${data.attTotal} days</p>
                        </div>
                        <div class="bg-white rounded-[2rem] p-6 border-2 border-emerald-100 shadow-sm relative overflow-hidden">
                            <i class="fa-solid fa-wallet absolute -right-3 -bottom-3 text-6xl text-emerald-500/10"></i>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Monthly Fee</p>
                            <h4 class="text-2xl font-black text-slate-800">${formatCurrency(s.monthly_fee||0)}</h4>
                            <p class="text-[10px] font-bold text-emerald-600 mt-1">Concession: ${formatCurrency(s.concession||0)}</p>
                        </div>
                        <div class="bg-white rounded-[2rem] p-6 border-2 ${data.balance>0?'border-rose-100':'border-emerald-100'} shadow-sm relative overflow-hidden">
                            <i class="fa-solid fa-file-invoice-dollar absolute -right-3 -bottom-3 text-6xl ${data.balance>0?'text-rose-500/10':'text-emerald-500/10'}"></i>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Balance Due</p>
                            <h4 class="text-2xl font-black ${data.balance>0?'text-rose-600':'text-emerald-600'}">${formatCurrency(data.balance)}</h4>
                            <p class="text-[10px] font-bold text-slate-400 mt-1">Paid: ${formatCurrency(data.totalCredit)}</p>
                        </div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 overflow-hidden">
                        <div class="px-8 py-5 border-b border-slate-50 bg-slate-50/30">
                            <h3 class="text-xs font-black text-slate-600 uppercase tracking-widest flex items-center gap-2"><i class="fa-solid fa-graduation-cap text-prime/40"></i>Academic Performance</h3>
                        </div>
                        <div>${examsHtml}</div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 overflow-hidden">
                        <div class="px-8 py-5 border-b border-slate-50 flex items-center justify-between">
                            <h3 class="text-xs font-black text-slate-600 uppercase tracking-widest flex items-center gap-2"><i class="fa-solid fa-receipt text-prime/40"></i>Fee Ledger</h3>
                            <button onclick="window.location.href='fees.html'" class="text-[10px] font-black text-prime uppercase hover:underline">View All</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-slate-50"><tr>
                                    <th class="px-6 py-3 text-left text-[10px] font-black text-slate-400 uppercase">Date</th>
                                    <th class="px-6 py-3 text-left text-[10px] font-black text-slate-400 uppercase">Description</th>
                                    <th class="px-6 py-3 text-left text-[10px] font-black text-slate-400 uppercase">Debit</th>
                                    <th class="px-6 py-3 text-left text-[10px] font-black text-slate-400 uppercase">Credit</th>
                                    <th class="px-6 py-3 text-left text-[10px] font-black text-slate-400 uppercase">Status</th>
                                </tr></thead>
                                <tbody class="divide-y divide-slate-50">${ledgerHtml}</tbody>
                            </table>
                        </div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 overflow-hidden">
                        <div class="px-8 py-5 border-b border-slate-50 flex items-center justify-between">
                            <h3 class="text-xs font-black text-slate-600 uppercase tracking-widest flex items-center gap-2"><i class="fa-solid fa-folder-open text-prime/40"></i>Documents</h3>
                            <button onclick="uploadDocument()" class="bg-slate-50 text-slate-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-prime hover:text-white transition-all"><i class="fa-solid fa-upload mr-1"></i>Upload</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-6" id="docs-list"></div>
                    </div>
                </div>
            </div>`;

            loadDocs(currentStudentId);
        }

        // ── DOCS ──────────────────────────────────────────────
        async function loadDocs(sid) {
            try {
                const docs = await window.api.getStudentDocuments(sid);
                const list = document.getElementById('docs-list');
                if (!list) return;
                list.innerHTML = (docs||[]).map(d => `
                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-prime/10 transition-all group">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-9 h-9 rounded-xl bg-white border border-slate-100 flex items-center justify-center text-prime shadow-sm">
                                <i class="fa-solid ${d.file_type==='.pdf'?'fa-file-pdf text-rose-500':'fa-image text-indigo-500'}"></i>
                            </div>
                            <div class="overflow-hidden">
                                <p class="text-xs font-black text-slate-700 truncate">${d.title}</p>
                                <p class="text-[9px] font-bold text-slate-400">${fmt(d.created_at)}</p>
                            </div>
                        </div>
                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="viewDoc('${d.file_name}')" class="w-7 h-7 rounded-lg bg-white text-prime hover:bg-prime hover:text-white transition-all shadow-sm flex items-center justify-center"><i class="fa-solid fa-eye text-[9px]"></i></button>
                            <button onclick="deleteDoc(${d.id})" class="w-7 h-7 rounded-lg bg-white text-rose-500 hover:bg-rose-500 hover:text-white transition-all shadow-sm flex items-center justify-center"><i class="fa-solid fa-trash text-[9px]"></i></button>
                        </div>
                    </div>`).join('') || '<p class="col-span-2 text-center py-8 text-slate-300 font-bold italic text-sm">No documents uploaded yet.</p>';
            } catch(e) { console.warn('loadDocs error:', e.message); }
        }

        function uploadDocument() { document.getElementById('doc-title-input').value=''; openModal('upload-modal'); }

        async function executeUpload() {
            const title = document.getElementById('doc-title-input').value;
            if (!title) return showToast('Please enter a title.','error');
            const res = await window.api.uploadStudentDocument({ studentId: currentStudentId, title });
            if (res.success) { showToast('Uploaded!'); closeModal('upload-modal'); loadDocs(currentStudentId); }
            else showToast(res.error||'Upload failed','error');
        }

        async function viewDoc(fileName) {
            const url = await window.api.getDocumentUrl(fileName);
            if (!url) return showToast('File not found.','error');
            window.open(url,'_blank');
        }

        async function deleteDoc(id) {
            if (!confirm('Delete this document?')) return;
            await window.api.deleteDocument(id);
            loadDocs(currentStudentId);
        }

        // ── SEARCH ────────────────────────────────────────────
        let bioTimer;
        async function handleBioSearch(q) {
            clearTimeout(bioTimer);
            const box = document.getElementById('bio-search-results');
            if (!q.trim()) { box.classList.add('hidden'); return; }
            bioTimer = setTimeout(async () => {
                try {
                    const results = await window.api.globalSearch(q);
                    const students = (results||[]).filter(r => r.type === 'student');
                    if (!students.length) {
                        box.innerHTML = '<div class="p-4 text-xs text-slate-400 italic">No students found.</div>';
                    } else {
                        box.innerHTML = students.map(s => `
                            <div onclick="switchStudent(${s.id})" class="p-4 flex items-center gap-3 hover:bg-slate-50 cursor-pointer transition-all border-b border-slate-50 last:border-0">
                                <div class="w-9 h-9 rounded-xl bg-prime/5 text-prime flex items-center justify-center font-black text-sm">${s.name.charAt(0)}</div>
                                <div>
                                    <p class="text-sm font-black text-slate-800">${s.name}</p>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase">Roll No: ${s.roll_no}</p>
                                </div>
                            </div>`).join('');
                    }
                    box.classList.remove('hidden');
                } catch(e) { console.warn('search error', e.message); }
            }, 250);
        }

        function switchStudent(id) {
            document.getElementById('bio-search-results').classList.add('hidden');
            document.getElementById('bio-search').value = '';
            currentStudentId = id;
            load(id);
        }

        function toggleAccordion(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById('icon-' + id);
            const hidden = el.classList.contains('hidden');
            document.querySelectorAll('[id^="exam-"]').forEach(e => e.classList.add('hidden'));
            document.querySelectorAll('[id^="icon-exam-"]').forEach(i => i.classList.remove('rotate-180'));
            if (hidden) { el.classList.remove('hidden'); icon?.classList.add('rotate-180'); }
        }

        // Close search on outside click
        document.addEventListener('click', e => {
            if (!e.target.closest('#bio-search') && !e.target.closest('#bio-search-results'))
                document.getElementById('bio-search-results').classList.add('hidden');
        });

        load();
    </script>
</body>
</html>
