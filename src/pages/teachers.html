<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Teachers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1600px] mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h3 class="text-2xl font-black text-slate-800">All Teachers</h3>
                        <p class="text-sm text-slate-400 font-medium mt-1" id="teacher-count">Loading...</p>
                    </div>
                    <button onclick="document.getElementById('teacher-modal').classList.remove('hidden'); resetForm();" class="bg-prime text-white px-6 py-3 rounded-xl font-bold text-sm flex items-center gap-2 hover:bg-slate-700 transition-all shadow-lg shadow-prime/20">
                        <i class="fa-solid fa-plus"></i> Add Teacher
                    </button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="teachers-grid"></div>
            </div>
        </div>
    </main>

    <div id="teacher-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-slate-800" id="t-modal-title">Add Teacher</h3>
                <button onclick="document.getElementById('teacher-modal').classList.add('hidden')" class="w-8 h-8 rounded-lg hover:bg-slate-100 text-slate-400"><i class="fa-solid fa-times"></i></button>
            </div>
            <form onsubmit="saveTeacher(event)" class="space-y-4">
                <input type="hidden" id="t-id">
                <div>
                    <label class="text-xs font-black text-slate-500 uppercase tracking-wider mb-1 block">Full Name *</label>
                    <input type="text" id="t-name" class="premium-input bg-slate-50 w-full px-4 py-3 rounded-xl text-sm font-medium" required>
                </div>
                <div>
                    <label class="text-xs font-black text-slate-500 uppercase tracking-wider mb-1 block">Subject</label>
                    <input type="text" id="t-subject" class="premium-input bg-slate-50 w-full px-4 py-3 rounded-xl text-sm font-medium" placeholder="e.g. Mathematics">
                </div>
                <div>
                    <label class="text-xs font-black text-slate-500 uppercase tracking-wider mb-1 block">Contact</label>
                    <input type="text" id="t-contact" class="premium-input bg-slate-50 w-full px-4 py-3 rounded-xl text-sm font-medium" placeholder="03xx-xxxxxxx">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" id="t-submit-btn" class="flex-1 bg-prime text-white py-3 rounded-xl font-bold text-sm hover:bg-slate-700 transition-all">Save Teacher</button>
                    <button type="button" onclick="document.getElementById('teacher-modal').classList.add('hidden')" class="px-6 py-3 rounded-xl border border-slate-200 text-slate-500 font-bold text-sm">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('teachers');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Teachers');

        let allTeachers = [];
        let editingId = null;

        const colors = ['blue','rose','indigo','amber','emerald','purple'];

        async function load() {
            allTeachers = await window.api.getTeachers();
            document.getElementById('teacher-count').textContent = allTeachers.length + ' total teachers';
            const grid = document.getElementById('teachers-grid');
            grid.innerHTML = allTeachers.length ? allTeachers.map((t, i) => {
                const c = colors[i % colors.length];
                return `
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border-2 border-prime/10 hover:shadow-xl transition-all duration-300 group relative overflow-hidden">
                    <i class="fa-solid fa-graduation-cap absolute -right-6 -top-6 text-7xl text-prime/5 -rotate-12 group-hover:scale-110 group-hover:text-prime/10 transition-transform duration-700 pointer-events-none"></i>
                    <div class="flex items-start justify-between mb-6">
                        <div class="w-16 h-16 rounded-2xl bg-${c}-50 flex items-center justify-center text-${c}-500 text-2xl font-black group-hover:bg-${c}-500 group-hover:text-white transition-all duration-300">${t.name.charAt(0)}</div>
                        <div class="flex gap-2">
                            <button onclick="editTeacher(${t.id})" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-indigo-100 hover:text-indigo-600 text-slate-400 transition-all flex items-center justify-center"><i class="fa-solid fa-pen text-xs"></i></button>
                            <button onclick="deleteTeacher(${t.id},'${t.name}')" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-rose-100 hover:text-rose-600 text-slate-400 transition-all flex items-center justify-center"><i class="fa-solid fa-trash text-xs"></i></button>
                        </div>
                    </div>
                    <h4 class="font-black text-slate-800 text-lg leading-tight">${t.name}</h4>
                    <p class="text-sm font-bold text-slate-400 mt-1">${t.subject || 'No subject assigned'}</p>
                    <div class="mt-4 flex items-center gap-2 text-xs font-bold text-slate-400">
                        <i class="fa-solid fa-phone text-${c}-400"></i>
                        <span>${t.contact || 'No contact'}</span>
                    </div>
                </div>`;
            }).join('') : '<div class="col-span-3 text-center py-16 text-slate-300 font-bold">No teachers found. Add your first teacher!</div>';
        }

        function resetForm() {
            editingId = null;
            document.getElementById('t-modal-title').textContent = 'Add Teacher';
            document.getElementById('t-submit-btn').textContent = 'Save Teacher';
            ['t-id','t-name','t-subject','t-contact'].forEach(f => document.getElementById(f).value = '');
        }

        function editTeacher(id) {
            const t = allTeachers.find(x => x.id === id);
            if (!t) return;
            editingId = id;
            document.getElementById('t-modal-title').textContent = 'Edit Teacher';
            document.getElementById('t-submit-btn').textContent = 'Update Teacher';
            document.getElementById('t-id').value = t.id;
            document.getElementById('t-name').value = t.name;
            document.getElementById('t-subject').value = t.subject || '';
            document.getElementById('t-contact').value = t.contact || '';
            document.getElementById('teacher-modal').classList.remove('hidden');
        }

        let isSavingTeacher = false;
        async function saveTeacher(e) {
            e.preventDefault();
            if (isSavingTeacher) return;
            isSavingTeacher = true;
            try {
                const data = { id: document.getElementById('t-id').value, name: document.getElementById('t-name').value, subject: document.getElementById('t-subject').value, contact: document.getElementById('t-contact').value };
                const result = editingId ? await window.api.updateTeacher(data) : await window.api.createTeacher(data);
                if (result.success) { document.getElementById('teacher-modal').classList.add('hidden'); showToast(editingId ? 'Teacher updated!' : 'Teacher added!'); load(); }
                else showToast(result.error || 'Failed to save.', 'error');
            } finally {
                isSavingTeacher = false;
            }
        }

        async function deleteTeacher(id, name) {
            if (!confirm(`Delete teacher "${name}"?`)) return;
            const result = await window.api.deleteTeacher(id);
            if (result.success) { showToast('Teacher deleted.'); load(); }
            else showToast('Failed to delete.', 'error');
        }

        load();
    </script>
</body>
</html>
