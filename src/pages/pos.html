<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Point of Sale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Items Grid (Left) -->
                <div class="lg:col-span-2 space-y-8">
                    <!-- Invoice History (Top) -->
                    <div class="bg-white rounded-[2rem] shadow-sm border-2 border-prime/10 p-8 relative overflow-hidden">
                        <i class="fa-solid fa-graduation-cap absolute -right-8 -top-8 text-9xl text-prime/5 -rotate-12 pointer-events-none"></i>
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-4">
                                <div>
                                    <h3 class="text-xl font-black text-slate-800">Invoice History <span id="inv-count" class="text-xs text-slate-400 font-bold ml-1"></span></h3>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Quick search or view past bills</p>
                                </div>
                                <button onclick="loadRecentSales()" class="w-8 h-8 rounded-xl bg-slate-50 text-slate-400 hover:bg-prime hover:text-white transition-all flex items-center justify-center">
                                    <i class="fa-solid fa-rotate"></i>
                                </button>
                            </div>
                            <div class="relative w-64">
                                <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                                <input type="text" id="inv-search-input" oninput="searchInvoices(this.value)" placeholder="Search Invoice No or Name..." 
                                    class="w-full bg-slate-50 border border-slate-100 rounded-xl pl-10 pr-4 py-3 text-sm font-bold outline-none focus:border-prime transition-all">
                            </div>
                        </div>
                        <div id="recent-sales" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 min-h-[60px]"></div>
                    </div>

                    <div>
                        <h3 class="text-xl font-black text-slate-800 mb-6">Select Items to Sell</h3>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="pos-items"></div>
                    </div>
                </div>

                <!-- Cart (Right) -->
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-[2rem] shadow-sm border-2 border-prime/10 p-8 sticky top-0 relative overflow-hidden">
                        <i class="fa-solid fa-graduation-cap absolute -right-8 -top-8 text-9xl text-prime/5 -rotate-12 pointer-events-none"></i>
                        <h3 class="text-xl font-black text-slate-800 mb-6">Sale Cart</h3>
                        <div id="cart-items" class="space-y-3 mb-6 min-h-[120px]">
                            <p class="text-center text-slate-300 font-bold py-8">Cart is empty</p>
                        </div>
                        <div class="space-y-4 mb-6 pt-4 border-t border-slate-100">
                            <div class="relative">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-2 block">Link to Student (Optional)</label>
                                <div class="relative">
                                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                                    <input type="text" id="student-search" oninput="filterStudents(this.value)" placeholder="Search by name or roll no..."
                                        class="w-full bg-slate-50 border border-slate-100 rounded-xl pl-10 pr-4 py-3 text-sm font-bold outline-none focus:border-prime transition-all">
                                </div>
                                <div id="student-results" class="hidden absolute left-0 right-0 top-full mt-2 bg-white border border-slate-100 rounded-2xl shadow-xl z-50 max-h-[200px] overflow-auto divide-y divide-slate-50"></div>
                                <input type="hidden" id="pos-student-id">
                                <div id="selected-student-badge" class="hidden mt-2 p-3 bg-prime text-white rounded-xl flex justify-between items-center">
                                    <span class="text-xs font-bold" id="selected-student-name"></span>
                                    <button onclick="clearSelectedStudent()" class="text-white/50 hover:text-white"><i class="fa-solid fa-times"></i></button>
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-2 block">Payment Method</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="setPaymentStatus('paid')" id="btn-paid" class="py-2 rounded-xl text-xs font-black border-2 border-prime bg-prime text-white transition-all">CASH (PAID)</button>
                                    <button onclick="setPaymentStatus('unpaid')" id="btn-unpaid" class="py-2 rounded-xl text-xs font-black border-2 border-slate-100 text-slate-400 hover:bg-slate-50 transition-all">CREDIT (UNPAID)</button>
                                </div>
                            </div>
                            <div id="partial-payment-box" class="hidden">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-2 block">Amount Paying Now (Rs.)</label>
                                <input type="number" id="paid-amount" placeholder="Enter amount..." class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:border-prime transition-all">
                            </div>
                        </div>

                        <div class="border-t border-slate-100 pt-4 mb-6">
                            <div class="flex justify-between items-center">
                                <span class="font-black text-slate-600 text-sm uppercase tracking-wider">Total</span>
                                <span class="text-2xl font-black text-prime" id="cart-total">Rs. 0</span>
                            </div>
                        </div>
                        <button onclick="checkout()" class="w-full bg-prime text-white py-4 rounded-2xl font-black text-sm hover:bg-slate-700 transition-all shadow-lg shadow-prime/20 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-cash-register"></i> Complete Sale
                        </button>
                        <button onclick="clearCart()" class="mt-3 w-full py-3 rounded-2xl font-bold text-sm text-slate-400 hover:bg-slate-50 transition-all">Clear Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('pos');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Point of Sale');

        let items = [], cart = {}, students = [];
        let currentStatus = 'paid';

        async function load() {
            [items, students] = await Promise.all([
                window.api.getInventory(),
                window.api.getStudents()
            ]);
            renderItems();
            loadRecentSales();
        }

        function filterStudents(query) {
            const results = document.getElementById('student-results');
            if (!query) { results.classList.add('hidden'); return; }

            const filtered = students.filter(s =>
                s.name.toLowerCase().includes(query.toLowerCase()) ||
                s.roll_no.toLowerCase().includes(query.toLowerCase())
            );

            if (filtered.length === 0) {
                results.innerHTML = '<p class="p-4 text-xs font-bold text-slate-400 text-center">No students found</p>';
            } else {
                results.innerHTML = filtered.map(s => `
                    <div onclick="selectStudent(${s.id}, '${s.name}', '${s.roll_no}')" class="p-3 hover:bg-slate-50 cursor-pointer transition-all">
                        <p class="text-xs font-bold text-slate-700">${s.name}</p>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Roll No: ${s.roll_no}</p>
                    </div>
                `).join('');
            }
            results.classList.remove('hidden');
        }

        function selectStudent(id, name, roll) {
            document.getElementById('pos-student-id').value = id;
            document.getElementById('selected-student-name').textContent = `${name} (${roll})`;
            document.getElementById('selected-student-badge').classList.remove('hidden');
            document.getElementById('student-search').parentElement.classList.add('hidden');
            document.getElementById('student-results').classList.add('hidden');
            document.getElementById('student-search').value = '';
        }

        function clearSelectedStudent() {
            document.getElementById('pos-student-id').value = '';
            document.getElementById('selected-student-badge').classList.add('hidden');
            document.getElementById('student-search').parentElement.classList.remove('hidden');
        }

        function setPaymentStatus(s) {
            currentStatus = s;
            const btnPaid = document.getElementById('btn-paid');
            const btnUnpaid = document.getElementById('btn-unpaid');
            const partialBox = document.getElementById('partial-payment-box');

            if (s === 'paid') {
                btnPaid.className = 'py-2 rounded-xl text-xs font-black border-2 border-prime bg-prime text-white transition-all';
                btnUnpaid.className = 'py-2 rounded-xl text-xs font-black border-2 border-slate-100 text-slate-400 hover:bg-slate-50 transition-all';
                partialBox.classList.add('hidden');
            } else {
                btnUnpaid.className = 'py-2 rounded-xl text-xs font-black border-2 border-prime bg-prime text-white transition-all';
                btnPaid.className = 'py-2 rounded-xl text-xs font-black border-2 border-slate-100 text-slate-400 hover:bg-slate-50 transition-all';
                partialBox.classList.remove('hidden');
            }
        }

        function renderItems() {
            const grid = document.getElementById('pos-items');
            grid.innerHTML = items.map(item => `
                <div class="bg-white p-6 rounded-[2rem] border-2 border-prime/10 hover:shadow-xl hover:scale-[1.02] transition-all cursor-pointer group relative overflow-hidden" onclick="addToCart(${item.id})">
                    <i class="fa-solid fa-graduation-cap absolute -right-4 -top-4 text-5xl text-prime/5 -rotate-12 pointer-events-none group-hover:scale-110 transition-transform duration-700"></i>
                    <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center mb-4 group-hover:bg-prime group-hover:text-white transition-colors">
                        <i class="fa-solid fa-box text-lg"></i>
                    </div>
                    <h4 class="font-black text-slate-800 mb-1">${item.item_name}</h4>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-400">${item.qty} in stock</span>
                        <span class="text-sm font-black text-prime">${formatCurrency(item.sale_price)}</span>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = items.find(i => i.id == id);
            if (!item || item.qty <= (cart[id] || 0)) { showToast('Out of stock!', 'error'); return; }
            cart[id] = (cart[id] || 0) + 1;
            renderCart();
        }

        function removeFromCart(id) {
            if (cart[id] > 0) cart[id]--;
            renderCart();
        }

        function renderCart() {
            const el = document.getElementById('cart-items');
            const ids = Object.keys(cart).filter(id => cart[id] > 0);
            let total = 0;

            if (ids.length === 0) {
                el.innerHTML = '<p class="text-center text-slate-300 font-bold py-8">Cart is empty</p>';
                document.getElementById('cart-total').textContent = 'Rs. 0';
                return;
            }

            el.innerHTML = ids.map(id => {
                const item = items.find(i => i.id == id);
                total += item.sale_price * cart[id];
                return `
                    <div class="flex items-center justify-between p-3 bg-slate-50 rounded-2xl">
                        <div class="flex-1">
                            <p class="text-xs font-black text-slate-800">${item.item_name}</p>
                            <p class="text-[10px] font-bold text-slate-400">${formatCurrency(item.sale_price)} x ${cart[id]}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="removeFromCart(${id})" class="w-6 h-6 rounded-lg bg-white flex items-center justify-center text-slate-400 hover:text-rose-500 shadow-sm"><i class="fa-solid fa-minus text-[8px]"></i></button>
                            <span class="text-xs font-black w-4 text-center">${cart[id]}</span>
                            <button onclick="addToCart(${id})" class="w-6 h-6 rounded-lg bg-white flex items-center justify-center text-slate-400 hover:text-prime shadow-sm"><i class="fa-solid fa-plus text-[8px]"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').textContent = formatCurrency(total);
        }

        function clearCart() { cart = {}; renderCart(); }

        let allInvoices = [];
        async function loadRecentSales() {
            console.log('--- Loading History ---');
            try {
                allInvoices = await window.api.getInvoices();
                console.log('Found Invoices:', allInvoices.length, allInvoices);
                
                const countEl = document.getElementById('inv-count');
                if (countEl) countEl.textContent = `(${allInvoices.length} total)`;

                const searchVal = document.getElementById('inv-search-input').value;
                if (searchVal) {
                    searchInvoices(searchVal);
                } else {
                    renderInvoices(allInvoices.slice(0, 9));
                }
            } catch (err) {
                console.error('CRITICAL: Failed to load history:', err);
            }
        }

        function renderInvoices(list) {
            const el = document.getElementById('recent-sales');
            const searchVal = document.getElementById('inv-search-input').value;
            
            if (!list || list.length === 0) {
                el.innerHTML = `<p class="text-xs text-slate-300 font-bold text-center py-8 col-span-full">No invoices found matching "${searchVal}"</p>`;
                return;
            }

            el.innerHTML = list.map(inv => `
                <div class="p-4 bg-slate-50/50 rounded-2xl border border-transparent hover:border-prime transition-all cursor-pointer group" onclick="viewInvoice('${inv.invoice_no}')">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[9px] font-black text-prime uppercase tracking-wider">${inv.invoice_no}</span>
                        <span class="text-[9px] font-bold text-slate-400 uppercase">${formatDate(inv.created_at)}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <p class="text-[11px] font-bold text-slate-700 truncate max-w-[120px]">${inv.student_name || 'Walk-in Customer'}</p>
                        <span class="text-[12px] font-black text-emerald-600">${formatCurrency(inv.total)}</span>
                    </div>
                </div>`).join('');
        }

        function searchInvoices(q) {
            if (!q) return renderInvoices(allInvoices.slice(0, 9));
            const filtered = allInvoices.filter(i => 
                (i.invoice_no && i.invoice_no.toLowerCase().includes(q.toLowerCase())) || 
                (i.student_name && i.student_name.toLowerCase().includes(q.toLowerCase()))
            );
            renderInvoices(filtered);
        }

        async function checkout() {
            const ids = Object.keys(cart).filter(id => cart[id] > 0);
            if (!ids.length) { showToast('Cart is empty!', 'error'); return; }
            
            const btn = document.querySelector('button[onclick="checkout()"]');
            const oldHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';

            const studentId = document.getElementById('pos-student-id').value;
            let paidNow = Number(document.getElementById('paid-amount').value) || 0;
            
            let total = 0;
            const itemsToCheckout = ids.map(id => {
                const item = items.find(i => i.id == id);
                total += item.sale_price * cart[id];
                return { inventory_id: id, qty: cart[id] };
            });

            if (currentStatus === 'paid' && paidNow === 0) paidNow = total;

            const cartData = {
                items: itemsToCheckout,
                student_id: studentId || null,
                status: currentStatus,
                paid_amount: paidNow
            };

            try {
                const result = await window.api.checkoutCart(cartData);
                if (result.success) {
                    document.getElementById('inv-search-input').value = ''; 
                    clearCart();
                    clearSelectedStudent();
                    setPaymentStatus('paid');
                    showToast(`Sale completed! Invoice: ${result.invoice_no}`);
                    load();
                } else {
                    showToast(result.error || 'Checkout failed.', 'error');
                }
            } catch (err) {
                showToast('A system error occurred.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = oldHtml;
            }
        }

        async function printInvoice(invNo) {
            const details = await window.api.getInvoiceDetails(invNo);
            if (!details || !details.length) return;
            
            const header = await window.getPrintHeader();
            const first = details[0];
            const studentDisplay = first.student_name ? `${first.student_name} ${first.roll_no ? `(Roll #${first.roll_no})` : ''}` : 'Walk-in Customer';
            const total = details.reduce((a, b) => a + Number(b.total_amount), 0);

            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>Invoice - ${invNo}</title>
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
                    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Outfit', sans-serif; padding: 30px; color: #1e293b; }
                        .inv-box { max-width: 800px; margin: 0 auto; border: 1px solid #e2e8f0; padding: 40px; border-radius: 20px; }
                        .label { color: #64748b; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
                        .value { font-weight: 700; font-size: 14px; margin-top: 2px; }
                        table { w-full; margin-top: 30px; border-collapse: collapse; width: 100%; }
                        th { text-align: left; padding: 12px; border-bottom: 2px solid #f1f5f9; color: #64748b; font-size: 10px; text-transform: uppercase; }
                        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; font-weight: 700; }
                        .total-section { margin-top: 30px; text-align: right; }
                        .total-label { font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; }
                        .total-val { font-size: 24px; font-weight: 900; color: #1e293b; }
                        @media print { .inv-box { border: none; } body { padding: 0; } }
                    </style>
                </head>
                <body>
                    <div class="inv-box">
                        ${header}
                        <div style="display:flex; justify-content:space-between; margin-bottom: 30px;">
                            <div>
                                <div class="label">Invoice No</div>
                                <div class="value">${invNo}</div>
                            </div>
                            <div style="text-align:right;">
                                <div class="label">Date</div>
                                <div class="value">${formatDate(first.created_at)}</div>
                            </div>
                        </div>
                        <div style="margin-bottom: 30px;">
                            <div class="label">Customer / Student</div>
                            <div class="value">${studentDisplay}</div>
                        </div>
                        <table>
                            <thead>
                                <tr><th>Item Description</th><th style="text-align:center">Qty</th><th style="text-align:right">Amount</th></tr>
                            </thead>
                            <tbody>
                                ${details.map(d => `
                                    <tr>
                                        <td>${d.description || d.item_name}</td>
                                        <td style="text-align:center">${d.qty}</td>
                                        <td style="text-align:right">${formatCurrency(d.total_amount)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <div class="total-section">
                            <span class="total-label">Grand Total: </span>
                            <span class="total-val">${formatCurrency(total)}</span>
                        </div>
                        <div style="margin-top: 50px; text-align: center; font-size: 10px; color: #94a3b8; border-top: 1px dashed #e2e8f0; padding-top: 20px;">
                            Thank you for your business!
                        </div>
                    </div>
                    <script>setTimeout(() => { window.print(); window.close(); }, 500);<\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
        }

        async function viewInvoice(invNo) {
            const [details, settings] = await Promise.all([
                window.api.getInvoiceDetails(invNo),
                window.api.getSettings()
            ]);
            
            if (!details || !details.length) return showToast('No details found for this invoice.', 'error');
            const first = details[0];
            const studentDisplay = first.student_name ? `${first.student_name} ${first.roll_no ? `(Roll #${first.roll_no})` : ''}` : 'Walk-in Customer';
            const date = formatDateTime(first.created_at);
            const total = details.reduce((a, b) => a + Number(b.total_amount), 0);
            const content = `
                <div class="fixed inset-0 bg-prime/80 backdrop-blur-sm z-[9999] flex items-center justify-center p-4" id="inv-detail-modal">
                    <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-300">
                        <div class="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                            <div>
                                <h2 class="text-xs font-black text-prime uppercase tracking-[0.2em] mb-1">${settings.school_name || 'School Management System'}</h2>
                                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-wider mb-2">${settings.school_address || ''} | ${settings.school_contact || ''}</p>
                                <h3 class="text-xl font-black text-slate-800">${invNo}</h3>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">${date}</p>
                            </div>
                            <button onclick="document.getElementById('inv-detail-modal').remove()" class="w-8 h-8 rounded-lg hover:bg-slate-100 text-slate-400 transition-colors"><i class="fa-solid fa-times"></i></button>
                        </div>
                        <div class="p-8">
                            <div class="mb-6">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block mb-1">Customer / Student</label>
                                <p class="text-sm font-bold text-slate-700">${studentDisplay}</p>
                            </div>
                            <div class="space-y-3 max-h-[300px] overflow-auto pr-2 custom-scroll">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block mb-1">Items Summary</label>
                                ${details.map(d => `
                                    <div class="flex justify-between items-center py-2 border-b border-slate-50 last:border-0">
                                        <div>
                                            <p class="text-xs font-bold text-slate-700">${d.description || d.item_name}</p>
                                            <p class="text-[10px] text-slate-400">Qty: ${d.qty}</p>
                                        </div>
                                        <p class="text-xs font-black text-slate-800">${formatCurrency(d.total_amount)}</p>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="mt-8 pt-6 border-t border-slate-100 flex justify-between items-center">
                                <span class="text-sm font-black text-slate-600 uppercase tracking-wider">Total Bill</span>
                                <span class="text-xl font-black text-prime">${formatCurrency(total)}</span>
                            </div>
                            <div class="flex gap-2 mt-8">
                                <button onclick="printInvoice('${invNo}')" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-sm hover:bg-slate-200 transition-all flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-print"></i> Print
                                </button>
                                <button onclick="document.getElementById('inv-detail-modal').remove()" class="flex-1 bg-prime text-white py-3 rounded-xl font-bold text-sm hover:bg-slate-700 transition-all">Close</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            document.body.insertAdjacentHTML('beforeend', content);
        }

        load();
    </script>
</body>

</html>
