<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Withdrawals & Struck-Off</title>
    <script src="tailwind.js"></script>
    <script src="fa.js"></script>
    
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1400px] mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h3 class="text-2xl font-black text-slate-800">Inactive Students</h3>
                        <p class="text-sm text-slate-400 font-medium mt-1">Manage withdrawn and struck-off students.</p>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] shadow-sm border-2 border-prime/10 overflow-hidden relative">
                    <i class="fa-solid fa-user-minus absolute -right-8 -top-8 text-9xl text-prime/5 -rotate-12 pointer-events-none"></i>
                    <table class="w-full">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Name</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Roll No</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Class</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Status</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Action</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Operations</th>
                            </tr>
                        </thead>
                        <tbody id="withdrawn-table" class="divide-y divide-slate-50">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('students');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Withdrawals & Struck-Off');

        async function load() {
            const students = await window.api.getWithdrawnStudents();
            const tbody = document.getElementById('withdrawn-table');
            
            tbody.innerHTML = students.length ? students.map(s => `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center font-black text-slate-400 text-xs">${s.name.charAt(0)}</div>
                            <span class="font-bold text-slate-700">${s.name}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm font-bold text-slate-600">${s.roll_no}</td>
                    <td class="px-6 py-4 text-sm font-bold text-slate-600">${s.class_name || '—'}</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-lg text-[10px] font-black uppercase ${s.status === 'withdrawn' ? 'bg-amber-50 text-amber-600' : 'bg-rose-50 text-rose-600'}">${s.status}</span>
                    </td>
                    <td class="px-6 py-4 text-xs font-bold text-slate-500 italic">
                        Manual Action
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex gap-2">
                            <button onclick="restoreStudent(${s.id}, '${s.name}')" class="bg-emerald-50 text-emerald-600 px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-wider hover:bg-emerald-100 transition-all">
                                <i class="fa-solid fa-rotate-left mr-1"></i> Re-Admit
                            </button>
                            <button onclick="window.location.href='biodata.html?id=${s.id}'" class="bg-slate-50 text-slate-600 px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-wider hover:bg-slate-100 transition-all">
                                <i class="fa-solid fa-id-card mr-1"></i> Biodata
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="6" class="text-center py-20 text-slate-300 font-bold">No withdrawn or struck-off students.</td></tr>';
        }

        async function restoreStudent(id, name) {
            if (!confirm(`Are you sure you want to re-admit "${name}"? This will restore their status to "active".`)) return;
            const res = await window.api.restoreStudent(id);
            if (res.success) {
                showToast('Student re-admitted successfully!');
                load();
            } else {
                showToast('Failed to restore student.', 'error');
            }
        }

        load();
    </script>
</body>
</html>
