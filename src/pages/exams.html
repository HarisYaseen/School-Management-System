<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Exams & Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1600px] mx-auto space-y-8">
                
                <!-- Exams Header & List -->
                <div class="flex justify-between items-end">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800">Exams & DMCs</h2>
                        <p class="text-slate-400 font-bold uppercase tracking-widest text-xs mt-1">Academic Performance Management</p>
                    </div>
                    <button onclick="openExamModal()" class="bg-prime text-white px-8 py-4 rounded-2xl font-black text-sm flex items-center gap-3 hover:scale-[1.02] transition-all shadow-xl shadow-prime/20">
                        <i class="fa-solid fa-plus"></i> Create New Exam
                    </button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Left: Exam List -->
                    <div class="lg:col-span-1 space-y-4" id="exam-list"></div>

                    <!-- Right: Result Entry & Management -->
                    <div class="lg:col-span-2">
                        <div id="result-view" class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 p-10 hidden relative overflow-hidden h-full min-h-[600px]">
                            <i class="fa-solid fa-graduation-cap absolute -right-20 -top-20 text-[15rem] text-prime/5 -rotate-12 pointer-events-none"></i>
                            
                            <div id="no-selection" class="flex flex-col items-center justify-center h-full text-center py-20">
                                <div class="w-24 h-24 rounded-3xl bg-slate-50 flex items-center justify-center text-slate-200 mb-6">
                                    <i class="fa-solid fa-file-signature text-4xl"></i>
                                </div>
                                <h3 class="text-xl font-black text-slate-800">Select an Exam</h3>
                                <p class="text-slate-400 text-sm max-w-[280px] mt-2 font-medium">Choose an exam from the left list to start entering marks or printing DMCs.</p>
                            </div>

                            <div id="active-exam-content" class="hidden space-y-8 relative z-10">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h3 class="text-2xl font-black text-slate-800" id="active-exam-name">Exam Name</h3>
                                        <p class="text-slate-400 font-bold uppercase tracking-wider text-[10px] mt-1" id="active-exam-date">Date</p>
                                    </div>
                                    <div class="flex gap-3">
                                        <select id="class-filter" onchange="loadResults()" class="premium-input bg-slate-50 px-6 py-3 rounded-xl text-xs font-black outline-none border-0">
                                            <option value="">— Select Class —</option>
                                        </select>
                                        <button onclick="loadFromSettings()" class="bg-prime text-white px-6 py-3 rounded-xl font-bold text-xs flex items-center gap-2 hover:bg-slate-700 transition-all shadow-lg shadow-prime/10">
                                            <i class="fa-solid fa-sync"></i> Auto-Load Subjects
                                        </button>
                                    </div>
                                </div>

                                <div id="results-table-container" class="hidden space-y-6">
                                    <div class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl">
                                        <div class="flex gap-4" id="subject-tabs"></div>
                                    </div>

                                    <div class="overflow-hidden rounded-2xl border border-slate-100">
                                        <table class="w-full">
                                            <thead class="bg-slate-50 border-b border-slate-100">
                                                <tr>
                                                    <th class="text-left px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Roll #</th>
                                                    <th class="text-left px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Student Name</th>
                                                    <th class="text-left px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest" id="marks-header">Marks obtained</th>
                                                    <th class="text-right px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest w-32">DMC</th>
                                                </tr>
                                            </thead>
                                            <tbody id="results-body" class="divide-y divide-slate-50"></tbody>
                                        </table>
                                    </div>
                                    <div class="flex justify-end">
                                        <button onclick="saveAllMarks()" class="bg-emerald-500 text-white px-10 py-4 rounded-2xl font-black text-sm hover:bg-emerald-600 transition-all shadow-xl shadow-emerald-500/10">
                                            <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save All Changes
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Create Exam Modal -->
    <div id="exam-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-sm">
            <h3 class="text-xl font-black text-slate-800 mb-6">New Exam</h3>
            <form onsubmit="saveExam(event)" class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Exam Title *</label>
                    <input type="text" id="e-name" class="premium-input w-full px-4 py-3 rounded-xl text-sm font-bold" placeholder="e.g. 1st Term Exam 2024" required>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Date</label>
                    <input type="date" id="e-date" class="premium-input w-full px-4 py-3 rounded-xl text-sm font-bold">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-1 bg-prime text-white py-4 rounded-xl font-black text-xs shadow-lg">Create Exam</button>
                    <button type="button" onclick="closeExamModal()" class="px-6 py-4 rounded-xl border border-slate-200 text-slate-400 font-bold text-xs">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Subject Modal -->
    <div id="subject-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-sm">
            <h3 class="text-xl font-black text-slate-800 mb-6">Add Subject</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Subject Name *</label>
                    <input type="text" id="s-name" class="premium-input w-full px-4 py-3 rounded-xl text-sm font-bold" placeholder="e.g. Mathematics" required>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Total Marks *</label>
                    <input type="number" id="s-total" class="premium-input w-full px-4 py-3 rounded-xl text-sm font-bold" value="100" required>
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="addSubjectToClass()" class="flex-1 bg-indigo-500 text-white py-4 rounded-xl font-black text-xs shadow-lg">Add to Class</button>
                    <button type="button" onclick="document.getElementById('subject-modal').classList.add('hidden')" class="px-6 py-4 rounded-xl border border-slate-200 text-slate-400 font-bold text-xs">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('exams');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Exams & DMCs');

        let allExams = [], selectedExamId = null, activeClassId = null, activeSubject = null;

        async function init() {
            const [exams, classes] = await Promise.all([
                window.api.getExams(),
                window.api.getClasses()
            ]);
            allExams = exams;
            renderExamList();
            
            const classSelect = document.getElementById('class-filter');
            classSelect.innerHTML = '<option value="">— Select Class —</option>' + 
                classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            
            // Check URL for specific exam
            const params = new URLSearchParams(window.location.search);
            if (params.get('id')) selectExam(params.get('id'));
        }

        function renderExamList() {
            const container = document.getElementById('exam-list');
            if (!allExams.length) {
                container.innerHTML = '<div class="bg-white p-10 rounded-[2rem] text-center border-2 border-dashed border-slate-200 text-slate-300 font-bold uppercase text-xs tracking-widest">No Exams Found</div>';
                return;
            }
            container.innerHTML = allExams.map(e => `
                <div onclick="selectExam(${e.id})" class="group bg-white p-6 rounded-3xl border-2 ${selectedExamId == e.id ? 'border-prime shadow-xl scale-[1.02]' : 'border-slate-200 shadow-sm'} hover:border-prime/40 hover:shadow-md transition-all cursor-pointer flex justify-between items-center relative overflow-hidden">
                    <div class="relative z-10">
                        <h4 class="font-black text-slate-800 text-lg">${e.name}</h4>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">${e.date || 'TBA'}</p>
                    </div>
                    <div class="flex gap-2 relative z-10">
                        <button onclick="event.stopPropagation(); deleteExam(${e.id})" class="w-10 h-10 rounded-xl bg-rose-50 text-rose-400 opacity-0 group-hover:opacity-100 transition-all hover:bg-rose-500 hover:text-white flex items-center justify-center">
                            <i class="fa-solid fa-trash text-xs"></i>
                        </button>
                        <i class="fa-solid fa-chevron-right text-prime/20 group-hover:text-prime transition-colors flex items-center"></i>
                    </div>
                    ${selectedExamId == e.id ? `<div class="absolute right-0 top-0 bottom-0 w-2 bg-prime"></div>` : ''}
                </div>
            `).join('');
        }

        function selectExam(id) {
            selectedExamId = id;
            const exam = allExams.find(e => e.id == id);
            renderExamList();
            
            document.getElementById('no-selection').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            document.getElementById('active-exam-content').classList.remove('hidden');
            
            document.getElementById('active-exam-name').textContent = exam.name;
            document.getElementById('active-exam-date').textContent = exam.date || 'No date set';
            
            loadResults();
        }

        async function loadResults() {
            activeClassId = document.getElementById('class-filter').value;
            if (!activeClassId || !selectedExamId) {
                document.getElementById('results-table-container').classList.add('hidden');
                return;
            }

            const raw = await window.api.getStudents();
            const allStudents = raw.filter(s => s.status !== 'deleted');
            const subjects = await window.api.getExamSubjects({ examId: selectedExamId, classId: activeClassId });
            renderSubjectTabs(subjects);

            if (subjects.length > 0) {
                if (!activeSubject) activeSubject = subjects[0].subject_name;
                const match = subjects.find(s => s.subject_name === activeSubject);
                const total = match ? match.total_marks : 100;
                
                document.getElementById('marks-header').textContent = `Obtained Marks (out of ${total})`;
                
                const results = await window.api.getExamResults({ examId: selectedExamId, classId: activeClassId });
                renderResultsTable(results);
                document.getElementById('results-table-container').classList.remove('hidden');
            } else {
                document.getElementById('results-body').innerHTML = '<tr><td colspan="4" class="py-20 text-center text-slate-300 font-bold uppercase text-xs tracking-widest">No subjects added for this class. Click "Add Subject" to begin.</td></tr>';
                document.getElementById('results-table-container').classList.remove('hidden');
                document.getElementById('subject-tabs').innerHTML = '';
            }
        }

        function renderSubjectTabs(subjects) {
            const container = document.getElementById('subject-tabs');
            if (!subjects.length) { container.innerHTML = ''; return; }
            
            container.innerHTML = subjects.map(s => `
                <button onclick="setActiveSubject('${s.subject_name}')" class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all flex items-center gap-3 ${activeSubject === s.subject_name ? 'bg-prime text-white shadow-lg' : 'bg-white text-slate-400 hover:bg-slate-100'}">
                    ${s.subject_name}
                    <i onclick="event.stopPropagation(); removeSubject('${s.subject_name}')" class="fa-solid fa-times-circle hover:text-rose-400 transition-colors"></i>
                </button>
            `).join('');
        }

        function setActiveSubject(name) {
            activeSubject = name;
            loadResults();
        }

        function renderResultsTable(results) {
            // Group results by student to handle multiple subjects (though we only show active one)
            const studentsMap = {};
            results.forEach(r => {
                if (!studentsMap[r.student_id]) studentsMap[r.student_id] = { name: r.student_name, roll: r.roll_no, marks: '' };
                if (r.subject_name === activeSubject) studentsMap[r.student_id].marks = r.obtained_marks;
            });

            const body = document.getElementById('results-body');
            body.innerHTML = Object.entries(studentsMap).map(([id, s]) => `
                <tr class="hover:bg-slate-50 transition-colors group">
                    <td class="px-6 py-5 text-sm font-bold text-slate-400">${s.roll}</td>
                    <td class="px-6 py-5">
                        <div class="font-black text-slate-700">${s.name}</div>
                    </td>
                    <td class="px-6 py-5">
                        <input type="number" step="0.1" class="mark-input premium-input bg-white w-32 px-4 py-2 rounded-xl text-sm font-black border border-slate-100" 
                            data-sid="${id}" value="${s.marks !== undefined ? s.marks : ''}" placeholder="Enter marks">
                    </td>
                    <td class="px-6 py-5 text-right">
                        <button onclick="printDMC(${id})" class="w-10 h-10 rounded-xl bg-slate-50 text-slate-300 hover:bg-prime hover:text-white transition-all flex items-center justify-center ml-auto">
                            <i class="fa-solid fa-print text-xs"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        let isSavingMarks = false;
        async function saveAllMarks() {
            if (isSavingMarks) return;
            isSavingMarks = true;
            try {
                const inputs = document.querySelectorAll('.mark-input');
                const subjects = await window.api.getExamSubjects({ examId: selectedExamId, classId: activeClassId });
                const totalMarks = subjects.find(s => s.subject_name === activeSubject)?.total_marks || 100;

                const promises = [];
                inputs.forEach(input => {
                    const val = input.value;
                    if (val !== '') {
                        promises.push(window.api.saveExamResult({
                            exam_id: selectedExamId,
                            student_id: input.dataset.sid,
                            subject_name: activeSubject,
                            total_marks: totalMarks,
                            obtained_marks: parseFloat(val)
                        }));
                    }
                });

                await Promise.all(promises);
                showToast('All marks saved successfully!', 'success');
                loadResults();
            } finally {
                isSavingMarks = false;
            }
        }

        async function addSubjectToClass() {
            const name = document.getElementById('s-name').value;
            const total = document.getElementById('s-total').value;
            if (!name || !total) return;

            // Fetch students of this class
            const students = await window.api.getExamResults({ examId: selectedExamId, classId: activeClassId });
            
            // Map students to results creation (if they don't exist, saveExamResult handles it)
            const promises = students.map(s => window.api.saveExamResult({
                exam_id: selectedExamId,
                student_id: s.student_id,
                subject_name: name,
                total_marks: total,
                obtained_marks: 0
            }));

            await Promise.all(promises);
            document.getElementById('subject-modal').classList.add('hidden');
            activeSubject = name;
            showToast(`Subject "${name}" added to all students`);
            loadResults();
        }

        async function loadFromSettings() {
            if (!activeClassId) return showToast('Please select a class first', 'error');
            const subjects = await window.api.getSubjects(activeClassId);
            if (!subjects.length) return showToast('No subjects defined for this class in Settings', 'error');

            const results = await window.api.getExamResults({ examId: selectedExamId, classId: activeClassId });
            const students = [...new Set(results.map(r => r.student_id))];

            if (!students.length) return showToast('No students found in this class', 'error');

            showToast('Loading class subjects...');
            const promises = [];
            for (const sub of subjects) {
                for (const sid of students) {
                    promises.push(window.api.saveExamResult({
                        exam_id: selectedExamId,
                        student_id: sid,
                        subject_name: sub.name,
                        total_marks: sub.total_marks,
                        obtained_marks: 0
                    }));
                }
            }

            await Promise.all(promises);
            showToast('Subjects loaded from settings successfully!', 'success');
            activeSubject = subjects[0].name;
            loadResults();
        }

        async function removeSubject(name) {
            if (!confirm(`Are you sure you want to remove the subject "${name}" and all its recorded marks?`)) return;
            await window.api.deleteExamSubject({ examId: selectedExamId, classId: activeClassId, subjectName: name });
            activeSubject = null;
            loadResults();
        }

        function openExamModal() { document.getElementById('exam-modal').classList.remove('hidden'); }
        function closeExamModal() { document.getElementById('exam-modal').classList.add('hidden'); }

        let isSavingExam = false;
        async function saveExam(e) {
            e.preventDefault();
            if (isSavingExam) return;
            isSavingExam = true;
            try {
                const name = document.getElementById('e-name').value;
                const date = document.getElementById('e-date').value;
                const r = await window.api.createExam({ name, date });
                if (r.success) {
                    closeExamModal();
                    showToast('Exam created successfully');
                    init();
                }
            } finally {
                isSavingExam = false;
            }
        }

        async function deleteExam(id) {
            if (!confirm('Delete this exam and all results?')) return;
            await window.api.deleteExam(id);
            if (selectedExamId == id) {
                selectedExamId = null;
                document.getElementById('result-view').classList.add('hidden');
            }
            init();
        }

        function openSubjectModal() {
            if (!activeClassId) return showToast('Please select a class first', 'error');
            document.getElementById('subject-modal').classList.remove('hidden');
        }

        async function printDMC(studentId) {
            const dmc = await window.api.getStudentDMC({ studentId, examId: selectedExamId });
            const settings = await window.api.getSettings();
            
            const win = window.open('', '_blank');
            
            let totalObtained = 0, totalMax = 0;
            const rows = dmc.results.map(r => {
                totalObtained += Number(r.obtained_marks);
                totalMax += Number(r.total_marks);
                const perc = ((r.obtained_marks / r.total_marks) * 100).toFixed(1);
                const grade = getGrade(perc);
                return `
                    <tr>
                        <td style="padding: 12px; border: 1px solid #e2e8f0; font-weight: 700;">${r.subject_name}</td>
                        <td style="padding: 12px; border: 1px solid #e2e8f0; text-align: center;">${r.total_marks}</td>
                        <td style="padding: 12px; border: 1px solid #e2e8f0; text-align: center; font-weight: 900;">${r.obtained_marks}</td>
                        <td style="padding: 12px; border: 1px solid #e2e8f0; text-align: center;">${perc}%</td>
                        <td style="padding: 12px; border: 1px solid #e2e8f0; text-align: center; font-weight: 900;">${grade}</td>
                    </tr>`;
            }).join('');

            const grandPerc = ((totalObtained / totalMax) * 100).toFixed(2);
            const grandGrade = getGrade(grandPerc);

            win.document.write(`
                <html>
                <head>
                    <title>DMC - ${dmc.student.name}</title>
                    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Outfit', sans-serif; padding: 40px; background: white; color: #1e293b; }
                        .dmc-card { border: 8px double #1e293b; padding: 40px; max-width: 900px; margin: 0 auto; position: relative; }
                        .header { text-align: center; border-bottom: 2px solid #1e293b; padding-bottom: 20px; margin-bottom: 30px; }
                        .student-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; font-size: 14px; }
                        .info-item { border-bottom: 1px solid #f1f5f9; padding: 8px 0; }
                        .info-label { font-weight: 900; color: #94a3b8; text-transform: uppercase; font-size: 10px; }
                        .info-val { font-weight: 700; font-size: 16px; margin-top: 2px; }
                        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                        .summary { margin-top: 40px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 30px; border-radius: 20px; border: 2px solid #1e293b; }
                        .grade-badge { font-size: 40px; font-weight: 900; color: #1e293b; border: 4px solid #1e293b; padding: 10px 20px; border-radius: 15px; }
                    </style>
                </head>
                <body>
                    <div class="dmc-card">
                        <div class="header">
                            <h1 style="margin: 0; font-size: 32px; font-weight: 900; text-transform: uppercase;">${settings.school_name || 'SMS CONNECT'}</h1>
                            <p style="margin: 5px 0 0 0; font-weight: 700; color: #64748b;">DETAILED MARKS CERTIFICATE (DMC)</p>
                            <div style="background: #1e293b; color: white; display: inline-block; padding: 5px 20px; border-radius: 5px; margin-top: 15px; font-weight: 900; font-size: 12px; text-transform: uppercase;">${dmc.exam.name}</div>
                        </div>

                        <div class="student-info">
                            <div class="info-item"><div class="info-label">Student Name</div><div class="info-val">${dmc.student.name}</div></div>
                            <div class="info-item"><div class="info-label">Father Name</div><div class="info-val">${dmc.student.guardian_name || '—'}</div></div>
                            <div class="info-item"><div class="info-label">Roll Number</div><div class="info-val">${dmc.student.roll_no}</div></div>
                            <div class="info-item"><div class="info-label">Class</div><div class="info-val">${dmc.student.class_name}</div></div>
                        </div>

                        <table>
                            <thead>
                                <tr style="background: #1e293b; color: white;">
                                    <th style="padding: 12px; text-align: left;">Subject</th>
                                    <th style="padding: 12px;">Max Marks</th>
                                    <th style="padding: 12px;">Marks Obtained</th>
                                    <th style="padding: 12px;">Percentage</th>
                                    <th style="padding: 12px;">Grade</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>

                        <div class="summary">
                            <div>
                                <div class="info-label">Total Results</div>
                                <div style="font-size: 24px; font-weight: 900;">${totalObtained} / ${totalMax}</div>
                                <div style="font-size: 16px; font-weight: 700; color: #64748b; margin-top: 5px;">Aggregate: ${grandPerc}%</div>
                            </div>
                            <div style="text-align: center;">
                                <div class="info-label" style="margin-bottom: 5px;">Final Grade</div>
                                <div class="grade-badge">${grandGrade}</div>
                            </div>
                        </div>

                        <div style="display: flex; justify-content: space-between; margin-top: 80px; padding: 0 40px;">
                            <div style="border-top: 2px solid #1e293b; width: 200px; text-align: center; padding-top: 10px; font-weight: 900; font-size: 10px; text-transform: uppercase;">Class Teacher</div>
                            <div style="border-top: 2px solid #1e293b; width: 200px; text-align: center; padding-top: 10px; font-weight: 900; font-size: 10px; text-transform: uppercase;">Principal Signature</div>
                        </div>
                    </div>
                    <script>setTimeout(() => { window.print(); window.close(); }, 1000);<\/script>
                </body>
                </html>
            `);
            win.document.close();
        }

        function getGrade(perc) {
            const p = parseFloat(perc);
            if (p >= 90) return 'A+';
            if (p >= 80) return 'A';
            if (p >= 70) return 'B';
            if (p >= 60) return 'C';
            if (p >= 50) return 'D';
            if (p >= 40) return 'E';
            return 'F';
        }

        init();
    </script>
