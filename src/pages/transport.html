<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Transport Management</title>
    <script src="tailwind.js"></script>
    <script src="fa.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1200px] mx-auto">
                <div class="grid grid-cols-12 gap-8">
                    <!-- Left: Routes Management -->
                    <div class="col-span-12 lg:col-span-5 space-y-8">
                        <div class="bg-white rounded-[3rem] p-10 shadow-sm border-2 border-prime/5">
                            <div class="flex justify-between items-center mb-8">
                                <h3 class="text-xl font-black text-slate-800">Transport Routes</h3>
                                <button onclick="openRouteModal()" class="w-10 h-10 rounded-xl bg-prime text-white flex items-center justify-center hover:bg-slate-700 transition-all"><i class="fa-solid fa-plus"></i></button>
                            </div>
                            <div class="space-y-4" id="routes-list">
                                <!-- Injected by JS -->
                            </div>
                        </div>
                    </div>

                    <!-- Right: Student Assignments -->
                    <div class="col-span-12 lg:col-span-7 space-y-8">
                        <div class="bg-white rounded-[3rem] p-10 shadow-sm border-2 border-prime/5">
                            <div class="flex justify-between items-center mb-8">
                                <h3 class="text-xl font-black text-slate-800">Assigned Students</h3>
                                <button onclick="openAssignModal()" class="bg-prime text-white px-6 py-3 rounded-2xl font-black text-sm hover:bg-slate-700 transition-all shadow-xl shadow-prime/20">Assign Student</button>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full">
                                    <thead class="bg-slate-50 border-b border-slate-100">
                                        <tr>
                                            <th class="text-left px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider">Student</th>
                                            <th class="text-left px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider">Route</th>
                                            <th class="text-left px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider">Fee</th>
                                            <th class="text-left px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="assigned-table" class="divide-y divide-slate-50">
                                        <!-- Injected by JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Route Modal -->
    <div id="route-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-md">
            <h3 class="text-xl font-black text-slate-800 mb-8" id="route-modal-title">New Route</h3>
            <input type="hidden" id="r-id">
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Route Name</label>
                    <input type="text" id="r-name" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold" placeholder="e.g., Downtown to Campus">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Monthly Fee</label>
                    <input type="number" id="r-fee" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold" placeholder="0.00">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Description</label>
                    <textarea id="r-desc" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold h-24" placeholder="Optional details..."></textarea>
                </div>
            </div>
            <div class="mt-10 flex gap-3">
                <button onclick="closeModal('route-modal')" class="flex-1 bg-slate-100 text-slate-400 py-4 rounded-2xl font-black text-sm">Cancel</button>
                <button onclick="saveRoute()" class="flex-1 bg-prime text-white py-4 rounded-2xl font-black text-sm shadow-xl shadow-prime/20">Save Route</button>
            </div>
        </div>
    </div>

    <!-- Assign Modal -->
    <div id="assign-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-md">
            <h3 class="text-xl font-black text-slate-800 mb-8">Assign Transport</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Search Student</label>
                    <div class="relative">
                        <input type="text" id="s-search" oninput="searchStudents(this.value)" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold" placeholder="Name or Roll No...">
                        <div id="search-results" class="absolute top-full left-0 right-0 bg-white shadow-2xl rounded-2xl mt-2 border border-slate-100 z-50 max-h-48 overflow-auto hidden"></div>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Select Route</label>
                    <select id="s-route" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold appearance-none">
                        <!-- Routes injected -->
                    </select>
                </div>
            </div>
            <div class="mt-10">
                <button onclick="assignTransport()" class="w-full bg-prime text-white py-4 rounded-2xl font-black text-sm shadow-xl shadow-prime/20">Confirm Assignment</button>
            </div>
        </div>
    </div>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('transport');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Transport Management');

        let selectedStudentId = null;

        async function load() {
            const routes = await window.api.getTransportRoutes();
            const assigned = await window.api.getTransportStudents();
            
            document.getElementById('routes-list').innerHTML = routes.map(r => `
                <div class="p-6 bg-slate-50 rounded-[2rem] border-2 border-transparent hover:border-prime/10 transition-all group">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-xs font-black text-prime uppercase tracking-widest">${r.name}</p>
                            <p class="text-lg font-black text-slate-800 mt-1">${formatCurrency(r.fee)}</p>
                        </div>
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="editRoute(${r.id})" class="text-slate-400 hover:text-prime"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteRoute(${r.id})" class="text-slate-400 hover:text-rose-500"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <p class="text-[10px] font-bold text-slate-400">${r.description || 'No description'}</p>
                </div>
            `).join('') || '<div class="text-center py-10 text-slate-300 font-bold">No routes created.</div>';

            document.getElementById('assigned-table').innerHTML = assigned.map(s => `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-6 py-4">
                        <div>
                            <p class="text-sm font-bold text-slate-700">${s.name}</p>
                            <p class="text-[9px] font-black text-slate-400 uppercase">${s.roll_no} • ${s.class_name}</p>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-xs font-bold text-slate-600 uppercase tracking-widest">${s.route_name}</td>
                    <td class="px-6 py-4 text-xs font-black text-emerald-600">${formatCurrency(s.fee)}</td>
                    <td class="px-6 py-4">
                        <button onclick="removeAssignment(${s.id})" class="text-rose-500 hover:text-rose-700 text-xs font-black uppercase tracking-widest">Remove</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="4" class="text-center py-20 text-slate-300 font-bold">No students assigned to transport.</td></tr>';

            // Populate route dropdown
            document.getElementById('s-route').innerHTML = routes.map(r => `<option value="${r.id}">${r.name} (${formatCurrency(r.fee)})</option>`).join('');
        }

        function openRouteModal() {
            document.getElementById('r-id').value = '';
            document.getElementById('r-name').value = '';
            document.getElementById('r-fee').value = '';
            document.getElementById('r-desc').value = '';
            document.getElementById('route-modal-title').textContent = 'New Route';
            openModal('route-modal');
        }

        async function editRoute(id) {
            const routes = await window.api.getTransportRoutes();
            const r = routes.find(x => x.id === id);
            if (!r) return;
            document.getElementById('r-id').value = r.id;
            document.getElementById('r-name').value = r.name;
            document.getElementById('r-fee').value = r.fee;
            document.getElementById('r-desc').value = r.description;
            document.getElementById('route-modal-title').textContent = 'Edit Route';
            openModal('route-modal');
        }

        async function saveRoute() {
            const id = document.getElementById('r-id').value;
            const data = {
                name: document.getElementById('r-name').value,
                fee: document.getElementById('r-fee').value,
                description: document.getElementById('r-desc').value
            };
            if (!data.name) return showToast('Route name is required.', 'error');
            const res = id ? await window.api.updateTransportRoute({...data, id}) : await window.api.createTransportRoute(data);
            if (res.success) {
                showToast('Route saved!');
                closeModal('route-modal');
                load();
            }
        }

        async function deleteRoute(id) {
            if (!confirm('Are you sure? This will not remove students assigned to it.')) return;
            await window.api.deleteTransportRoute(id);
            load();
        }

        async function searchStudents(q) {
            const results = document.getElementById('search-results');
            if (q.length < 2) return results.classList.add('hidden');
            const data = await window.api.globalSearch(q);
            const filtered = data.filter(x => x.type === 'student');
            results.innerHTML = filtered.map(s => `
                <div onclick="selectStudent(${s.id}, '${s.name.replace(/'/g, "\\'")}')" class="p-4 hover:bg-slate-50 cursor-pointer border-b border-slate-50 last:border-0 transition-all">
                    <p class="text-xs font-black text-slate-700">${s.name}</p>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">${s.roll_no}</p>
                </div>
            `).join('');
            results.classList.remove('hidden');
        }

        function selectStudent(id, name) {
            selectedStudentId = id;
            document.getElementById('s-search').value = name;
            document.getElementById('search-results').classList.add('hidden');
        }

        function openAssignModal() {
            selectedStudentId = null;
            document.getElementById('s-search').value = '';
            openModal('assign-modal');
        }

        async function assignTransport() {
            if (!selectedStudentId) return showToast('Please select a student.', 'error');
            const routeId = document.getElementById('s-route').value;
            const res = await window.api.assignTransport({ student_id: selectedStudentId, route_id: routeId });
            if (res.success) {
                showToast('Student assigned successfully!');
                closeModal('assign-modal');
                load();
            }
        }

        async function removeAssignment(studentId) {
            if (!confirm('Remove student from transport?')) return;
            await window.api.removeTransport(studentId);
            load();
        }

        load();
    </script>
</body>
</html>
