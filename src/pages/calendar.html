<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - School Calendar</title>
    <script src="tailwind.js"></script>
    <script src="fa.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1000px] mx-auto">
                <div class="flex justify-between items-center mb-10">
                    <div>
                        <h3 class="text-3xl font-black text-slate-800 tracking-tight">School Calendar</h3>
                        <p class="text-sm text-slate-400 font-medium mt-1">Plan holidays, exams, and events for the academic year.</p>
                    </div>
                    <button onclick="openModal('event-modal')" class="bg-prime text-white px-8 py-3 rounded-2xl font-black text-sm flex items-center gap-2 hover:bg-slate-700 transition-all shadow-xl shadow-prime/20">
                        <i class="fa-solid fa-plus"></i> Add Event
                    </button>
                </div>

                <div class="space-y-4" id="event-list">
                    <!-- Events injected here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Event Modal -->
    <div id="event-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-slate-800" id="modal-title">Create Calendar Event</h3>
                <button onclick="closeModal('event-modal')" class="w-8 h-8 rounded-lg hover:bg-slate-100 text-slate-400"><i class="fa-solid fa-times"></i></button>
            </div>
            <form onsubmit="saveEvent(event)" class="space-y-5">
                <input type="hidden" id="e-id">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Event Title</label>
                    <input type="text" id="e-title" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold" placeholder="e.g. Eid-ul-Fitr Holiday, Final Exams" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Start Date</label>
                        <input type="date" id="e-start" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">End Date (Optional)</label>
                        <input type="date" id="e-end" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Event Type</label>
                    <select id="e-type" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold">
                        <option value="holiday">Public Holiday</option>
                        <option value="exam">Examination</option>
                        <option value="event">School Event</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Description</label>
                    <textarea id="e-desc" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold h-24" placeholder="Additional details..."></textarea>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-1 bg-prime text-white py-4 rounded-2xl font-black text-sm hover:bg-slate-700 transition-all">Save Event</button>
                    <button type="button" onclick="closeModal('event-modal')" class="px-8 py-4 rounded-2xl border-2 border-slate-100 text-slate-400 font-bold text-sm">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('calendar');
        document.getElementById('topbar-container').innerHTML = buildTopbar('School Calendar');

        async function load() {
            const events = await window.api.getCalendarEvents();
            const container = document.getElementById('event-list');
            
            if (!events.length) {
                container.innerHTML = `
                    <div class="py-20 text-center bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
                        <i class="fa-solid fa-calendar-day text-5xl text-slate-200 mb-4 block"></i>
                        <p class="text-slate-400 font-bold italic uppercase tracking-widest text-xs">No upcoming events scheduled</p>
                    </div>`;
                return;
            }

            container.innerHTML = events.map(e => {
                const color = e.type === 'holiday' ? 'rose' : (e.type === 'exam' ? 'indigo' : 'emerald');
                const dateText = e.end_date && e.end_date !== e.start_date ? `${e.start_date} to ${e.end_date}` : e.start_date;
                
                return `
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border-2 border-prime/5 flex items-center gap-8 group hover:shadow-xl hover:border-prime/10 transition-all">
                    <div class="w-16 h-16 rounded-3xl bg-${color}-50 text-${color}-500 flex flex-col items-center justify-center flex-shrink-0">
                        <p class="text-[10px] font-black uppercase">${new Date(e.start_date).toLocaleString('default', { month: 'short' })}</p>
                        <p class="text-2xl font-black">${new Date(e.start_date).getDate()}</p>
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-1">
                            <h4 class="text-lg font-black text-slate-800">${e.title}</h4>
                            <span class="px-3 py-1 rounded-full bg-${color}-50 text-${color}-600 text-[8px] font-black uppercase tracking-widest">${e.type}</span>
                        </div>
                        <p class="text-xs text-slate-400 font-bold"><i class="fa-solid fa-clock mr-1 opacity-50"></i> ${dateText}</p>
                        ${e.description ? `<p class="text-xs text-slate-500 mt-2 font-medium">${e.description}</p>` : ''}
                    </div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="editEvent(${JSON.stringify(e).replace(/"/g, '&quot;')})" class="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 hover:bg-prime hover:text-white transition-all"><i class="fa-solid fa-pen-to-square text-xs"></i></button>
                        <button onclick="deleteEvent(${e.id})" class="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 hover:bg-rose-500 hover:text-white transition-all"><i class="fa-solid fa-trash text-xs"></i></button>
                    </div>
                </div>`;
            }).join('');
        }

        async function saveEvent(e) {
            e.preventDefault();
            const data = {
                id: document.getElementById('e-id').value,
                title: document.getElementById('e-title').value,
                start_date: document.getElementById('e-start').value,
                end_date: document.getElementById('e-end').value,
                type: document.getElementById('e-type').value,
                description: document.getElementById('e-desc').value
            };

            const res = await window.api.saveCalendarEvent(data);
            if (res.success) {
                showToast('Calendar updated!');
                closeModal('event-modal');
                load();
            } else {
                showToast(res.error, 'error');
            }
        }

        function editEvent(e) {
            document.getElementById('e-id').value = e.id;
            document.getElementById('e-title').value = e.title;
            document.getElementById('e-start').value = e.start_date;
            document.getElementById('e-end').value = e.end_date || '';
            document.getElementById('e-type').value = e.type;
            document.getElementById('e-desc').value = e.description || '';
            document.getElementById('modal-title').textContent = 'Edit Event';
            openModal('event-modal');
        }

        async function deleteEvent(id) {
            if (confirm('Remove this event from calendar?')) {
                const res = await window.api.deleteCalendarEvent(id);
                if (res.success) { showToast('Event removed.'); load(); }
                else showToast(res.error, 'error');
            }
        }

        load();
    </script>
</body>
</html>
