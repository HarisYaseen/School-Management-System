<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Timetable Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1400px] mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h3 class="text-2xl font-black text-slate-800">School Timetable</h3>
                        <p class="text-sm text-slate-400 font-medium mt-1">Design weekly schedules for each class.</p>
                    </div>
                    <div class="flex gap-3">
                        <select id="t-class-filter" onchange="loadTimetable()" class="premium-input bg-white px-6 py-3 rounded-xl text-sm font-bold w-64 shadow-sm border-2 border-prime/5 appearance-none">
                            <option value="">Select Class to View</option>
                        </select>
                        <button onclick="openAddModal()" class="bg-prime text-white px-8 py-3 rounded-xl font-black text-sm flex items-center gap-2 hover:bg-slate-700 transition-all shadow-lg shadow-prime/20">
                            <i class="fa-solid fa-calendar-plus"></i> Add Period
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-[3rem] shadow-sm border-2 border-prime/10 overflow-hidden">
                    <div class="grid grid-cols-6 border-b-2 border-slate-100 bg-slate-50/50">
                        <div class="px-6 py-6 text-center"><p class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Monday</p></div>
                        <div class="px-6 py-6 text-center"><p class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Tuesday</p></div>
                        <div class="px-6 py-6 text-center"><p class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Wednesday</p></div>
                        <div class="px-6 py-6 text-center"><p class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Thursday</p></div>
                        <div class="px-6 py-6 text-center"><p class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Friday</p></div>
                        <div class="px-6 py-6 text-center"><p class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Saturday</p></div>
                    </div>
                    <div class="grid grid-cols-6 min-h-[600px] divide-x divide-slate-100" id="timetable-grid">
                        <!-- Monday -->
                        <div class="p-4 space-y-4" data-day="Monday"></div>
                        <!-- Tuesday -->
                        <div class="p-4 space-y-4" data-day="Tuesday"></div>
                        <!-- Wednesday -->
                        <div class="p-4 space-y-4" data-day="Wednesday"></div>
                        <!-- Thursday -->
                        <div class="p-4 space-y-4" data-day="Thursday"></div>
                        <!-- Friday -->
                        <div class="p-4 space-y-4" data-day="Friday"></div>
                        <!-- Saturday -->
                        <div class="p-4 space-y-4" data-day="Saturday"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Period Modal -->
    <div id="period-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-md relative">
            <button onclick="closeModal('period-modal')" class="absolute top-8 right-8 text-slate-300 hover:text-slate-600 transition-all">
                <i class="fa-solid fa-circle-xmark text-xl"></i>
            </button>
            <h3 class="text-xl font-black text-slate-800 mb-8">Add Period</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Day of Week</label>
                    <select id="p-day" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold appearance-none">
                        <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option><option value="Saturday">Saturday</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Subject Name</label>
                    <input type="text" id="p-subject" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold" placeholder="e.g., Mathematics">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Start Time</label>
                        <input type="time" id="p-start" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">End Time</label>
                        <input type="time" id="p-end" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Assigned Teacher</label>
                    <select id="p-teacher" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold appearance-none">
                        <!-- Teachers injected -->
                    </select>
                </div>
            </div>
            <div class="mt-10">
                <button onclick="savePeriod()" class="w-full bg-prime text-white py-5 rounded-2xl font-black text-sm shadow-xl shadow-prime/20">Save to Timetable</button>
            </div>
        </div>
    </div>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('timetable');
        document.getElementById('topbar-container').innerHTML = buildTopbar('School Timetable');

        async function load() {
            const [classes, teachers] = await Promise.all([window.api.getClasses(), window.api.getStaff()]);
            
            document.getElementById('t-class-filter').innerHTML += classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            document.getElementById('p-teacher').innerHTML = teachers.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        }

        async function loadTimetable() {
            const classId = document.getElementById('t-class-filter').value;
            if (!classId) return clearGrid();

            const items = await window.api.getTimetable(classId);
            clearGrid();

            items.forEach(item => {
                const dayCol = document.querySelector(`[data-day="${item.day}"]`);
                if (dayCol) {
                    const div = document.createElement('div');
                    div.className = 'p-5 bg-white rounded-2xl border-2 border-prime/5 shadow-sm hover:border-prime/20 transition-all group relative';
                    div.innerHTML = `
                        <p class="text-[8px] font-black text-prime uppercase tracking-widest mb-1">${item.start_time} - ${item.end_time}</p>
                        <h4 class="text-sm font-black text-slate-800 leading-tight">${item.subject || 'No Subject'}</h4>
                        <p class="text-[10px] font-bold text-slate-400 mt-2"><i class="fa-solid fa-user-tie mr-1 opacity-50"></i> ${item.teacher_name || 'No Teacher'}</p>
                        <button onclick="deletePeriod(${item.id})" class="absolute top-2 right-2 text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-times text-xs"></i></button>
                    `;
                    dayCol.appendChild(div);
                }
            });
        }

        function clearGrid() {
            document.querySelectorAll('#timetable-grid > div').forEach(div => div.innerHTML = '');
        }

        function openAddModal() {
            const cid = document.getElementById('t-class-filter').value;
            if (!cid) return showToast('Please select a class first.', 'error');
            openModal('period-modal');
        }

        async function savePeriod() {
            const data = {
                class_id: document.getElementById('t-class-filter').value,
                day_of_week: document.getElementById('p-day').value,
                subject_name: document.getElementById('p-subject').value,
                start_time: document.getElementById('p-start').value,
                end_time: document.getElementById('p-end').value,
                teacher_id: document.getElementById('p-teacher').value
            };

            if (!data.subject_name || !data.start_time) return showToast('Missing required fields.', 'error');

            const res = await window.api.createTimetableItem(data);
            if (res.success) {
                showToast('Period added!');
                closeModal('period-modal');
                loadTimetable();
            }
        }

        async function deletePeriod(id) {
            if (!confirm('Remove this period?')) return;
            await window.api.deleteTimetableItem(id);
            loadTimetable();
        }

        load();
    </script>
</body>
</html>
