<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Reminders & Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[800px] mx-auto">
                <div class="flex justify-between items-center mb-10">
                    <div>
                        <h3 class="text-2xl font-black text-slate-800 tracking-tight">Daily Reminders</h3>
                        <p class="text-sm text-slate-400 font-medium mt-1">Keep track of school tasks and deadlines.</p>
                    </div>
                </div>

                <div class="bg-white rounded-[3rem] p-8 shadow-sm border-2 border-prime/5 mb-8">
                    <div class="flex gap-4">
                        <input type="text" id="rem-title" class="premium-input bg-slate-50 flex-1 px-6 py-4 rounded-2xl text-sm font-bold" placeholder="What needs to be done?">
                        <input type="date" id="rem-date" class="premium-input bg-slate-50 w-48 px-6 py-4 rounded-2xl text-sm font-bold">
                        <button onclick="addReminder()" class="bg-prime text-white px-8 py-4 rounded-2xl font-black text-sm hover:bg-slate-700 transition-all shadow-xl shadow-prime/20">Add</button>
                    </div>
                </div>

                <div class="space-y-4" id="reminders-list">
                    <!-- Injected by JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('reminders');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Reminders & Tasks');

        async function load() {
            document.getElementById('rem-date').value = new Date().toISOString().split('T')[0];
            const list = await window.api.getReminders();
            const container = document.getElementById('reminders-list');
            
            container.innerHTML = list.map(r => `
                <div class="flex items-center justify-between p-6 bg-white rounded-[2rem] border-2 ${r.is_done ? 'border-slate-50 opacity-60' : 'border-prime/5'} shadow-sm hover:shadow-md transition-all group">
                    <div class="flex items-center gap-5">
                        <button onclick="toggleReminder(${r.id}, ${r.is_done})" class="w-8 h-8 rounded-full border-2 ${r.is_done ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-200 text-transparent'} flex items-center justify-center transition-all">
                            <i class="fa-solid fa-check text-[10px]"></i>
                        </button>
                        <div>
                            <p class="text-sm font-bold ${r.is_done ? 'text-slate-400 line-through' : 'text-slate-700'}">${r.title}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">${r.reminder_date || 'No date'}</p>
                        </div>
                    </div>
                    <button onclick="deleteReminder(${r.id})" class="text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all"><i class="fa-solid fa-trash-can text-xs"></i></button>
                </div>
            `).join('') || '<div class="text-center py-20 text-slate-300 font-bold">No reminders set.</div>';
        }

        async function addReminder() {
            const title = document.getElementById('rem-title').value;
            const date = document.getElementById('rem-date').value;
            if (!title) return;
            const res = await window.api.createReminder({ title, reminder_date: date });
            if (res.success) {
                document.getElementById('rem-title').value = '';
                load();
            }
        }

        async function toggleReminder(id, isDone) {
            const newStatus = isDone ? 0 : 1;
            await window.api.call('update-reminder-status', { id, is_done: newStatus });
            load();
        }

        async function deleteReminder(id) {
            await window.api.deleteReminder(id);
            load();
        }

        load();
    </script>
</body>
</html>
