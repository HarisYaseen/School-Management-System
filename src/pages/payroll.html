<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Staff Payroll</title>
    <script src="tailwind.js"></script>
    <script src="fa.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1400px] mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h3 class="text-3xl font-black text-slate-800 tracking-tight">Staff Payroll</h3>
                        <p class="text-sm text-slate-400 font-medium mt-1">Manage monthly salary disbursements and payment history.</p>
                    </div>
                    <div class="flex gap-4">
                        <select id="filter-month" onchange="load()" class="premium-input bg-white px-5 py-3 rounded-2xl text-sm font-bold">
                            <!-- Months populated by JS -->
                        </select>
                        <button onclick="openModal('payment-modal')" class="bg-prime text-white px-8 py-3 rounded-2xl font-black text-sm flex items-center gap-2 hover:bg-slate-700 transition-all shadow-xl shadow-prime/20">
                            <i class="fa-solid fa-plus"></i> Process New Payment
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <!-- Stats -->
                    <div class="lg:col-span-12 grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border-2 border-prime/5 flex items-center gap-6">
                            <div class="w-14 h-14 rounded-2xl bg-emerald-50 text-emerald-500 flex items-center justify-center text-2xl"><i class="fa-solid fa-money-check-dollar"></i></div>
                            <div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Paid (Month)</p><p class="text-2xl font-black text-slate-800" id="stat-total-paid">Rs. 0</p></div>
                        </div>
                        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border-2 border-prime/5 flex items-center gap-6">
                            <div class="w-14 h-14 rounded-2xl bg-indigo-50 text-indigo-500 flex items-center justify-center text-2xl"><i class="fa-solid fa-users"></i></div>
                            <div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Employees Paid</p><p class="text-2xl font-black text-slate-800" id="stat-employees-paid">0 / 0</p></div>
                        </div>
                        <div class="bg-prime p-8 rounded-[2.5rem] shadow-xl shadow-prime/20 flex items-center gap-6 text-white">
                            <div class="w-14 h-14 rounded-2xl bg-white/10 flex items-center justify-center text-2xl"><i class="fa-solid fa-calendar-check"></i></div>
                            <div><p class="text-[10px] font-black text-white/40 uppercase tracking-widest">Payroll Status</p><p class="text-2xl font-black" id="stat-status">Processing</p></div>
                        </div>
                    </div>

                    <!-- Payment List -->
                    <div class="lg:col-span-12">
                        <div class="bg-white rounded-[3rem] shadow-sm border-2 border-prime/5 overflow-hidden">
                            <table class="w-full">
                                <thead class="bg-slate-50 border-b-2 border-slate-100">
                                    <tr>
                                        <th class="px-8 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Staff Member</th>
                                        <th class="px-6 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Basic Salary</th>
                                        <th class="px-6 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Allowance</th>
                                        <th class="px-6 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Deduction</th>
                                        <th class="px-6 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Net Paid</th>
                                        <th class="px-6 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Method</th>
                                        <th class="px-8 py-5 text-right text-[10px] font-black text-slate-400 uppercase tracking-widest">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="payroll-table" class="divide-y divide-slate-50"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Payment Modal -->
    <div id="payment-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-black text-slate-800">Process Salary Payment</h3>
                <button onclick="closeModal('payment-modal')" class="w-10 h-10 rounded-xl hover:bg-slate-100 text-slate-400 transition-all flex items-center justify-center"><i class="fa-solid fa-times"></i></button>
            </div>
            <form onsubmit="savePayment(event)" class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div class="col-span-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Select Staff Member</label>
                        <select id="p-staff-id" onchange="updateSalaryInfo()" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold" required></select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Salary Month</label>
                        <select id="p-month" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold"></select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Payment Date</label>
                        <input type="date" id="p-date" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Basic Salary (Rs.)</label>
                        <input type="number" id="p-basic" class="premium-input bg-slate-100 w-full px-5 py-4 rounded-2xl text-sm font-bold" readonly>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-2 block">Allowances (Rs.)</label>
                        <input type="number" id="p-allowance" oninput="calcNet()" class="premium-input bg-emerald-50 border-emerald-100 w-full px-5 py-4 rounded-2xl text-sm font-bold" value="0">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-rose-600 uppercase tracking-widest mb-2 block">Deductions (Rs.)</label>
                        <input type="number" id="p-deduction" oninput="calcNet()" class="premium-input bg-rose-50 border-rose-100 w-full px-5 py-4 rounded-2xl text-sm font-bold" value="0">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-prime uppercase tracking-widest mb-2 block">Net Amount to Pay</label>
                        <input type="number" id="p-net" class="premium-input bg-prime text-white w-full px-5 py-4 rounded-2xl text-lg font-black" readonly>
                    </div>
                    <div class="col-span-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Payment Method & Notes</label>
                        <div class="flex gap-4">
                            <select id="p-method" class="premium-input bg-slate-50 px-5 py-4 rounded-2xl text-sm font-bold min-w-[150px]">
                                <option value="Cash">Cash</option>
                                <option value="Bank Transfer">Bank Transfer</option>
                                <option value="Cheque">Cheque</option>
                            </select>
                            <input type="text" id="p-notes" class="premium-input bg-slate-50 flex-1 px-5 py-4 rounded-2xl text-sm font-bold" placeholder="Reference #, Bank name etc...">
                        </div>
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-prime text-white py-5 rounded-2xl font-black text-sm hover:bg-slate-700 transition-all shadow-xl shadow-prime/20">Confirm & Disburse Salary</button>
                    <button type="button" onclick="closeModal('payment-modal')" class="px-10 py-5 rounded-2xl border-2 border-slate-100 text-slate-400 font-bold text-sm hover:bg-slate-50 transition-all">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('payroll');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Staff Payroll');

        let allStaff = [];
        const months = [];
        for(let i=0; i<6; i++) {
            const d = new Date(); d.setMonth(d.getMonth() - i);
            months.push(d.toLocaleString('default', { month: 'long', year: 'numeric' }));
        }

        async function load() {
            const mSelect = document.getElementById('filter-month');
            const pmSelect = document.getElementById('p-month');
            if(!mSelect.options.length) {
                mSelect.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
                pmSelect.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
            }

            const month = mSelect.value;
            const [payroll, staff] = await Promise.all([
                window.api.getPayroll({ month }),
                window.api.getStaff()
            ]);
            allStaff = staff;

            // Populate staff select in modal
            const sSelect = document.getElementById('p-staff-id');
            sSelect.innerHTML = '<option value="">— Select Staff Member —</option>' + 
                staff.filter(s => s.status === 'active').map(s => `<option value="${s.id}">${s.name} (${s.designation})</option>`).join('');

            const tbody = document.getElementById('payroll-table');
            tbody.innerHTML = payroll.map(p => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-8 py-5">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-prime/5 flex items-center justify-center font-black text-prime text-xs">${p.staff_name.charAt(0)}</div>
                            <div>
                                <p class="text-sm font-black text-slate-700">${p.staff_name}</p>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${p.designation} | ${p.department}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-5 text-sm font-bold text-slate-600">${formatCurrency(p.basic_salary)}</td>
                    <td class="px-6 py-5 text-sm font-bold text-emerald-600">+ ${formatCurrency(p.allowance)}</td>
                    <td class="px-6 py-5 text-sm font-bold text-rose-600">- ${formatCurrency(p.deduction)}</td>
                    <td class="px-6 py-5 text-sm font-black text-slate-800">${formatCurrency(p.net_paid)}</td>
                    <td class="px-6 py-5 text-xs font-black text-slate-400 uppercase tracking-widest">${p.method}</td>
                    <td class="px-8 py-5 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="printSlip(${JSON.stringify(p).replace(/"/g, '&quot;')})" class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all"><i class="fa-solid fa-print text-xs"></i></button>
                            <button onclick="deletePayment(${p.id})" class="w-8 h-8 rounded-lg bg-rose-50 text-rose-600 flex items-center justify-center hover:bg-rose-600 hover:text-white transition-all"><i class="fa-solid fa-trash text-xs"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');

            if (!payroll.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-20 text-slate-300 font-bold italic uppercase tracking-widest text-xs">No payroll records for this month</td></tr>';
            }

            const totalPaid = payroll.reduce((acc, curr) => acc + curr.net_paid, 0);
            document.getElementById('stat-total-paid').textContent = formatCurrency(totalPaid);
            document.getElementById('stat-employees-paid').textContent = `${payroll.length} / ${staff.length}`;
            document.getElementById('stat-status').textContent = payroll.length === staff.length ? 'Completed' : 'In Progress';
            
            document.getElementById('p-date').value = new Date().toISOString().split('T')[0];
        }

        function updateSalaryInfo() {
            const sid = document.getElementById('p-staff-id').value;
            const staff = allStaff.find(s => s.id == sid);
            if (staff) {
                document.getElementById('p-basic').value = staff.salary || 0;
                calcNet();
            }
        }

        function calcNet() {
            const basic = parseFloat(document.getElementById('p-basic').value) || 0;
            const allowance = parseFloat(document.getElementById('p-allowance').value) || 0;
            const deduction = parseFloat(document.getElementById('p-deduction').value) || 0;
            document.getElementById('p-net').value = basic + allowance - deduction;
        }

        async function savePayment(e) {
            e.preventDefault();
            const data = {
                staff_id: document.getElementById('p-staff-id').value,
                month: document.getElementById('p-month').value,
                basic_salary: document.getElementById('p-basic').value,
                allowance: document.getElementById('p-allowance').value,
                deduction: document.getElementById('p-deduction').value,
                net_paid: document.getElementById('p-net').value,
                payment_date: document.getElementById('p-date').value,
                method: document.getElementById('p-method').value,
                notes: document.getElementById('p-notes').value
            };

            const res = await window.api.paySalary(data);
            if (res.success) {
                showToast('Salary payment recorded successfully!');
                closeModal('payment-modal');
                load();
            } else {
                showToast(res.error, 'error');
            }
        }

        async function deletePayment(id) {
            if (confirm('Are you sure you want to delete this payment record?')) {
                const res = await window.api.deleteSalaryPayment(id);
                if (res.success) { showToast('Payment record removed.'); load(); }
                else showToast(res.error, 'error');
            }
        }

        async function printSlip(p) {
            const header = await window.getPrintHeader();
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>Salary Slip - ${p.staff_name}</title>
                    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Outfit', sans-serif; padding: 40px; color: #1e293b; }
                        .slip { border: 2px solid #1e293b; padding: 40px; border-radius: 20px; }
                        table { width: 100%; border-collapse: collapse; margin: 30px 0; }
                        th, td { padding: 15px; border-bottom: 1px solid #f1f5f9; text-align: left; }
                        .label { font-weight: 900; color: #64748b; font-size: 10px; text-transform: uppercase; }
                        .val { font-weight: 700; color: #1e293b; }
                        .total { background: #f8fafc; font-size: 20px; font-weight: 900; }
                    </style>
                </head>
                <body>
                    <div class="slip">
                        ${header}
                        <h2 style="text-align:center;margin-bottom:30px;font-weight:900;text-transform:uppercase;letter-spacing:4px;color:#1e293b;">Salary Slip - ${p.month}</h2>
                        
                        <div style="display:grid;grid-template-cols:1fr 1fr;gap:40px;margin-bottom:30px;">
                            <div>
                                <p class="label">Employee Name</p>
                                <p class="val" style="font-size:24px;">${p.staff_name}</p>
                                <p class="label">Designation / Dept</p>
                                <p class="val">${p.designation} / ${p.department}</p>
                            </div>
                            <div style="text-align:right;">
                                <p class="label">Payment Date</p>
                                <p class="val">${p.payment_date}</p>
                                <p class="label">Payment Method</p>
                                <p class="val">${p.method}</p>
                            </div>
                        </div>

                        <table>
                            <tr><td class="val">Basic Salary</td><td style="text-align:right;" class="val">${formatCurrency(p.basic_salary)}</td></tr>
                            <tr><td class="val">Allowances</td><td style="text-align:right;color:#10b981;" class="val">+ ${formatCurrency(p.allowance)}</td></tr>
                            <tr><td class="val">Deductions</td><td style="text-align:right;color:#ef4444;" class="val">- ${formatCurrency(p.deduction)}</td></tr>
                            <tr class="total"><td>NET DISBURSED</td><td style="text-align:right;">${formatCurrency(p.net_paid)}</td></tr>
                        </table>

                        <p class="label">Notes</p>
                        <p class="val" style="font-size:12px;">${p.notes || 'No additional notes provided.'}</p>

                        <div style="display:flex;justify-content:space-between;margin-top:80px;">
                            <div style="border-top:2px solid #1e293b;width:200px;text-align:center;padding-top:10px;"><p class="label">Employee Signature</p></div>
                            <div style="border-top:2px solid #1e293b;width:200px;text-align:center;padding-top:10px;"><p class="label">Admin / Accountant</p></div>
                        </div>
                    </div>
                    <script>setTimeout(() => { window.print(); window.close(); }, 1000);<\/script>
                </body>
                </html>
            `);
            win.document.close();
        }

        load();
    </script>
</body>
</html>
