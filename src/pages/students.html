<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Students</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
    <style>
        @media print {
            #sidebar-container, #topbar-container, .no-print, button, input { display: none !important; }
            main { margin: 0 !important; padding: 0 !important; width: 100% !important; }
            .flex-1 { overflow: visible !important; }
            body { background: white !important; }
            .bg-white { border: none !important; box-shadow: none !important; }
            table { width: 100% !important; border-collapse: collapse !important; }
            th, td { border-bottom: 1px solid #eee !important; padding: 12px 8px !important; }
            .print-avatar { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        }
        .student-avatar { width: 40px; height: 40px; border-radius: 12px; object-fit: cover; }
        .pic-hover-overlay { background: rgba(30, 41, 59, 0.6); opacity: 0; transition: opacity 0.2s; }
        .group:hover .pic-hover-overlay { opacity: 1; }
        .modal-box { max-height: 95vh; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .modal-box::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1600px] mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h3 class="text-2xl font-black text-slate-800">All Students</h3>
                        <p class="text-sm text-slate-400 font-medium mt-1" id="student-count">Loading...</p>
                    </div>
                     <div class="flex gap-3">
                        <select id="class-filter" onchange="filterStudents()" class="premium-input bg-white px-4 py-3 rounded-xl text-sm font-medium w-48 no-print">
                            <option value="">All Classes</option>
                        </select>
                        <input type="text" id="search-filter" onkeyup="filterStudents()" placeholder="Search students..." class="premium-input bg-white px-4 py-3 rounded-xl text-sm font-medium w-64 no-print">
                        <button onclick="printStudentList()" class="bg-slate-100 text-slate-600 px-6 py-3 rounded-xl font-bold text-sm flex items-center gap-2 hover:bg-slate-200 transition-all no-print">
                            <i class="fa-solid fa-print"></i> Print List
                        </button>
                        <button onclick="openPromoteModal()" class="bg-indigo-50 text-indigo-600 px-6 py-3 rounded-xl font-bold text-sm flex items-center gap-2 hover:bg-indigo-100 transition-all no-print">
                            <i class="fa-solid fa-arrow-up-from-bracket"></i> Bulk Promote
                        </button>
                        <button onclick="openModal('student-modal')" class="bg-prime text-white px-6 py-3 rounded-xl font-bold text-sm flex items-center gap-2 hover:bg-slate-700 transition-all shadow-lg shadow-prime/20 no-print">
                            <i class="fa-solid fa-plus"></i> Add Student
                        </button>
                    </div>
                </div>
                <div class="bg-white rounded-[2rem] shadow-sm border-2 border-prime/10 overflow-hidden relative">
                    <i class="fa-solid fa-graduation-cap absolute -right-8 -top-8 text-9xl text-prime/5 -rotate-12 pointer-events-none"></i>
                    <table class="w-full">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">#</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Name</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Roll No</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Class</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Guardian</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Contact</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Gender</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Tuition Fee</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Status</th>
                                <th class="text-left px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="students-table" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="student-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-slate-800" id="modal-title">Add Student</h3>
                <button onclick="closeModal('student-modal')" class="w-8 h-8 rounded-lg hover:bg-slate-100 text-slate-400 transition-colors"><i class="fa-solid fa-times"></i></button>
            </div>
            <form onsubmit="saveStudent(event)" class="space-y-5">
                <input type="hidden" id="s-id">
                
                <!-- TOP SECTION: Picture and Identity -->
                <div class="grid grid-cols-12 gap-6 pb-4 border-b border-slate-100">
                    <div class="col-span-4">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Student Picture</label>
                        <div class="relative group cursor-pointer w-full" style="height: 140px;" onclick="uploadPicture()">
                            <div class="w-full h-full rounded-2xl bg-slate-50 border-2 border-dashed border-slate-200 flex flex-col items-center justify-center overflow-hidden hover:border-prime transition-all" id="pic-preview-container">
                                <i class="fa-solid fa-camera text-xl text-slate-300 mb-1"></i>
                                <p class="text-[8px] font-black text-slate-400 uppercase text-center px-2">Click to Upload</p>
                            </div>
                            <div id="pic-wrapper" class="hidden absolute inset-0 w-full h-full">
                                <img id="pic-preview" class="w-full h-full object-cover rounded-2xl border-2 border-prime/10">
                                <div class="pic-hover-overlay absolute inset-0 flex items-center justify-center rounded-2xl">
                                    <span class="text-white text-[10px] font-black uppercase tracking-widest"><i class="fa-solid fa-sync mr-1"></i> Change</span>
                                </div>
                            </div>
                            <input type="hidden" id="s-picture">
                        </div>
                    </div>
                    <div class="col-span-8 space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Full Name *</label>
                                <input type="text" id="s-name" class="premium-input bg-slate-50 w-full px-4 py-2.5 rounded-xl text-sm font-bold" required>
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Roll No *</label>
                                <input type="text" id="s-roll" class="premium-input bg-slate-50 w-full px-4 py-2.5 rounded-xl text-sm font-bold" required>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Class *</label>
                                <select id="s-class" class="premium-input bg-slate-50 w-full px-4 py-2.5 rounded-xl text-sm font-bold" required></select>
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Gender *</label>
                                <select id="s-gender" class="premium-input bg-slate-50 w-full px-4 py-2.5 rounded-xl text-sm font-bold" required>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- MIDDLE SECTION: Fees and Concession -->
                <div class="grid grid-cols-3 gap-4 pb-4 border-b border-slate-100">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Monthly Fee</label>
                        <input type="number" id="s-fee" class="premium-input bg-slate-50 w-full px-4 py-2.5 rounded-xl text-sm font-bold" placeholder="0">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Admission Fee</label>
                        <input type="number" id="s-admission-fee" class="premium-input bg-slate-50 w-full px-4 py-2.5 rounded-xl text-sm font-bold" placeholder="0">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-1 block font-black">Concession</label>
                        <input type="number" id="s-concession" class="premium-input bg-emerald-50 border-2 border-emerald-100 w-full px-4 py-2.5 rounded-xl text-sm font-bold text-emerald-700" placeholder="0">
                    </div>
                </div>

                <!-- BOTTOM SECTION: Contact and Status -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Guardian Name</label>
                        <input type="text" id="s-guardian" class="premium-input bg-slate-50 w-full px-4 py-2.5 rounded-xl text-sm font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Contact Number</label>
                        <input type="text" id="s-contact" class="premium-input bg-slate-50 w-full px-4 py-2.5 rounded-xl text-sm font-bold">
                    </div>
                    <div id="status-field" class="hidden col-span-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Student Account Status</label>
                        <select id="s-status" class="premium-input bg-slate-50 w-full px-4 py-2.5 rounded-xl text-sm font-bold">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 bg-prime text-white py-4 rounded-xl font-black text-sm hover:bg-slate-700 transition-all shadow-xl shadow-prime/20">Save Student Information</button>
                    <button type="button" onclick="closeModal('student-modal')" class="px-8 py-4 rounded-xl border-2 border-slate-100 text-slate-400 font-bold text-sm hover:bg-slate-50 transition-all">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="promote-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-slate-800">Bulk Student Promotion</h3>
                <button onclick="closeModal('promote-modal')" class="w-8 h-8 rounded-lg hover:bg-slate-100 text-slate-400 transition-colors"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Promote From (Class)</label>
                    <select id="p-from-class" onchange="loadStudentsForPromotion()" class="premium-input bg-white w-full px-4 py-3 rounded-xl text-sm font-bold"></select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Promote To (Target Class)</label>
                    <select id="p-to-class" class="premium-input bg-white w-full px-4 py-3 rounded-xl text-sm font-bold"></select>
                </div>
            </div>

            <div class="mb-4 flex justify-between items-center">
                <h4 class="text-xs font-black text-slate-500 uppercase tracking-wider">Select Students (<span id="p-selected-count">0</span>)</h4>
                <button onclick="toggleAllPromotion()" class="text-[10px] font-black text-prime uppercase hover:underline">Toggle All</button>
            </div>

            <div class="max-h-64 overflow-y-auto mb-6 bg-white border border-slate-100 rounded-2xl divide-y divide-slate-50" id="p-student-list">
                <div class="p-8 text-center text-slate-300 font-bold text-xs uppercase italic">Select a class to see students</div>
            </div>

            <div class="mb-6">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Update Monthly Fee for New Class (Optional)</label>
                <input type="number" id="p-new-fee" class="premium-input bg-slate-50 w-full px-4 py-3 rounded-xl text-sm font-bold" placeholder="Leave empty to keep current fees">
                <p class="text-[9px] text-slate-400 mt-1 font-medium">Tip: Most schools increase fees when promoting to a higher class.</p>
            </div>

            <div class="flex gap-3">
                <button onclick="executePromotion()" class="flex-1 bg-prime text-white py-4 rounded-xl font-black text-sm hover:bg-slate-700 transition-all shadow-xl shadow-prime/20">Execute Bulk Promotion</button>
                <button type="button" onclick="closeModal('promote-modal')" class="px-8 py-4 rounded-xl border-2 border-slate-100 text-slate-400 font-bold text-sm hover:bg-slate-50 transition-all">Cancel</button>
            </div>
        </div>
    </div>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('students');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Students');

        let allStudents = [];
        let classes = [];

        async function load() {
            [allStudents, classes] = await Promise.all([window.api.getStudents(), window.api.getClasses()]);
            renderTable(allStudents);
            document.getElementById('student-count').textContent = allStudents.length + ' total students';
            const sel = document.getElementById('s-class');
            const classHtml = '<option value="">Select Class</option>' + classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            sel.innerHTML = classHtml;
            
            const filterSel = document.getElementById('class-filter');
            filterSel.innerHTML = '<option value="">All Classes</option>' + classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        async function renderTable(data) {
            const tbody = document.getElementById('students-table');
            const rows = await Promise.all(data.map(async (s, i) => {
                let picUrl = '';
                if (s.picture) {
                    const url = await window.api.getStudentPictureUrl(s.picture);
                    if (url) picUrl = url;
                }
                
                return `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-6 py-4 text-sm font-bold text-slate-400">${i + 1}</td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-prime/10 overflow-hidden flex items-center justify-center">
                                ${picUrl ? `<img src="${picUrl}" class="w-full h-full object-cover">` : `<span class="text-prime font-black text-sm">${s.name.charAt(0)}</span>`}
                            </div>
                            <span class="font-bold text-slate-700">${s.name}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm font-bold text-slate-600">${s.roll_no}</td>
                    <td class="px-6 py-4 text-sm font-bold text-slate-600">${s.class_name || '—'}</td>
                    <td class="px-6 py-4 text-sm font-medium text-slate-500">${s.guardian_name || '—'}</td>
                    <td class="px-6 py-4 text-sm font-medium text-slate-500">${s.contact_number || '—'}</td>
                    <td class="px-6 py-4 text-sm font-bold text-slate-600">${s.gender || 'Male'}</td>
                    <td class="px-6 py-4 text-sm font-bold text-prime">
                        Rs. ${formatNum(s.monthly_fee || 0)}
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-lg text-[10px] font-black uppercase ${s.status === 'active' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">${s.status}</span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex gap-2">
                            <button onclick="editStudent(${s.id})" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-indigo-100 hover:text-indigo-600 text-slate-400 transition-all flex items-center justify-center"><i class="fa-solid fa-pen text-xs"></i></button>
                            <button onclick="deleteStudent(${s.id},'${s.name}')" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-rose-100 hover:text-rose-600 text-slate-400 transition-all flex items-center justify-center"><i class="fa-solid fa-trash text-xs"></i></button>
                            <button onclick="window.location.href='fees.html?student=${s.id}'" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-emerald-100 hover:text-emerald-600 text-slate-400 transition-all flex items-center justify-center"><i class="fa-solid fa-wallet text-xs"></i></button>
                        </div>
                    </td>
                </tr>`;
            }));

            tbody.innerHTML = rows.length ? rows.join('') : '<tr><td colspan="10" class="text-center py-16 text-slate-300 font-bold">No students found. Add your first student!</td></tr>';
        }

        function filterStudents() {
            const q = document.getElementById('search-filter').value.toLowerCase();
            const classId = document.getElementById('class-filter').value;
            
            const filtered = allStudents.filter(s => {
                const matchesSearch = s.name.toLowerCase().includes(q) || s.roll_no.toLowerCase().includes(q);
                const matchesClass = !classId || s.class_id == classId;
                return matchesSearch && matchesClass;
            });
            renderTable(filtered);
        }

        let editingId = null;
        function openModal(id) {
            editingId = null;
            document.getElementById('modal-title').textContent = 'Add Student';
            document.getElementById('student-modal').classList.remove('hidden');
            ['s-id','s-name','s-roll','s-fee','s-admission-fee','s-guardian','s-contact','s-picture','s-concession'].forEach(f => document.getElementById(f).value = '');
            document.getElementById('s-class').value = '';
            document.getElementById('s-gender').value = 'Male';
            document.getElementById('status-field').classList.add('hidden');
            
            document.getElementById('pic-wrapper').classList.add('hidden');
            document.getElementById('pic-preview').src = '';
            document.getElementById('pic-preview-container').classList.remove('hidden');
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        async function editStudent(id) {
            const s = allStudents.find(x => x.id === id);
            if (!s) return;
            editingId = id;
            document.getElementById('modal-title').textContent = 'Edit Student';
            document.getElementById('s-id').value = s.id;
            document.getElementById('s-name').value = s.name;
            document.getElementById('s-roll').value = s.roll_no;
            document.getElementById('s-class').value = s.class_id;
            document.getElementById('s-fee').value = s.monthly_fee || 0;
            document.getElementById('s-admission-fee').value = s.admission_fee || 0;
            document.getElementById('s-guardian').value = s.guardian_name || '';
            document.getElementById('s-contact').value = s.contact_number || '';
            document.getElementById('s-status').value = s.status || 'active';
            document.getElementById('s-picture').value = s.picture || '';
            document.getElementById('s-gender').value = s.gender || 'Male';
            document.getElementById('s-concession').value = s.concession || 0;
            
            if (s.picture) {
                const url = await window.api.getStudentPictureUrl(s.picture);
                if (url) {
                    const img = document.getElementById('pic-preview');
                    img.src = url;
                    document.getElementById('pic-wrapper').classList.remove('hidden');
                    document.getElementById('pic-preview-container').classList.add('hidden');
                }
            } else {
                document.getElementById('pic-wrapper').classList.add('hidden');
                document.getElementById('pic-preview-container').classList.remove('hidden');
            }

            document.getElementById('status-field').classList.remove('hidden');
            document.getElementById('student-modal').classList.remove('hidden');
        }

        async function uploadPicture() {
            try {
                const result = await window.api.uploadStudentPicture();
                if (result && result.error) {
                    showToast('Upload failed: ' + result.error, 'error');
                    return;
                }
                
                if (result) {
                    const fileName = result;
                    document.getElementById('s-picture').value = fileName;
                    const url = await window.api.getStudentPictureUrl(fileName);
                    if (url) {
                        const img = document.getElementById('pic-preview');
                        img.src = url;
                        document.getElementById('pic-wrapper').classList.remove('hidden');
                        document.getElementById('pic-preview-container').classList.add('hidden');
                    }
                }
            } catch (err) {
                showToast('Failed to upload picture: ' + err.message, 'error');
            }
        }

        async function saveStudent(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const oldText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Saving...';

            const data = {
                id: document.getElementById('s-id').value,
                name: document.getElementById('s-name').value,
                roll_no: document.getElementById('s-roll').value,
                class_id: document.getElementById('s-class').value,
                monthly_fee: document.getElementById('s-fee').value,
                admission_fee: document.getElementById('s-admission-fee').value,
                guardian_name: document.getElementById('s-guardian').value,
                contact_number: document.getElementById('s-contact').value,
                status: document.getElementById('s-status').value,
                picture: document.getElementById('s-picture').value,
                gender: document.getElementById('s-gender').value,
                concession: document.getElementById('s-concession').value || 0,
            };
            try {
                const result = editingId ? await window.api.updateStudent(data) : await window.api.createStudent(data);
                if (result.success) { closeModal('student-modal'); showToast(editingId ? 'Student updated!' : 'Student added!'); load(); }
                else showToast(result.error || 'Failed to save.', 'error');
            } catch (err) {
                showToast('System error occurred.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = oldText;
            }
        }

        async function deleteStudent(id, name) {
            if (!confirm(`Delete student "${name}"? This cannot be undone.`)) return;
            const result = await window.api.deleteStudent(id);
            if (result.success) { showToast('Student deleted.'); load(); }
            else showToast('Failed to delete.', 'error');
        }

        async function openPromoteModal() {
            const selectFrom = document.getElementById('p-from-class');
            const selectTo = document.getElementById('p-to-class');
            const currentFilter = document.getElementById('class-filter').value;

            const html = '<option value="">— Select Class —</option>' + classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            selectFrom.innerHTML = html;
            selectTo.innerHTML = html;
            
            // Auto-select current class if filtered
            if (currentFilter) {
                selectFrom.value = currentFilter;
                loadStudentsForPromotion();
            } else {
                document.getElementById('p-student-list').innerHTML = '<div class="p-8 text-center text-slate-300 font-bold text-xs uppercase italic">Select a class to see students</div>';
                document.getElementById('p-selected-count').textContent = '0';
            }

            document.getElementById('p-new-fee').value = '';
            document.getElementById('promote-modal').classList.remove('hidden');
        }

        let promoStudents = [];
        async function loadStudentsForPromotion() {
            const classId = document.getElementById('p-from-class').value;
            const container = document.getElementById('p-student-list');
            if (!classId) { container.innerHTML = '<div class="p-8 text-center text-slate-300 font-bold text-xs uppercase italic">Select a class to see students</div>'; return; }

            promoStudents = allStudents.filter(s => s.class_id == classId && s.status === 'active');
            if (promoStudents.length === 0) { container.innerHTML = '<div class="p-8 text-center text-slate-400 font-bold text-xs">No active students found in this class.</div>'; return; }

            container.innerHTML = promoStudents.map(s => `
                <div class="flex items-center gap-4 px-6 py-3 hover:bg-slate-50 transition-colors">
                    <input type="checkbox" value="${s.id}" checked class="p-check-box w-4 h-4 rounded border-slate-300 text-prime focus:ring-prime" onchange="updatePromoCount()">
                    <div class="flex-1">
                        <p class="text-sm font-bold text-slate-700">${s.name}</p>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Roll: ${s.roll_no} | Current Fee: Rs. ${s.monthly_fee}</p>
                    </div>
                </div>
            `).join('');
            updatePromoCount();
        }

        function updatePromoCount() {
            const checked = document.querySelectorAll('.p-check-box:checked').length;
            document.getElementById('p-selected-count').textContent = checked;
        }

        function toggleAllPromotion() {
            const boxes = document.querySelectorAll('.p-check-box');
            const anyUnchecked = Array.from(boxes).some(b => !b.checked);
            boxes.forEach(b => b.checked = anyUnchecked);
            updatePromoCount();
        }

        async function executePromotion() {
            const fromClass = document.getElementById('p-from-class').value;
            const toClass = document.getElementById('p-to-class').value;
            const newFee = document.getElementById('p-new-fee').value;
            const selectedIds = Array.from(document.querySelectorAll('.p-check-box:checked')).map(b => b.value);

            if (!toClass) return showToast('Please select a target class!', 'error');
            if (selectedIds.length === 0) return showToast('No students selected!', 'error');
            if (fromClass === toClass) return showToast('Source and Target class cannot be same!', 'error');

            if (!confirm(`Are you sure you want to promote ${selectedIds.length} students to ${document.getElementById('p-to-class').options[document.getElementById('p-to-class').selectedIndex].text}?`)) return;

            const btn = document.querySelector('#promote-modal button[onclick="executePromotion()"]');
            btn.disabled = true; btn.textContent = 'Executing...';

            try {
                const res = await window.api.promoteStudents({ studentIds: selectedIds, targetClassId: toClass, newFee: newFee });
                if (res.success) {
                    showToast(`Successfully promoted ${selectedIds.length} students!`);
                    closeModal('promote-modal');
                    load();
                } else {
                    showToast('Promotion failed: ' + res.error, 'error');
                }
            } catch (err) {
                showToast('System error occurred.', 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Execute Bulk Promotion';
            }
        }

        async function printStudentList() {
            const header = await window.getPrintHeader();
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>Student Directory</title>
                    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Outfit', sans-serif; padding: 40px; color: #1e293b; }
                        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
                        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
                        th { font-weight: 900; text-transform: uppercase; font-size: 11px; color: #64748b; background: #f8fafc; }
                        .roll { font-weight: 900; color: #1e293b; }
                        @media print { body { padding: 0; } }
                    </style>
                </head>
                <body>
                    ${header}
                    <h2 style="text-align:center;margin-bottom:0;">STUDENT DIRECTORY</h2>
                    <p style="text-align:center;color:#64748b;font-weight:700;margin-top:5px;">Total Students: ${allStudents.length}</p>
                    <table>
                        <thead>
                            <tr><th>#</th><th>Name</th><th>Roll No</th><th>Class</th><th>Guardian</th><th>Contact</th></tr>
                        </thead>
                        <tbody>
                            ${allStudents.map((s, i) => {
                                return `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td style="font-weight:700;">${s.name}</td>
                                    <td class="roll">${s.roll_no}</td>
                                    <td>${s.class_name || '—'}</td>
                                    <td>${s.guardian_name || '—'}</td>
                                    <td>${s.contact_number || '—'}</td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                    <script>setTimeout(()=> { window.print(); window.close(); }, 1000);<\/script>
                </body>
                </html>
            `);
            win.document.close();
        }

        load();
    </script>
</body>
</html>
