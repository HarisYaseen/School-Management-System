<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Reporting Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1200px] mx-auto">
                <div class="mb-12">
                    <h3 class="text-3xl font-black text-slate-800 tracking-tight">Reporting Center</h3>
                    <p class="text-sm text-slate-400 font-medium mt-1">Generate deep analytics and official school documents.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- Academic Reports -->
                    <div class="bg-white rounded-[2.5rem] p-8 border-2 border-prime/5 shadow-sm hover:shadow-xl transition-all group">
                        <div class="w-14 h-14 rounded-2xl bg-indigo-50 text-indigo-500 flex items-center justify-center text-xl mb-6 group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-graduation-cap"></i>
                        </div>
                        <h4 class="text-lg font-black text-slate-800 mb-2">Academic Reports</h4>
                        <div class="space-y-3">
                            <button onclick="window.location.href='students.html'" class="w-full text-left p-4 bg-slate-50 rounded-2xl text-xs font-bold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition-all flex justify-between items-center">
                                Student Directory <i class="fa-solid fa-chevron-right text-[10px]"></i>
                            </button>
                            <button onclick="window.location.href='certificates.html'" class="w-full text-left p-4 bg-slate-50 rounded-2xl text-xs font-bold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition-all flex justify-between items-center">
                                Certificates Hub <i class="fa-solid fa-chevron-right text-[10px]"></i>
                            </button>
                            <button onclick="window.location.href='attendance.html'" class="w-full text-left p-4 bg-slate-50 rounded-2xl text-xs font-bold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition-all flex justify-between items-center">
                                Attendance Register <i class="fa-solid fa-chevron-right text-[10px]"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Financial Reports -->
                    <div class="bg-white rounded-[2.5rem] p-8 border-2 border-prime/5 shadow-sm hover:shadow-xl transition-all group">
                        <div class="w-14 h-14 rounded-2xl bg-emerald-50 text-emerald-500 flex items-center justify-center text-xl mb-6 group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-wallet"></i>
                        </div>
                        <h4 class="text-lg font-black text-slate-800 mb-2">Financial Reports</h4>
                        <div class="space-y-3">
                            <button onclick="showDailyReport()" class="w-full text-left p-4 bg-prime text-white rounded-2xl text-xs font-bold hover:bg-slate-700 transition-all flex justify-between items-center shadow-lg shadow-prime/20">
                                Daily Collection Report <i class="fa-solid fa-clock-rotate-left text-[10px]"></i>
                            </button>
                            <button onclick="showFeeReport()" class="w-full text-left p-4 bg-slate-50 rounded-2xl text-xs font-bold text-slate-600 hover:bg-emerald-50 hover:text-emerald-600 transition-all flex justify-between items-center">
                                Monthly Fee Collection <i class="fa-solid fa-chevron-right text-[10px]"></i>
                            </button>
                            <button onclick="showDefaulters()" class="w-full text-left p-4 bg-slate-50 rounded-2xl text-xs font-bold text-rose-600 hover:bg-rose-50 transition-all flex justify-between items-center">
                                Fee Defaulters List <i class="fa-solid fa-triangle-exclamation text-[10px]"></i>
                            </button>
                            <button onclick="window.location.href='expenses.html'" class="w-full text-left p-4 bg-slate-50 rounded-2xl text-xs font-bold text-slate-600 hover:bg-emerald-50 hover:text-emerald-600 transition-all flex justify-between items-center">
                                Expense Statement <i class="fa-solid fa-chevron-right text-[10px]"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Staff & HR Reports -->
                    <div class="bg-white rounded-[2.5rem] p-8 border-2 border-prime/5 shadow-sm hover:shadow-xl transition-all group">
                        <div class="w-14 h-14 rounded-2xl bg-amber-50 text-amber-500 flex items-center justify-center text-xl mb-6 group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-user-tie"></i>
                        </div>
                        <h4 class="text-lg font-black text-slate-800 mb-2">Staff & HR</h4>
                        <div class="space-y-3">
                            <button onclick="window.location.href='staff.html'" class="w-full text-left p-4 bg-slate-50 rounded-2xl text-xs font-bold text-slate-600 hover:bg-amber-50 hover:text-amber-600 transition-all flex justify-between items-center">
                                Employee Records <i class="fa-solid fa-chevron-right text-[10px]"></i>
                            </button>
                            <button onclick="window.location.href='id_cards.html'" class="w-full text-left p-4 bg-slate-50 rounded-2xl text-xs font-bold text-slate-600 hover:bg-amber-50 hover:text-amber-600 transition-all flex justify-between items-center">
                                ID Card Center <i class="fa-solid fa-chevron-right text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Report View Modal -->
    <div id="report-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-5xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-slate-800" id="report-title">Report View</h3>
                <div class="flex gap-2">
                    <button onclick="printReport()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-xs font-black uppercase"><i class="fa-solid fa-print mr-1"></i> Print</button>
                    <button onclick="closeModal('report-modal')" class="w-10 h-10 rounded-xl hover:bg-slate-100 text-slate-400 transition-colors flex items-center justify-center"><i class="fa-solid fa-times"></i></button>
                </div>
            </div>
            <div class="overflow-auto max-h-[70vh] rounded-2xl border border-slate-100" id="report-content">
                <!-- Data Table -->
            </div>
        </div>
    </div>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('reports');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Reporting Center');

        let currentReportData = [];
        let currentReportType = '';

        async function showDailyReport() {
            const today = new Date().toISOString().split('T')[0];
            const data = await window.api.getDailyCollection(today);
            currentReportData = data;
            currentReportType = 'Daily Collection Report (' + new Date().toLocaleDateString() + ')';
            
            document.getElementById('report-title').textContent = currentReportType;
            document.getElementById('report-content').innerHTML = `
                <table class="w-full">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase">#</th>
                            <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Student</th>
                            <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Type</th>
                            <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Description</th>
                            <th class="px-6 py-4 text-right text-[10px] font-black text-slate-400 uppercase pr-8">Amount</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        ${data.map((r, i) => `
                            <tr>
                                <td class="px-6 py-4 text-xs font-black text-slate-300">${i + 1}</td>
                                <td class="px-6 py-4 text-xs font-black text-slate-800">${r.student_name}</td>
                                <td class="px-6 py-4 text-[9px] font-black uppercase text-indigo-500">${r.type}</td>
                                <td class="px-6 py-4 text-xs font-medium text-slate-500">${r.description || '—'}</td>
                                <td class="px-6 py-4 text-xs font-black text-emerald-600 text-right pr-8">${formatCurrency(r.credit)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                    <tfoot class="bg-slate-50 border-t-2 border-slate-100">
                        <tr>
                            <td colspan="4" class="px-6 py-4 text-right text-xs font-black text-slate-400 uppercase tracking-widest">Total Collection</td>
                            <td class="px-6 py-4 text-right text-sm font-black text-prime pr-8">${formatCurrency(data.reduce((acc, curr) => acc + (curr.credit || 0), 0))}</td>
                        </tr>
                    </tfoot>
                </table>
            `;
            openModal('report-modal');
        }

        async function showFeeReport() {
            const data = await window.api.getFeeReport({ month: new Date().toLocaleString('default', { month: 'long', year: 'numeric' }) });
            currentReportData = data;
            currentReportType = 'Monthly Fee Status';
            
            document.getElementById('report-title').textContent = currentReportType;
            document.getElementById('report-content').innerHTML = `
                <table class="w-full">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Student</th>
                            <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Class</th>
                            <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Total Payable</th>
                            <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Total Paid</th>
                            <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Balance</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        ${data.map(r => `
                            <tr>
                                <td class="px-6 py-4 text-xs font-bold text-slate-700">${r.student_name}</td>
                                <td class="px-6 py-4 text-xs font-bold text-slate-500">${r.class_name}</td>
                                <td class="px-6 py-4 text-xs font-bold text-slate-600">${formatCurrency(r.total_debit)}</td>
                                <td class="px-6 py-4 text-xs font-bold text-emerald-600">${formatCurrency(r.total_credit)}</td>
                                <td class="px-6 py-4 text-xs font-black ${r.balance > 0 ? 'text-rose-600' : 'text-slate-400'}">${formatCurrency(r.balance)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            openModal('report-modal');
        }

        async function showDefaulters() {
            const data = await window.api.getDefaultersReport({ minBalance: 100 });
            currentReportData = data;
            currentReportType = 'Fee Defaulters List';
            
            document.getElementById('report-title').textContent = currentReportType;
            document.getElementById('report-content').innerHTML = `
                <table class="w-full">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Student</th>
                            <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Class</th>
                            <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Contact</th>
                            <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Total Dues</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        ${data.map(r => `
                            <tr class="bg-rose-50/20">
                                <td class="px-6 py-4 text-xs font-black text-slate-800">${r.student_name}</td>
                                <td class="px-6 py-4 text-xs font-bold text-slate-500">${r.class_name}</td>
                                <td class="px-6 py-4 text-xs font-bold text-prime">${r.contact_number || '—'}</td>
                                <td class="px-6 py-4 text-xs font-black text-rose-600">${formatCurrency(r.balance)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            openModal('report-modal');
        }

        async function printReport() {
            const header = await window.getPrintHeader();
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>${currentReportType}</title>
                    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Outfit', sans-serif; padding: 40px; color: #1e293b; }
                        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
                        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: left; }
                        th { background: #f8fafc; font-weight: 900; font-size: 10px; text-transform: uppercase; }
                        td { font-size: 11px; font-weight: 700; }
                    </style>
                </head>
                <body>
                    ${header}
                    <h2 style="text-align:center;">${currentReportType}</h2>
                    <p style="text-align:center;font-size:11px;color:#64748b;">Generated on: ${new Date().toLocaleString()}</p>
                    ${document.getElementById('report-content').innerHTML}
                    <script>setTimeout(() => { window.print(); window.close(); }, 1000);<\/script>
                </body>
                </html>
            `);
            win.document.close();
        }
    </script>
</body>
</html>
