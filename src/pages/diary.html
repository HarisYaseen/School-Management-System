<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Daily Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1400px] mx-auto space-y-8">
                
                <div class="flex justify-between items-center mb-2">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800">Daily Diary Hub</h2>
                        <p class="text-slate-500 font-medium mt-1">Send homework and notices to parents via WhatsApp</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    <!-- Left: Diary Input -->
                    <div class="lg:col-span-1 space-y-8">
                        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border-2 border-prime/10 relative overflow-hidden">
                            <i class="fa-solid fa-graduation-cap absolute -right-8 -top-8 text-9xl text-prime/5 -rotate-12 pointer-events-none"></i>
                            <h3 class="text-xl font-black text-slate-800 mb-6 relative z-10">Compose Diary</h3>
                            
                            <div class="space-y-6 relative z-10">
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Target Class</label>
                                    <select id="diary-class" onchange="loadClassStudents()" class="w-full bg-slate-50 border border-slate-100 rounded-xl p-4 text-sm font-bold outline-none focus:border-prime transition-all">
                                        <option value="">Select Class...</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Diary / Homework Content</label>
                                    <textarea id="diary-content" rows="10" class="w-full bg-slate-50 border border-slate-100 rounded-xl p-4 text-sm font-bold outline-none focus:border-prime transition-all" placeholder="Enter today's homework, class work, or notices here..."></textarea>
                                </div>
                                <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-tight">Pro Tip:</p>
                                    <p class="text-[11px] text-blue-500 font-medium mt-1">Include things like homework, class behavior, or important reminders.</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Student List & Smart Queue -->
                    <div class="lg:col-span-2 space-y-8">
                        <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/10 overflow-hidden relative">
                            <i class="fa-solid fa-graduation-cap absolute -right-12 -top-12 text-[15rem] text-prime/5 -rotate-12 pointer-events-none"></i>
                            
                            <div class="p-8 border-b border-slate-50 flex justify-between items-center relative z-10">
                                <div>
                                    <h3 class="text-xl font-black text-slate-800">Parent Contacts</h3>
                                    <p class="text-xs font-bold text-slate-400 mt-1" id="student-count">0 students in class</p>
                                </div>
                                <div class="flex items-center gap-4">
                                    <div class="flex items-center gap-2 bg-slate-50 px-3 py-2 rounded-xl border border-slate-100">
                                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Delay (sec)</label>
                                        <input type="number" id="queue-delay" value="3" min="1" max="10" class="w-10 bg-transparent text-xs font-black text-prime outline-none">
                                    </div>
                                    <button onclick="handleMainButtonClick()" id="smart-queue-btn" class="bg-emerald-500 text-white px-6 py-3 rounded-xl font-black text-xs shadow-lg shadow-emerald-500/20 hover:scale-105 transition-all flex items-center gap-2 disabled:opacity-50 disabled:scale-100">
                                        <i class="fa-solid fa-bolt"></i> Start Rapid Fire
                                    </button>
                                </div>
                            </div>

                            <div class="overflow-x-auto relative z-10">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-slate-50/50">
                                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Student & Roll No</th>
                                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Parent Contact</th>
                                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Status</th>
                                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="student-list-body" class="divide-y divide-slate-50">
                                        <tr>
                                            <td colspan="4" class="p-20 text-center">
                                                <div class="flex flex-col items-center gap-4 text-slate-300">
                                                    <i class="fa-solid fa-users text-5xl"></i>
                                                    <p class="font-bold">Select a class to load students</p>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('diary');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Daily Diary');

        let students = [];
        let classes = [];
        let sentSet = new Set();
        let queueIndex = 0;
        let isQueueActive = false;

        async function init() {
            classes = await window.api.getClasses();
            const select = document.getElementById('diary-class');
            classes.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name;
                select.appendChild(opt);
            });
        }

        async function loadClassStudents() {
            const classId = document.getElementById('diary-class').value;
            if (!classId) return;
            
            const allStudents = await window.api.getStudents();
            students = allStudents.filter(s => s.class_id == classId);
            document.getElementById('student-count').textContent = `${students.length} students in class`;
            renderList();
        }

        function renderList() {
            const body = document.getElementById('student-list-body');
            if (students.length === 0) {
                body.innerHTML = `<tr><td colspan="4" class="p-20 text-center text-slate-300 font-bold">No students found in this class.</td></tr>`;
                return;
            }

            body.innerHTML = students.map((s, index) => {
                const isSent = sentSet.has(s.id);
                return `
                    <tr class="hover:bg-slate-50/50 transition-colors group ${isSent ? 'opacity-50' : ''}" id="row-${s.id}">
                        <td class="p-6">
                            <p class="text-sm font-black text-slate-700">${s.name}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Roll No: ${s.roll_no || 'N/A'}</p>
                        </td>
                        <td class="p-6">
                            <p class="text-xs font-bold text-slate-600">${s.contact_number || 'No Number'}</p>
                        </td>
                        <td class="p-6 text-center">
                            <span class="text-[9px] font-black px-3 py-1.5 rounded-lg ${isSent ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'} uppercase tracking-widest">
                                ${isSent ? 'Sent' : 'Pending'}
                            </span>
                        </td>
                        <td class="p-6 text-right">
                            <button onclick="sendToParent(${s.id}, ${index})" class="text-prime hover:text-emerald-500 transition-all font-black text-xs flex items-center gap-2 justify-end ml-auto">
                                <i class="fa-brands fa-whatsapp text-lg"></i> Send Now
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        let queueTimer = null;

        function smartQueueStart() {
            const content = document.getElementById('diary-content').value.trim();
            if (!content) {
                showToast('Please write the diary content first!', 'error');
                return;
            }
            
            if (students.length === 0) {
                showToast('No students to load!', 'error');
                return;
            }

            isQueueActive = true;
            queueIndex = 0;
            const btn = document.getElementById('smart-queue-btn');
            btn.classList.replace('bg-emerald-500', 'bg-rose-500'); 
            processQueue();
        }

        function smartQueueStop() {
            isQueueActive = false;
            clearTimeout(queueTimer);
            const btn = document.getElementById('smart-queue-btn');
            btn.classList.replace('bg-rose-500', 'bg-emerald-500');
            btn.innerHTML = '<i class="fa-solid fa-bolt"></i> Start Rapid Fire';
            showToast('Rapid Fire Stopped', 'info');
        }

        function processQueue() {
            if (!isQueueActive) return;

            while (queueIndex < students.length && sentSet.has(students[queueIndex].id)) {
                queueIndex++;
            }

            const btn = document.getElementById('smart-queue-btn');

            if (queueIndex >= students.length) {
                showToast('All messages sent!', 'success');
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Finished';
                btn.classList.replace('bg-rose-500', 'bg-emerald-500');
                isQueueActive = false;
                return;
            }

            const s = students[queueIndex];
            btn.innerHTML = `<i class="fa-solid fa-stop"></i> Stop Sending (${s.name.split(' ')[0]}...)`;
            
            document.querySelectorAll('tr').forEach(tr => tr.classList.remove('bg-blue-50'));
            const row = document.getElementById(`row-${s.id}`);
            if (row) {
                row.classList.add('bg-blue-50');
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            sendToParent(s.id, queueIndex);
        }

        function sendToParent(id, index) {
            const student = students[index];
            const content = document.getElementById('diary-content').value.trim();
            
            if (!content) {
                showToast('Please write the diary content first!', 'error');
                return;
            }

            if (!student.contact_number) {
                showToast(`No number for ${student.name}`, 'error');
                if (isQueueActive) {
                    queueIndex++;
                    setTimeout(processQueue, 1000);
                }
                return;
            }

            let num = student.contact_number.replace(/\D/g, '');
            if (num.length === 10) num = '92' + num;
            else if (num.startsWith('0')) num = '92' + num.substring(1);

            const message = encodeURIComponent(`*DAILY DIARY - ${student.name.toUpperCase()}*\n\n${content}\n\n_Regards, School Management_`);
            const url = `https://wa.me/${num}?text=${message}`;
            
            window.api.sendWhatsApp(url);
            sentSet.add(student.id);
            renderList();

            if (isQueueActive) {
                queueIndex++;
                const delay = parseInt(document.getElementById('queue-delay').value) * 1000;
                queueTimer = setTimeout(processQueue, delay);
            }
        }

        function handleMainButtonClick() {
            if (!isQueueActive) smartQueueStart();
            else smartQueueStop();
        }

        // KEYBOARD SUPPORT: Escape key to stop
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isQueueActive) {
                smartQueueStop();
            }
        });

        init();
    </script>
</body>
</html>
