<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Digital Daily Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1200px] mx-auto">
                <div class="grid grid-cols-12 gap-8">
                    <!-- Left: Entry Panel -->
                    <div class="col-span-12 lg:col-span-4 space-y-6">
                        <div class="bg-white rounded-[3rem] p-8 shadow-sm border-2 border-prime/5">
                            <h3 class="text-xl font-black text-slate-800 mb-8 flex items-center gap-3">
                                <i class="fa-solid fa-pen-nib text-prime"></i> New Diary Entry
                            </h3>
                            <div class="space-y-5">
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Select Class</label>
                                    <select id="d-class" onchange="loadClassStudents()" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold appearance-none">
                                        <option value="">Select Class</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Entry Date</label>
                                    <input type="date" id="d-date" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold">
                                </div>
                                <div id="class-students-area" class="hidden">
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Recipients (<span id="recipient-count">0</span>)</label>
                                    <div id="class-students-list" class="max-h-40 overflow-auto bg-slate-50 rounded-2xl p-4 space-y-2 border border-slate-100">
                                        <!-- Students injected here -->
                                    </div>
                                </div>
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Diary Details</label>
                                    <textarea id="d-content" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold h-40" placeholder="Write homework / diary details..."></textarea>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="saveDiary()" class="flex-1 bg-prime text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-700 transition-all shadow-xl shadow-prime/20">Save Entry</button>
                                    <button id="broadcast-btn" onclick="startBulkWhatsApp()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-green-700 transition-all shadow-xl shadow-green-600/20">Broadcast WA</button>
                                </div>
                                <p id="broadcast-status" class="text-[9px] font-black text-green-600 uppercase tracking-widest text-center hidden italic animate-pulse">Broadcasting: 0/0</p>
                            </div>
                        </div>
                    </div>

                    <!-- Right: History Feed -->
                    <div class="col-span-12 lg:col-span-8 space-y-6">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-xl font-black text-slate-800">Recent Diary Entries</h3>
                             <div class="flex gap-2">
                                <button onclick="printDailyDiary()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-prime hover:text-white transition-all"><i class="fa-solid fa-print mr-1"></i> Print Today</button>
                                <button onclick="filterDiary('all')" class="bg-white px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-slate-100 hover:border-prime transition-all">All</button>
                                <button onclick="filterDiary('today')" class="bg-white px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-slate-100 hover:border-prime transition-all">Today</button>
                            </div>
                        </div>
                        <div class="space-y-4" id="diary-feed">
                            <!-- Diary items -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('diary');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Digital Daily Diary');

        async function load() {
            const classes = await window.api.getClasses();
            document.getElementById('d-class').innerHTML = '<option value="">Select Class</option>' + classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            document.getElementById('d-date').value = new Date().toISOString().split('T')[0];
            
            loadFeed();
        }

        let currentClassStudents = [];
        async function loadClassStudents() {
            const cid = document.getElementById('d-class').value;
            if (!cid) {
                document.getElementById('class-students-area').classList.add('hidden');
                return;
            }

            const allStudents = await window.api.getStudents();
            currentClassStudents = allStudents.filter(s => s.class_id == cid && s.status === 'active');
            
            document.getElementById('recipient-count').textContent = currentClassStudents.length;
            document.getElementById('class-students-list').innerHTML = currentClassStudents.map(s => `
                <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-100">
                    <span class="text-xs font-black text-slate-700">${s.name}</span>
                    <span class="text-[9px] font-bold text-slate-400 font-mono">${s.contact_number || 'No Contact'}</span>
                </div>
            `).join('') || '<p class="text-[10px] font-bold text-slate-400 text-center">No active students in this class.</p>';
            
            document.getElementById('class-students-area').classList.remove('hidden');
        }

        async function loadFeed() {
            const diary = await window.api.getDiaryEntries();
            const feed = document.getElementById('diary-feed');
            
            feed.innerHTML = diary.map(e => `
                <div class="bg-white rounded-[2.5rem] p-8 border-2 border-prime/5 shadow-sm hover:shadow-md transition-all relative overflow-hidden group">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="flex items-center gap-3 mb-2">
                                <span class="bg-prime text-white text-[9px] font-black uppercase px-3 py-1 rounded-full tracking-wider">${e.class_name}</span>
                                <span class="text-slate-400 text-[10px] font-bold">${formatDate(e.entry_date)}</span>
                            </div>
                            <h4 class="text-lg font-black text-slate-800 tracking-tight">Daily Diary Entry</h4>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="sendDiaryWhatsApp('${e.class_name}', \`${e.content.replace(/`/g, '\\`')}\`)" class="w-10 h-10 rounded-xl bg-green-50 text-green-600 flex items-center justify-center hover:bg-green-600 hover:text-white transition-all"><i class="fa-brands fa-whatsapp"></i></button>
                            <button onclick="deleteDiary(${e.id})" class="text-slate-300 hover:text-rose-500 transition-all"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                    <p class="text-sm text-slate-600 leading-relaxed font-medium bg-slate-50 p-6 rounded-2xl border border-slate-100">${e.content}</p>
                </div>
            `).join('') || '<div class="text-center py-20 text-slate-300 font-bold">No diary entries found.</div>';
        }

        async function saveDiary() {
            const data = {
                class_id: document.getElementById('d-class').value,
                subject: 'Daily Diary',
                entry_date: document.getElementById('d-date').value,
                content: document.getElementById('d-content').value
            };

            if (!data.class_id || !data.content) return showToast('Class and content are required.', 'error');

            const res = await window.api.createDiaryEntry(data);
            if (res.success) {
                showToast('Diary entry saved!');
                document.getElementById('d-subject').value = '';
                document.getElementById('d-content').value = '';
                loadFeed();
            }
        }

        async function deleteDiary(id) {
            if (!confirm('Delete this entry?')) return;
            await window.api.deleteDiaryEntry(id);
            loadFeed();
        }

        async function printDailyDiary() {
            const today = new Date().toISOString().split('T')[0];
            const allEntries = await window.api.getDiaryEntries();
            const entries = allEntries.filter(e => e.entry_date === today);
            
            if (entries.length === 0) return showToast('No entries found for today.', 'error');

            const header = await window.getPrintHeader();
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>Daily Diary - ${new Date().toLocaleDateString()}</title>
                    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Outfit', sans-serif; padding: 40px; color: #1e293b; }
                        .diary-item { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
                        .class-tag { background: #1e293b; color: white; padding: 4px 12px; rounded: 20px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
                        .subject { font-size: 18px; font-weight: 900; margin: 10px 0; }
                        .content { font-size: 14px; color: #475569; line-height: 1.6; }
                        .header-info { text-align: center; margin-bottom: 40px; }
                    </style>
                </head>
                <body>
                    ${header}
                    <div class="header-info">
                        <h2 style="margin:0;font-weight:900;font-size:24px;">Daily Homework Diary</h2>
                        <p style="margin:5px 0;color:#64748b;font-weight:700;">Date: ${new Date().toLocaleDateString()}</p>
                    </div>
                    ${entries.map(e => `
                        <div class="diary-item">
                            <span class="class-tag">${e.class_name}</span>
                            <div class="subject">${e.subject}</div>
                            <div class="content">${e.content}</div>
                        </div>
                    `).join('')}
                    <script>setTimeout(() => { window.print(); window.close(); }, 1000);<\/script>
                </body>
                </html>
            `);
            win.document.close();
        }

        function formatDate(d) {
            return new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function sendDiaryWhatsApp(className, content) {
            const msg = encodeURIComponent(`*DAILY DIARY - ${className}*\n\n${content}\n\n_Regards: Capt. Irfan Shaheed School System_`);
            window.api.openUrl(`whatsapp://send?text=${msg}`);
        }

        async function startBulkWhatsApp() {
            const content = document.getElementById('d-content').value;
            if (!content) return showToast('Please enter diary details first.', 'error');
            if (currentClassStudents.length === 0) return showToast('No students to message.', 'error');

            const btn = document.getElementById('broadcast-btn');
            const status = document.getElementById('broadcast-status');
            btn.disabled = true;
            status.classList.remove('hidden');

            for (let i = 0; i < currentClassStudents.length; i++) {
                const s = currentClassStudents[i];
                status.textContent = `Broadcasting: ${i + 1}/${currentClassStudents.length} (${s.name})`;
                
                if (s.contact_number) {
                    let clean = s.contact_number.replace(/\D/g, '');
                    if (clean.startsWith('0')) clean = '92' + clean.substring(1);
                    else if (clean.length === 10) clean = '92' + clean;

                    const msg = encodeURIComponent(`*DAILY DIARY*\n\nDear Parent,\nHere is the diary for today:\n\n${content}\n\n_Regards: Capt. Irfan Shaheed School System_`);
                    window.api.openUrl(`whatsapp://send?phone=${clean}&text=${msg}`);
                }

                if (i < currentClassStudents.length - 1) {
                    await new Promise(r => setTimeout(r, 10000)); // 10 second delay
                }
            }

            btn.disabled = false;
            status.classList.add('hidden');
            showToast('Broadcast complete!');
        }

        load();
    </script>
</body>
</html>
