<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - User Roles & Permissions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1200px] mx-auto">
                <div class="flex justify-between items-center mb-10">
                    <div>
                        <h3 class="text-2xl font-black text-slate-800 tracking-tight">User Management</h3>
                        <p class="text-sm text-slate-400 font-medium mt-1">Control who can access different modules of the system.</p>
                    </div>
                    <button onclick="openAddModal()" class="bg-prime text-white px-6 py-3 rounded-2xl font-black text-sm flex items-center gap-2 hover:bg-slate-700 transition-all shadow-xl shadow-prime/20">
                        <i class="fa-solid fa-user-plus"></i> Create User
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="users-grid">
                    <!-- Injected by JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- User Modal -->
    <div id="user-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-black text-slate-800" id="modal-title">Add New User</h3>
                <button onclick="closeModal('user-modal')" class="w-10 h-10 rounded-xl hover:bg-slate-100 text-slate-400 transition-colors flex items-center justify-center"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <input type="hidden" id="u-id">
            <div class="grid grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 block">Full Name</label>
                    <input type="text" id="u-name" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold" placeholder="John Doe">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 block">School ID / Email</label>
                    <input type="text" id="u-email" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold" placeholder="user@school">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 block">Security Key (Password)</label>
                    <input type="password" id="u-pass" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold" placeholder="••••••••">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 block">Primary Role</label>
                    <select id="u-role" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold appearance-none">
                        <option value="admin">Administrator (Full Access)</option>
                        <option value="staff" selected>Staff / Teacher</option>
                        <option value="clerk">Front Desk / Clerk</option>
                        <option value="accountant">Finance / Accountant</option>
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 block">Module Permissions</label>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="permissions-container">
                    <!-- Permission checkboxes -->
                    <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-prime/10 cursor-pointer transition-all group">
                        <input type="checkbox" value="academic" class="perm-check w-5 h-5 rounded-lg accent-prime">
                        <span class="text-xs font-bold text-slate-600 group-hover:text-prime">Academic</span>
                    </label>
                    <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-prime/10 cursor-pointer transition-all group">
                        <input type="checkbox" value="finance" class="perm-check w-5 h-5 rounded-lg accent-prime">
                        <span class="text-xs font-bold text-slate-600 group-hover:text-prime">Finance</span>
                    </label>
                    <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-prime/10 cursor-pointer transition-all group">
                        <input type="checkbox" value="hr" class="perm-check w-5 h-5 rounded-lg accent-prime">
                        <span class="text-xs font-bold text-slate-600 group-hover:text-prime">HR Module</span>
                    </label>
                    <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-prime/10 cursor-pointer transition-all group">
                        <input type="checkbox" value="pos" class="perm-check w-5 h-5 rounded-lg accent-prime">
                        <span class="text-xs font-bold text-slate-600 group-hover:text-prime">POS / Shop</span>
                    </label>
                    <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-prime/10 cursor-pointer transition-all group">
                        <input type="checkbox" value="reports" class="perm-check w-5 h-5 rounded-lg accent-prime">
                        <span class="text-xs font-bold text-slate-600 group-hover:text-prime">Reports</span>
                    </label>
                    <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-prime/10 cursor-pointer transition-all group">
                        <input type="checkbox" value="settings" class="perm-check w-5 h-5 rounded-lg accent-prime">
                        <span class="text-xs font-bold text-slate-600 group-hover:text-prime">System Settings</span>
                    </label>
                </div>
            </div>

            <div class="mt-10">
                <button onclick="saveUser()" class="w-full bg-prime text-white py-5 rounded-2xl font-black text-sm hover:bg-slate-700 transition-all shadow-2xl shadow-prime/30">Save User Account</button>
            </div>
        </div>
    </div>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('users');
        document.getElementById('topbar-container').innerHTML = buildTopbar('User Roles & Permissions');

        async function load() {
            const users = await window.api.getUsers();
            const grid = document.getElementById('users-grid');
            
            grid.innerHTML = users.map(u => `
                <div class="bg-white rounded-[2.5rem] p-8 border-2 border-prime/5 shadow-sm hover:shadow-xl hover:shadow-prime/5 transition-all relative overflow-hidden group">
                    <div class="flex items-center gap-5 mb-6">
                        <div class="w-14 h-14 rounded-2xl bg-prime/5 text-prime flex items-center justify-center text-xl font-black">
                            ${u.name.charAt(0)}
                        </div>
                        <div>
                            <h4 class="text-lg font-black text-slate-800 tracking-tight">${u.name}</h4>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${u.email}</p>
                        </div>
                    </div>

                    <div class="mb-6">
                        <span class="px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-wider ${u.role === 'admin' ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-100 text-slate-500'}">
                            ${u.role}
                        </span>
                    </div>

                    <div class="flex flex-wrap gap-2 mb-8">
                        ${JSON.parse(u.permissions || '[]').map(p => `<span class="bg-slate-50 text-slate-400 text-[8px] font-black uppercase px-2 py-0.5 rounded-md border border-slate-100">${p}</span>`).join('') || '<span class="text-[9px] text-slate-300 italic">No special permissions</span>'}
                    </div>

                    <div class="flex gap-3 pt-6 border-t border-slate-50">
                        <button onclick="editUser(${u.id})" class="flex-1 bg-slate-50 text-slate-600 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-100 transition-all">Edit User</button>
                        ${u.id !== 1 ? `<button onclick="deleteUser(${u.id})" class="w-12 h-12 bg-rose-50 text-rose-500 rounded-xl hover:bg-rose-100 transition-all flex items-center justify-center"><i class="fa-solid fa-trash-can text-sm"></i></button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function openAddModal() {
            document.getElementById('modal-title').textContent = 'Add New User';
            document.getElementById('u-id').value = '';
            document.getElementById('u-name').value = '';
            document.getElementById('u-email').value = '';
            document.getElementById('u-pass').value = '';
            document.getElementById('u-role').value = 'staff';
            document.querySelectorAll('.perm-check').forEach(c => c.checked = false);
            openModal('user-modal');
        }

        async function editUser(id) {
            const users = await window.api.getUsers();
            const u = users.find(x => x.id === id);
            if (!u) return;

            document.getElementById('modal-title').textContent = 'Edit User Account';
            document.getElementById('u-id').value = u.id;
            document.getElementById('u-name').value = u.name;
            document.getElementById('u-email').value = u.email;
            document.getElementById('u-pass').value = ''; // Don't show password
            document.getElementById('u-role').value = u.role;
            
            const perms = JSON.parse(u.permissions || '[]');
            document.querySelectorAll('.perm-check').forEach(c => {
                c.checked = perms.includes(c.value);
            });

            openModal('user-modal');
        }

        async function saveUser() {
            const id = document.getElementById('u-id').value;
            const data = {
                name: document.getElementById('u-name').value,
                email: document.getElementById('u-email').value,
                password: document.getElementById('u-pass').value,
                role: document.getElementById('u-role').value,
                permissions: Array.from(document.querySelectorAll('.perm-check:checked')).map(c => c.value)
            };

            if (!data.name || !data.email) return showToast('Name and ID are required.', 'error');
            if (!id && !data.password) return showToast('Password is required for new users.', 'error');

            const res = id ? await window.api.updateUser({ ...data, id }) : await window.api.createUser(data);
            
            if (res.success) {
                showToast(id ? 'User updated.' : 'User created!');
                closeModal('user-modal');
                load();
            } else {
                showToast(res.error || 'Operation failed.', 'error');
            }
        }

        async function deleteUser(id) {
            if (!confirm('Are you sure? This action cannot be undone.')) return;
            const res = await window.api.deleteUser(id);
            if (res.success) {
                showToast('User deleted.');
                load();
            } else {
                showToast(res.error || 'Failed to delete user.', 'error');
            }
        }

        load();
    </script>
</body>
</html>
