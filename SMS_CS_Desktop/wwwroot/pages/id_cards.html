<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - ID Card Printing</title>
    <script src="tailwind.js"></script>
    
    
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1000px] mx-auto">
                <div class="flex justify-between items-center mb-10">
                    <div>
                        <h3 class="text-2xl font-black text-slate-800 tracking-tight">ID Card Generator</h3>
                        <p class="text-sm text-slate-400 font-medium mt-1">Bulk generate and print school identity cards.</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Student ID Cards -->
                    <div class="bg-white rounded-[3rem] p-10 shadow-sm border-2 border-prime/5">
                        <div class="w-16 h-16 rounded-2xl bg-indigo-50 text-indigo-500 flex items-center justify-center text-2xl mb-6">
                            <i class="fa-solid fa-user-graduate"></i>
                        </div>
                        <h4 class="text-xl font-black text-slate-800 mb-2">Student ID Cards</h4>
                        <p class="text-xs font-bold text-slate-400 mb-8">Generate cards for a specific class.</p>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Select Class</label>
                                <select id="student-class" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold appearance-none">
                                    <!-- Options injected -->
                                </select>
                            </div>
                            <button onclick="generateIDs('student')" class="w-full bg-prime text-white py-4 rounded-2xl font-black text-sm hover:bg-slate-700 transition-all shadow-xl shadow-prime/20">Generate Student Cards</button>
                        </div>
                    </div>

                    <!-- Staff ID Cards -->
                    <div class="bg-white rounded-[3rem] p-10 shadow-sm border-2 border-prime/5">
                        <div class="w-16 h-16 rounded-2xl bg-emerald-50 text-emerald-500 flex items-center justify-center text-2xl mb-6">
                            <i class="fa-solid fa-user-tie"></i>
                        </div>
                        <h4 class="text-xl font-black text-slate-800 mb-2">Staff ID Cards</h4>
                        <p class="text-xs font-bold text-slate-400 mb-8">Generate cards for all staff members.</p>
                        
                        <div class="space-y-4">
                            <div class="h-[60px]"></div> <!-- Spacer to match height -->
                            <button onclick="generateIDs('staff')" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-sm hover:bg-emerald-700 transition-all shadow-xl shadow-emerald-600/20">Generate Staff Cards</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('reports');
        document.getElementById('topbar-container').innerHTML = buildTopbar('ID Card Printing');

        async function load() {
            const classes = await window.api.getClasses();
            document.getElementById('student-class').innerHTML = classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        async function generateIDs(type) {
            const school = await window.api.getSettings();
            let items = [];
            
            if (type === 'student') {
                const classId = document.getElementById('student-class').value;
                const students = await window.api.getStudents();
                items = students.filter(s => s.class_id == classId && s.status === 'active').map(s => ({
                    name: s.name,
                    sub: `Class: ${s.class_name}`,
                    id_label: 'Roll No',
                    id_val: s.roll_no,
                    guardian: s.guardian_name,
                    contact: s.contact_number,
                    picture: s.picture ? s.picture : null,
                    color: '#1e293b'
                }));
            } else {
                const staff = await window.api.getStaff();
                items = staff.map(s => ({
                    name: s.name,
                    sub: s.designation || 'Staff',
                    id_label: 'Staff ID',
                    id_val: s.uuid.split('_')[1].toUpperCase(),
                    guardian: s.father_name,
                    contact: s.contact,
                    picture: s.picture,
                    color: '#059669'
                }));
            }

            if (items.length === 0) return showToast('No records found to generate cards.', 'error');

            const brandThemes = {
                'default': {
                    primary: type === 'student' ? '#1e293b' : '#059669',
                    secondary: '#64748b',
                    background: '#ffffff',
                    leftBg: '#f8fafc',
                    text: '#1e293b',
                    subText: '#64748b',
                    labelColor: '#94a3b8',
                    valColor: '#334155',
                    headerText: '#ffffff'
                },
                'beacon_hall': {
                    primary: '#0c5a85',      // Academic Blue
                    secondary: '#55667a',   // Muted Slate Blue
                    background: '#fffdd4',   // Cream Background
                    leftBg: '#fffba8',       // Slightly darker signature cream
                    text: '#0c5a85',
                    subText: '#55667a',
                    labelColor: '#c5a059',   // Gold labels
                    valColor: '#0c5a85',
                    headerText: '#fffdd4'
                }
            };
            const activePattern = school.dmc_pattern || 'default';
            const theme = brandThemes[activePattern] || brandThemes['default'];

            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>ID Cards - ${type.toUpperCase()}</title>
                    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
                    <style>
                        body { 
                            font-family: 'Outfit', sans-serif; 
                            padding: 30px; 
                            background: #f1f5f9;
                            -webkit-print-color-adjust: exact;
                            print-color-adjust: exact;
                        }
                        .grid { 
                            display: grid; 
                            grid-template-columns: repeat(3, 1fr); 
                            gap: 30px 20px; 
                            justify-items: center; 
                        }
                        .card { 
                            width: 245px; 
                            height: 380px; 
                            background: ${theme.background}; 
                            border: 2px solid ${theme.primary};
                            border-radius: 16px; 
                            overflow: hidden; 
                            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
                            position: relative; 
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            box-sizing: border-box;
                        }
                        .header-strip { 
                            width: 100%; 
                            height: 55px; 
                            background: ${theme.primary}; 
                            display: flex; 
                            align-items: center; 
                            justify-content: center; 
                            padding: 8px; 
                            box-sizing: border-box;
                            text-align: center;
                        }
                        .school-name { 
                            font-size: 10px; 
                            font-weight: 900; 
                            color: ${theme.headerText}; 
                            text-transform: uppercase;
                            letter-spacing: 0.5px;
                            line-height: 1.2;
                        }
                        .card-body {
                            flex: 1;
                            width: 100%;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            padding: 12px;
                            box-sizing: border-box;
                        }
                        .photo { 
                            width: 85px; 
                            height: 85px; 
                            border-radius: 50%; 
                            background: white; 
                            border: 3px solid ${theme.primary}; 
                            box-shadow: 0 6px 15px rgba(0,0,0,0.08); 
                            overflow: hidden; 
                            display: flex; 
                            align-items: center; 
                            justify-content: center; 
                            margin-top: 2px;
                        }
                        .name { 
                            font-size: 15px; 
                            font-weight: 900; 
                            color: ${theme.text}; 
                            margin: 8px 0 2px 0; 
                            text-align: center;
                            text-transform: uppercase;
                        }
                        .sub { 
                            font-size: 9px; 
                            font-weight: 800; 
                            color: ${theme.subText}; 
                            margin-bottom: 12px; 
                            text-transform: uppercase;
                            letter-spacing: 0.5px;
                        }
                        .details-box {
                            width: 100%;
                            background: ${theme.leftBg};
                            border: 1px solid ${theme.primary}15;
                            border-radius: 12px;
                            padding: 8px 10px;
                            box-sizing: border-box;
                            margin-bottom: auto;
                        }
                        .info-row { 
                            display: flex;
                            justify-content: space-between;
                            align-items: center;
                            padding: 3px 0;
                        }
                        .info-row:not(:last-child) {
                            border-bottom: 1px dashed ${theme.primary}10;
                        }
                        .info-label { 
                            font-size: 8px; 
                            font-weight: 900; 
                            color: ${theme.labelColor}; 
                            text-transform: uppercase; 
                            margin: 0; 
                        }
                        .info-val { 
                            font-size: 9.5px; 
                            font-weight: 800; 
                            color: ${theme.valColor}; 
                            margin: 0; 
                            text-align: right;
                        }
                        .card-footer {
                            width: 100%;
                            display: flex;
                            justify-content: space-between;
                            align-items: flex-end;
                            padding: 0 5px 2px 5px;
                            box-sizing: border-box;
                            margin-top: 8px;
                        }
                        .sign-block {
                            text-align: center;
                            flex: 1;
                        }
                        .sign-label {
                            font-size: 6.5px;
                            font-weight: 900;
                            color: ${theme.labelColor};
                            border-top: 1.5px solid ${theme.primary}30;
                            padding-top: 3px;
                            text-transform: uppercase;
                            margin-top: 15px;
                            display: block;
                        }
                        .footer-accent { 
                            position: absolute; 
                            bottom: 0; 
                            left: 0; 
                            right: 0; 
                            height: 4px; 
                            background: ${theme.primary}; 
                        }
                        @media print { 
                            body { background: white; padding: 0; } 
                            .no-print { display: none; } 
                        }
                    </style>
                </head>
                <body>
                    <div class="no-print" style="margin-bottom: 20px; text-align: center;">
                        <button onclick="window.print()" style="padding: 10px 20px; background: ${theme.primary}; color: ${theme.headerText}; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">Print ID Cards</button>
                    </div>
                    <div class="grid">
                        ${items.map(item => `
                            <div class="card">
                                <div class="header-strip">
                                    <span class="school-name">${school.school_name || 'SMS CONNECT'}</span>
                                </div>
                                <div class="card-body">
                                    <div class="photo">
                                        ${item.picture ? `<img src="${item.picture}" style="width:100%;height:100%;object-fit:cover;">` : `<span style="font-weight:900;color:${theme.labelColor};font-size:30px;">${item.name.charAt(0)}</span>`}
                                    </div>
                                    <p class="name">${item.name}</p>
                                    <p class="sub">${item.sub}</p>
                                    
                                    <div class="details-box">
                                        <div class="info-row">
                                            <p class="info-label">${item.id_label}</p>
                                            <p class="info-val">${item.id_val}</p>
                                        </div>
                                        <div class="info-row">
                                            <p class="info-label">Father/Guardian</p>
                                            <p class="info-val">${item.guardian || '—'}</p>
                                        </div>
                                        <div class="info-row">
                                            <p class="info-label">Contact</p>
                                            <p class="info-val">${item.contact || '—'}</p>
                                        </div>
                                    </div>
                                    
                                    <div class="card-footer">
                                        <div class="sign-block" style="margin-right: 15px;">
                                            <span class="sign-label">Holder Sign</span>
                                        </div>
                                        <div class="sign-block" style="margin-left: 15px;">
                                            <span class="sign-label">Authorised Sign</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="footer-accent"></div>
                            </div>
                        `).join('')}
                    </div>
                </body>
                </html>
            `);
            win.document.close();
        }

        load();
    </script>
</body>
</html>
