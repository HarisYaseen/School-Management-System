<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Expenses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit', 'sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1400px] mx-auto">
                <div class="flex justify-between items-center mb-10">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800">Expense Management</h2>
                        <p class="text-slate-500 font-medium mt-1">Track school expenditures and payouts</p>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="printExpenses()" class="bg-slate-100 text-slate-600 px-8 py-4 rounded-2xl font-black text-sm hover:bg-slate-200 transition-all flex items-center gap-2">
                            <i class="fa-solid fa-print"></i> Print Report
                        </button>
                        <button onclick="openAddModal()" class="bg-prime text-white px-8 py-4 rounded-2xl font-black text-sm shadow-xl shadow-prime/20 hover:scale-105 transition-all flex items-center gap-2">
                            <i class="fa-solid fa-plus"></i> Add New Expense
                        </button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                    <div class="bg-white p-8 rounded-[2rem] border-2 border-prime/10 shadow-sm relative overflow-hidden">
                        <i class="fa-solid fa-graduation-cap absolute -right-6 -top-6 text-6xl text-prime/5 -rotate-12 pointer-events-none"></i>
                        <div class="w-12 h-12 rounded-2xl bg-rose-50 flex items-center justify-center mb-6 relative z-10">
                            <i class="fa-solid fa-money-bill-transfer text-rose-500"></i>
                        </div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest relative z-10">Total Expenses</p>
                        <h3 class="text-3xl font-black text-slate-800 mt-2 relative z-10" id="stat-total">Rs. 0</h3>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] border-2 border-prime/10 shadow-sm relative overflow-hidden">
                        <i class="fa-solid fa-graduation-cap absolute -right-6 -top-6 text-6xl text-prime/5 -rotate-12 pointer-events-none"></i>
                        <div class="w-12 h-12 rounded-2xl bg-blue-50 flex items-center justify-center mb-6 relative z-10">
                            <i class="fa-solid fa-calendar-day text-blue-500"></i>
                        </div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest relative z-10">Expenses This Month</p>
                        <h3 class="text-3xl font-black text-slate-800 mt-2 relative z-10" id="stat-month">Rs. 0</h3>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] border-2 border-prime/10 shadow-sm relative overflow-hidden">
                        <i class="fa-solid fa-graduation-cap absolute -right-6 -top-6 text-6xl text-prime/5 -rotate-12 pointer-events-none"></i>
                        <div class="w-12 h-12 rounded-2xl bg-emerald-50 flex items-center justify-center mb-6 relative z-10">
                            <i class="fa-solid fa-chart-line text-emerald-500"></i>
                        </div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest relative z-10">Active Categories</p>
                        <h3 class="text-3xl font-black text-slate-800 mt-2 relative z-10" id="stat-cats">0</h3>
                    </div>
                </div>

                <!-- List -->
                <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/10 overflow-hidden relative">
                    <i class="fa-solid fa-graduation-cap absolute -right-12 -top-12 text-[12rem] text-prime/5 -rotate-12 pointer-events-none"></i>
                    <div class="p-8 border-b border-slate-50 flex justify-between items-center">
                        <h3 class="text-xl font-black text-slate-800">Expense History</h3>
                        <div class="relative w-72">
                            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                            <input type="text" id="expense-search" onkeyup="filterExpenses(this.value)" class="w-full bg-slate-50 border border-transparent focus:border-slate-100 rounded-xl pl-11 p-3 text-sm font-bold outline-none" placeholder="Search expenses...">
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50/50">
                                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Date</th>
                                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Category</th>
                                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Description</th>
                                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Amount</th>
                                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="expense-table-body" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="expense-modal" class="fixed inset-0 bg-prime/80 backdrop-blur-sm z-[9999] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-lg overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8 border-b border-slate-50 flex justify-between items-center">
                <div>
                    <h3 class="text-2xl font-black text-slate-800" id="modal-title">New Expense</h3>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Record a payout</p>
                </div>
                <button onclick="closeModal('expense-modal')" class="w-10 h-10 rounded-xl hover:bg-slate-50 text-slate-400 transition-colors flex items-center justify-center"><i class="fa-solid fa-times"></i></button>
            </div>
            <form id="expense-form" class="p-8 space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Category</label>
                    <select id="exp-category" class="w-full bg-slate-50 border border-slate-100 rounded-xl p-4 text-sm font-bold outline-none focus:border-prime transition-all">
                        <option value="Salary">Salary</option>
                        <option value="Utility Bills">Utility Bills</option>
                        <option value="Rent">Rent</option>
                        <option value="Inventory Purchase">Inventory Purchase</option>
                        <option value="Stationery">Stationery</option>
                        <option value="Maintenance">Maintenance</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Amount (Rs.)</label>
                        <input type="number" id="exp-amount" required class="w-full bg-slate-50 border border-slate-100 rounded-xl p-4 text-sm font-bold outline-none focus:border-prime transition-all" placeholder="0.00">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Date</label>
                        <input type="date" id="exp-date" required class="w-full bg-slate-50 border border-slate-100 rounded-xl p-4 text-sm font-bold outline-none focus:border-prime transition-all">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Description</label>
                    <textarea id="exp-description" rows="3" class="w-full bg-slate-50 border border-slate-100 rounded-xl p-4 text-sm font-bold outline-none focus:border-prime transition-all" placeholder="Enter details..."></textarea>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal('expense-modal')" class="flex-1 py-4 rounded-xl font-bold text-slate-400 hover:bg-slate-50 transition-all">Cancel</button>
                    <button type="submit" class="flex-1 bg-prime text-white py-4 rounded-xl font-black text-sm shadow-lg shadow-prime/20 hover:scale-[1.02] transition-all">
                        <span id="submit-btn-text">Save Expense</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('expenses');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Expenses');

        let expenses = [];

        async function printExpenses() {
            const header = await window.getPrintHeader();
            const total = expenses.reduce((a, b) => a + Number(b.amount), 0);
            
            const printWin = window.open('', '_blank');
            printWin.document.write(`
                <html>
                <head>
                    <title>Expense Report</title>
                    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Outfit', sans-serif; padding: 30px; color: #1e293b; }
                        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; font-size: 12px; }
                        th { background: #f8fafc; font-weight: 900; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
                        .text-right { text-align: right; }
                        .footer { margin-top: 30px; border-top: 2px solid #1e293b; padding-top: 20px; display: flex; justify-content: space-between; align-items: center; }
                        .total-label { font-weight: 900; font-size: 14px; text-transform: uppercase; }
                        .total-val { font-weight: 900; font-size: 24px; color: #e11d48; }
                        @media print { body { padding: 0; } }
                    </style>
                </head>
                <body>
                    ${header}
                    <h2 style="text-align:center;margin-bottom:5px;">EXPENSE REPORT</h2>
                    <p style="text-align:center;color:#64748b;font-weight:700;margin-bottom:30px;">Report Generated on ${new Date().toLocaleString()}</p>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th class="text-right">Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${expenses.map(e => `
                                <tr>
                                    <td>${formatDate(e.date)}</td>
                                    <td><strong>${e.category}</strong></td>
                                    <td>${e.description || '—'}</td>
                                    <td class="text-right"><strong>${formatCurrency(e.amount)}</strong></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="footer">
                        <span class="total-label">Grand Total Expenditure</span>
                        <span class="total-val">${formatCurrency(total)}</span>
                    </div>
                    <script>setTimeout(() => { window.print(); window.close(); }, 500);<\/script>
                </body>
                </html>
            `);
            printWin.document.close();
        }

        async function load() {
            expenses = await window.api.getExpenses();
            render();
            updateStats();
        }

        function render(data = expenses) {
            const body = document.getElementById('expense-table-body');
            if (data.length === 0) {
                body.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-slate-300 font-bold">No expenses recorded yet.</td></tr>`;
                return;
            }
            body.innerHTML = data.map(exp => `
                <tr class="hover:bg-slate-50/50 transition-colors group">
                    <td class="p-6">
                        <p class="text-sm font-bold text-slate-700">${formatDate(exp.date)}</p>
                    </td>
                    <td class="p-6">
                        <span class="text-[10px] font-black px-3 py-1.5 rounded-lg bg-slate-100 text-slate-500 uppercase tracking-widest">${exp.category}</span>
                    </td>
                    <td class="p-6">
                        <p class="text-sm font-medium text-slate-600">${exp.description || '—'}</p>
                    </td>
                    <td class="p-6 text-right">
                        <p class="text-sm font-black text-rose-500">${formatCurrency(exp.amount)}</p>
                    </td>
                    <td class="p-6 text-center">
                        <div class="flex items-center justify-center gap-2">
                            <button onclick="editExpense(${exp.id})" class="w-8 h-8 rounded-lg text-slate-300 hover:text-prime hover:bg-slate-100 transition-all">
                                <i class="fa-solid fa-edit text-xs"></i>
                            </button>
                            <button onclick="deleteExpense(${exp.id})" class="w-8 h-8 rounded-lg text-slate-300 hover:text-rose-500 hover:bg-rose-50 transition-all">
                                <i class="fa-solid fa-trash-can text-xs"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        let editingId = null;

        function openAddModal() {
            editingId = null;
            document.getElementById('expense-form').reset();
            document.getElementById('modal-title').textContent = 'New Expense';
            document.getElementById('submit-btn-text').textContent = 'Save Expense';
            document.getElementById('exp-date').valueAsDate = new Date();
            openModal('expense-modal');
        }

        function editExpense(id) {
            const exp = expenses.find(e => e.id == id);
            if (!exp) return;
            editingId = id;
            document.getElementById('modal-title').textContent = 'Edit Expense';
            document.getElementById('submit-btn-text').textContent = 'Update Expense';
            document.getElementById('exp-category').value = exp.category;
            document.getElementById('exp-amount').value = exp.amount;
            document.getElementById('exp-date').value = exp.date;
            document.getElementById('exp-description').value = exp.description;
            openModal('expense-modal');
        }

        function updateStats() {
            const total = expenses.reduce((a, b) => a + Number(b.amount), 0);
            const currentMonth = new Date().toISOString().slice(0, 7);
            const monthly = expenses.filter(e => e.date.startsWith(currentMonth)).reduce((a, b) => a + Number(b.amount), 0);
            const categories = new Set(expenses.map(e => e.category)).size;

            document.getElementById('stat-total').textContent = formatCurrency(total);
            document.getElementById('stat-month').textContent = formatCurrency(monthly);
            document.getElementById('stat-cats').textContent = categories;
        }

        function filterExpenses(q) {
            const filtered = expenses.filter(e => 
                e.category.toLowerCase().includes(q.toLowerCase()) || 
                (e.description && e.description.toLowerCase().includes(q.toLowerCase()))
            );
            render(filtered);
        }

        async function deleteExpense(id) {
            if (!confirm('Are you sure you want to delete this expense?')) return;
            const res = await window.api.deleteExpense(id);
            if (res.success) { showToast('Expense deleted.'); load(); }
            else { showToast('Failed to delete.', 'error'); }
        }

        document.getElementById('expense-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';

                const data = {
                    id: editingId,
                    category: document.getElementById('exp-category').value,
                    amount: document.getElementById('exp-amount').value,
                    date: document.getElementById('exp-date').value,
                    description: document.getElementById('exp-description').value
                };

                const res = editingId 
                    ? await window.api.updateExpense(data)
                    : await window.api.createExpense(data);
                
                if (res && res.success) {
                    showToast(editingId ? 'Expense updated!' : 'Expense recorded!');
                    closeModal('expense-modal');
                    load();
                } else {
                    throw new Error(res?.error || 'Database error occurred');
                }
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        };

        document.getElementById('exp-date').valueAsDate = new Date();
        load();
    </script>
</body>
</html>
