<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Bulk SMS Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1000px] mx-auto">
                <div class="text-center mb-12">
                    <h3 class="text-3xl font-black text-slate-800 tracking-tight">Bulk SMS Communicator</h3>
                    <p class="text-sm text-slate-400 font-medium mt-2">Send instant notifications to parents and staff via GSM Gateway.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-12 gap-10">
                    <!-- Recipients -->
                    <div class="md:col-span-5 space-y-6">
                        <div class="bg-white rounded-[3rem] p-8 shadow-sm border-2 border-prime/5">
                            <h4 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-6">1. Select Recipients</h4>
                            <div class="space-y-4">
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 block">Target Audience</label>
                                    <select id="sms-target" onchange="toggleTarget(this.value)" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold appearance-none">
                                        <option value="class">Specific Class</option>
                                        <option value="all_students">All Students</option>
                                        <option value="all_staff">All Staff</option>
                                        <option value="custom">Custom Numbers</option>
                                    </select>
                                </div>
                                <div id="class-select-div">
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 block">Class</label>
                                    <select id="sms-class" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold appearance-none">
                                        <!-- Classes injected -->
                                    </select>
                                </div>
                                <div id="custom-nums-div" class="hidden">
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 block">Mobile Numbers</label>
                                    <textarea id="sms-custom" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold h-24" placeholder="Enter numbers separated by comma..."></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="bg-indigo-900 rounded-[2.5rem] p-8 text-white shadow-xl shadow-indigo-900/20 relative overflow-hidden">
                            <i class="fa-solid fa-tower-broadcast absolute -right-4 -bottom-4 text-7xl text-white/10 -rotate-12"></i>
                            <p class="text-[10px] font-black text-white/40 uppercase tracking-widest mb-1">GSM Status</p>
                            <div class="flex items-center gap-3">
                                <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                                <h4 class="text-lg font-black tracking-tight">Connected & Ready</h4>
                            </div>
                            <p class="text-[10px] font-bold text-white/60 mt-4">Signal Strength: 85%</p>
                        </div>
                    </div>

                    <!-- Message -->
                    <div class="md:col-span-7 space-y-6">
                        <div class="bg-white rounded-[3rem] p-8 shadow-sm border-2 border-prime/5">
                            <h4 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-6">2. Compose Message</h4>
                            <div class="space-y-4">
                                <div class="flex flex-wrap gap-2 mb-4">
                                    <button onclick="addPlaceholder('{name}')" class="px-3 py-1 bg-slate-50 text-[9px] font-black text-slate-500 rounded-lg hover:bg-slate-100 uppercase tracking-wider">Student Name</button>
                                    <button onclick="addPlaceholder('{roll}')" class="px-3 py-1 bg-slate-50 text-[9px] font-black text-slate-500 rounded-lg hover:bg-slate-100 uppercase tracking-wider">Roll No</button>
                                    <button onclick="addPlaceholder('{fee}')" class="px-3 py-1 bg-slate-50 text-[9px] font-black text-slate-500 rounded-lg hover:bg-slate-100 uppercase tracking-wider">Unpaid Fee</button>
                                </div>
                                <textarea id="sms-msg" oninput="updateSMSCount()" class="premium-input bg-slate-50 w-full px-6 py-6 rounded-3xl text-sm font-bold h-48 leading-relaxed" placeholder="Type your notification here..."></textarea>
                                <div class="flex justify-between items-center px-2">
                                    <p class="text-[10px] font-bold text-slate-400"><span id="char-count">0</span> / 160 Characters (<span id="parts">1</span> SMS)</p>
                                    <button onclick="sendSMS()" class="bg-prime text-white px-8 py-4 rounded-2xl font-black text-sm flex items-center gap-2 hover:bg-slate-700 transition-all shadow-xl shadow-prime/20">
                                        <i class="fa-solid fa-paper-plane"></i> Send Broadcast
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div id="sms-progress" class="hidden bg-white rounded-[2.5rem] p-8 border-2 border-slate-100">
                            <div class="flex justify-between items-center mb-4">
                                <p class="text-xs font-black text-slate-800 uppercase">Sending Messages...</p>
                                <p class="text-[10px] font-bold text-slate-400" id="sms-prog-text">0 / 0 sent</p>
                            </div>
                            <div class="w-full h-2 bg-slate-50 rounded-full overflow-hidden">
                                <div id="sms-prog-bar" class="h-full bg-prime transition-all duration-500" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('reports');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Bulk SMS Center');

        async function load() {
            const classes = await window.api.getClasses();
            document.getElementById('sms-class').innerHTML = classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        function toggleTarget(val) {
            document.getElementById('class-select-div').classList.toggle('hidden', val !== 'class');
            document.getElementById('custom-nums-div').classList.toggle('hidden', val !== 'custom');
        }

        function addPlaceholder(tag) {
            const el = document.getElementById('sms-msg');
            el.value += tag;
            updateSMSCount();
        }

        function updateSMSCount() {
            const len = document.getElementById('sms-msg').value.length;
            document.getElementById('char-count').textContent = len;
            document.getElementById('parts').textContent = Math.ceil(len / 160) || 1;
        }

        async function sendSMS() {
            const msg = document.getElementById('sms-msg').value;
            const target = document.getElementById('sms-target').value;
            
            if (!msg) return showToast('Please enter a message.', 'error');

            let recipients = [];
            if (target === 'class') {
                const cid = document.getElementById('sms-class').value;
                const students = await window.api.getStudents();
                recipients = students.filter(s => s.class_id == cid && s.status === 'active' && s.contact_number);
            } else if (target === 'custom') {
                recipients = document.getElementById('sms-custom').value.split(',').map(n => ({ contact_number: n.trim() }));
            }

            if (recipients.length === 0) return showToast('No valid recipients found.', 'error');

            document.getElementById('sms-progress').classList.remove('hidden');
            const bar = document.getElementById('sms-prog-bar');
            const text = document.getElementById('sms-prog-text');

            for (let i = 0; i < recipients.length; i++) {
                // Simulate sending
                await new Promise(r => setTimeout(r, 200));
                const pct = Math.round(((i + 1) / recipients.length) * 100);
                bar.style.width = pct + '%';
                text.textContent = `${i + 1} / ${recipients.length} sent`;
            }

            showToast(`Broadcast completed! ${recipients.length} messages sent.`);
            setTimeout(() => document.getElementById('sms-progress').classList.add('hidden'), 3000);
        }

        load();
    </script>
</body>
</html>
