<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Student Biodata</title>
    <script src="tailwind.js"></script>
    
    
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1400px] mx-auto" id="biodata-content">
                <!-- Content injected by JS -->
                <div class="flex items-center justify-center h-64">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl text-prime/20"></i>
                </div>
            </div>
        </div>
    </main>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('students');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Student Biodata');

        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('id');

        async function load() {
            if (!studentId) {
                document.getElementById('biodata-content').innerHTML = '<div class="text-center py-20 text-slate-400 font-bold">No student ID provided.</div>';
                return;
            }

            const data = await window.api.getStudentBiodata(studentId);
            if (!data) {
                document.getElementById('biodata-content').innerHTML = '<div class="text-center py-20 text-slate-400 font-bold">Student not found.</div>';
                return;
            }

            const s = data.student;
            let picUrl = '';
            if (s.picture) {
                picUrl = await window.api.getStaffPictureUrl ? await window.api.getStudentPictureUrl(s.picture) : null;
            }

            const html = `
                <div class="grid grid-cols-12 gap-8">
                    <!-- LEFT COLUMN: Profile Card -->
                    <div class="col-span-12 lg:col-span-4 space-y-6">
                        <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 p-8 text-center relative overflow-hidden group">
                            <div class="absolute inset-0 bg-gradient-to-b from-prime/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                            
                            <div class="relative z-10">
                                <div class="w-40 h-40 rounded-[2.5rem] bg-prime/5 mx-auto mb-6 p-2 ring-4 ring-white shadow-xl overflow-hidden">
                                    ${picUrl ? `<img src="${picUrl}" class="w-full h-full object-cover rounded-[2rem]">` : `<div class="w-full h-full flex items-center justify-center bg-slate-100 text-slate-300 text-6xl font-black">${s.name.charAt(0)}</div>`}
                                </div>
                                <h2 class="text-2xl font-black text-slate-800 tracking-tight">${s.name}</h2>
                                <p class="text-prime font-black text-xs uppercase tracking-[0.2em] mt-1">Roll No: ${s.roll_no}</p>
                                <div class="mt-4 inline-flex items-center gap-2 px-4 py-1.5 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-black uppercase tracking-wider border border-emerald-100">
                                    <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                    ${s.status}
                                </div>

                                <div class="grid grid-cols-2 gap-4 mt-8 pt-8 border-t border-slate-50">
                                    <div class="text-left">
                                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Class</p>
                                        <p class="text-sm font-bold text-slate-700">${s.class_name || 'N/A'}</p>
                                    </div>
                                    <div class="text-left">
                                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Gender</p>
                                        <p class="text-sm font-bold text-slate-700">${s.gender || 'Male'}</p>
                                    </div>
                                    <div class="text-left">
                                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Blood Group</p>
                                        <p class="text-sm font-bold text-slate-700">${s.blood_group || '—'}</p>
                                    </div>
                                    <div class="text-left">
                                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Religion</p>
                                        <p class="text-sm font-bold text-slate-700">${s.religion || 'Islam'}</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Contact Card -->
                        <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 p-8">
                            <h3 class="text-sm font-black text-slate-800 uppercase tracking-wider mb-6 flex items-center gap-2">
                                <i class="fa-solid fa-address-book text-prime/40"></i> Contact Information
                            </h3>
                            <div class="space-y-5">
                                <div>
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Guardian Name</p>
                                    <p class="text-sm font-bold text-slate-700">${s.guardian_name || '—'}</p>
                                </div>
                                <div>
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Phone Number</p>
                                    <p class="text-sm font-bold text-slate-700">${s.contact_number || '—'}</p>
                                </div>
                                <div>
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Address</p>
                                    <p class="text-sm font-bold text-slate-700 leading-relaxed">${s.address || 'Not provided'}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Siblings Card -->
                        <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 p-8">
                            <h3 class="text-sm font-black text-slate-800 uppercase tracking-wider mb-6 flex items-center justify-between">
                                <span class="flex items-center gap-2"><i class="fa-solid fa-people-group text-prime/40"></i> Siblings</span>
                                <span class="bg-slate-100 text-slate-500 text-[10px] px-2 py-0.5 rounded-full">${data.siblings.length} Found</span>
                            </h3>
                            <div class="space-y-3">
                                ${data.siblings.length ? data.siblings.map(sib => `
                                    <div class="flex items-center justify-between p-3 bg-slate-50 rounded-2xl hover:bg-slate-100 cursor-pointer transition-all" onclick="window.location.href='biodata.html?id=${sib.id}'">
                                        <div class="flex items-center gap-3">
                                            <div class="w-8 h-8 rounded-lg bg-prime text-white flex items-center justify-center font-black text-xs">${sib.name.charAt(0)}</div>
                                            <div>
                                                <p class="text-xs font-bold text-slate-700">${sib.name}</p>
                                                <p class="text-[9px] font-bold text-slate-400 uppercase">${sib.class_name}</p>
                                            </div>
                                        </div>
                                        <i class="fa-solid fa-chevron-right text-[10px] text-slate-300"></i>
                                    </div>
                                `).join('') : '<p class="text-xs text-slate-400 italic text-center py-4">No siblings detected.</p>'}
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT COLUMN: Stats & Tables -->
                    <div class="col-span-12 lg:col-span-8 space-y-8">
                        <!-- Stats Grid -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="bg-prime rounded-[2rem] p-6 text-white shadow-xl shadow-prime/20 relative overflow-hidden">
                                <i class="fa-solid fa-calendar-check absolute -right-4 -bottom-4 text-7xl text-white/10 -rotate-12"></i>
                                <p class="text-[10px] font-black text-white/40 uppercase tracking-widest mb-1">Attendance</p>
                                <h4 class="text-4xl font-black tracking-tighter">${data.attPct}%</h4>
                                <p class="text-[10px] font-bold text-white/60 mt-2">${data.attPresent} Present / ${data.attTotal} Total</p>
                            </div>
                            <div class="bg-white rounded-[2rem] p-6 border-2 border-emerald-100 shadow-sm relative overflow-hidden">
                                <i class="fa-solid fa-wallet absolute -right-4 -bottom-4 text-7xl text-emerald-500/10 -rotate-12"></i>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Monthly Fee</p>
                                <h4 class="text-3xl font-black text-slate-800 tracking-tighter">${formatCurrency(s.monthly_fee)}</h4>
                                <p class="text-[10px] font-bold text-emerald-600 mt-2">Concession: ${formatCurrency(s.concession)}</p>
                            </div>
                            <div class="bg-white rounded-[2rem] p-6 border-2 ${data.balance > 0 ? 'border-rose-100' : 'border-emerald-100'} shadow-sm relative overflow-hidden">
                                <i class="fa-solid fa-file-invoice-dollar absolute -right-4 -bottom-4 text-7xl ${data.balance > 0 ? 'text-rose-500/10' : 'text-emerald-500/10'} -rotate-12"></i>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Balance</p>
                                <h4 class="text-3xl font-black ${data.balance > 0 ? 'text-rose-600' : 'text-emerald-600'} tracking-tighter">${formatCurrency(data.balance)}</h4>
                                <p class="text-[10px] font-bold text-slate-400 mt-2">Total Paid: ${formatCurrency(data.totalCredit)}</p>
                            </div>
                        </div>

                        <!-- Academic Performance (Accordion Grouped) -->
                        <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 overflow-hidden">
                            <div class="px-8 py-6 border-b border-slate-50 flex items-center justify-between bg-slate-50/30">
                                <h3 class="text-sm font-black text-slate-800 uppercase tracking-wider flex items-center gap-2">
                                    <i class="fa-solid fa-graduation-cap text-prime/40"></i> Academic Performance
                                </h3>
                            </div>
                            <div id="academic-accordion" class="divide-y divide-slate-100">
                                ${(() => {
                                    if (!data.examResults.length) return '<div class="p-10 text-center text-slate-400 italic font-bold">No exam records found.</div>';
                                    
                                    const grouped = {};
                                    data.examResults.forEach(r => {
                                        if (!grouped[r.exam_name]) grouped[r.exam_name] = [];
                                        grouped[r.exam_name].push(r);
                                    });

                                    return Object.keys(grouped).map((examName, idx) => {
                                        const results = grouped[examName];
                                        const avgPct = Math.round(results.reduce((acc, curr) => acc + curr.percentage, 0) / results.length);
                                        return `
                                            <div class="group/exam">
                                                <button onclick="toggleAccordion('exam-${idx}')" class="w-full px-8 py-5 flex items-center justify-between hover:bg-slate-50 transition-all text-left">
                                                    <div class="flex items-center gap-4">
                                                        <div class="w-10 h-10 rounded-xl bg-prime/5 text-prime flex items-center justify-center font-black text-xs">${idx + 1}</div>
                                                        <div>
                                                            <p class="text-sm font-black text-slate-800">${examName}</p>
                                                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${results.length} Subjects</p>
                                                        </div>
                                                    </div>
                                                    <div class="flex items-center gap-6">
                                                        <div class="text-right hidden sm:block">
                                                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Average</p>
                                                            <p class="text-xs font-black ${avgPct >= 40 ? 'text-emerald-600' : 'text-rose-600'}">${avgPct}%</p>
                                                        </div>
                                                        <i class="fa-solid fa-chevron-down text-slate-300 group-hover/exam:text-prime transition-transform" id="icon-exam-${idx}"></i>
                                                    </div>
                                                </button>
                                                <div id="exam-${idx}" class="hidden bg-slate-50/50 px-8 pb-6">
                                                    <table class="w-full">
                                                        <thead>
                                                            <tr class="text-[9px] font-black text-slate-400 uppercase tracking-widest">
                                                                <th class="py-3 text-left">Subject</th>
                                                                <th class="py-3 text-center">Marks</th>
                                                                <th class="py-3 text-right">Result</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody class="divide-y divide-slate-100">
                                                            ${results.map(r => `
                                                                <tr>
                                                                    <td class="py-3 text-xs font-bold text-slate-700">${r.subject_name}</td>
                                                                    <td class="py-3 text-xs text-center font-bold text-slate-600">${r.obtained_marks} / ${r.total_marks}</td>
                                                                    <td class="py-3 text-right">
                                                                        <span class="text-[10px] font-black ${r.percentage >= 40 ? 'text-emerald-600' : 'text-rose-600'}">${r.percentage}%</span>
                                                                    </td>
                                                                </tr>
                                                            `).join('')}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        `;
                                    }).join('');
                                })()}
                            </div>
                        </div>

                        <!-- Fee History -->
                        <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 overflow-hidden">
                            <div class="px-8 py-6 border-b border-slate-50 flex items-center justify-between">
                                <h3 class="text-sm font-black text-slate-800 uppercase tracking-wider flex items-center gap-2">
                                    <i class="fa-solid fa-receipt text-prime/40"></i> Recent Fee Transactions
                                </h3>
                                <button onclick="window.location.href='fees.html?student=${s.id}'" class="text-[10px] font-black text-prime uppercase hover:underline">View All Ledger</button>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full">
                                    <thead class="bg-slate-50">
                                        <tr>
                                            <th class="px-8 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Date</th>
                                            <th class="px-8 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Description</th>
                                            <th class="px-8 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Debit</th>
                                            <th class="px-8 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Credit</th>
                                            <th class="px-8 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-50">
                                        ${data.ledger.length ? data.ledger.map(f => `
                                            <tr class="hover:bg-slate-50/50 transition-colors">
                                                <td class="px-8 py-4 text-xs font-bold text-slate-500">${formatDate(f.created_at)}</td>
                                                <td class="px-8 py-4 text-xs font-bold text-slate-700">${f.description || f.type}</td>
                                                <td class="px-8 py-4 text-xs font-bold text-rose-600">${f.debit > 0 ? formatCurrency(f.debit) : '—'}</td>
                                                <td class="px-8 py-4 text-xs font-bold text-emerald-600">${f.credit > 0 ? formatCurrency(f.credit) : '—'}</td>
                                                <td class="px-8 py-4">
                                                    <span class="px-3 py-1 rounded-lg text-[9px] font-black uppercase ${f.status === 'paid' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">${f.status}</span>
                                                </td>
                                            </tr>
                                        `).join('') : '<tr><td colspan="5" class="px-8 py-10 text-center text-slate-400 italic">No transactions found.</td></tr>'}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Document Management -->
                        <div class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 overflow-hidden">
                            <div class="px-8 py-6 border-b border-slate-50 flex items-center justify-between">
                                <h3 class="text-sm font-black text-slate-800 uppercase tracking-wider flex items-center gap-2">
                                    <i class="fa-solid fa-folder-open text-prime/40"></i> Student Documents (Certificates/ID)
                                </h3>
                                <button onclick="uploadDocument()" class="bg-slate-50 text-slate-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-prime hover:text-white transition-all"><i class="fa-solid fa-upload mr-1"></i> Upload New</button>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-8" id="docs-list">
                                <!-- Documents injected -->
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('biodata-content').innerHTML = html;
            loadDocs();
        }

        async function loadDocs() {
            const docs = await window.api.getStudentDocuments(studentId);
            const list = document.getElementById('docs-list');
            list.innerHTML = docs.map(d => `
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-prime/10 transition-all group">
                    <div class="flex items-center gap-4 overflow-hidden">
                        <div class="w-10 h-10 rounded-xl bg-white border border-slate-100 flex items-center justify-center text-prime shadow-sm">
                            <i class="fa-solid ${d.file_type === '.pdf' ? 'fa-file-pdf text-rose-500' : 'fa-image text-indigo-500'}"></i>
                        </div>
                        <div class="overflow-hidden">
                            <p class="text-xs font-black text-slate-700 truncate">${d.title}</p>
                            <p class="text-[9px] font-bold text-slate-400 uppercase">${formatDate(d.created_at)}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="viewDoc('${d.file_name}')" class="w-8 h-8 rounded-lg bg-white text-prime hover:bg-prime hover:text-white transition-all shadow-sm flex items-center justify-center"><i class="fa-solid fa-eye text-[10px]"></i></button>
                        <button onclick="deleteDoc(${d.id})" class="w-8 h-8 rounded-lg bg-white text-rose-500 hover:bg-rose-500 hover:text-white transition-all shadow-sm flex items-center justify-center"><i class="fa-solid fa-trash text-[10px]"></i></button>
                    </div>
                </div>
            `).join('') || '<p class="col-span-2 text-center py-10 text-slate-300 font-bold italic">No documents uploaded yet.</p>';
        }

        function uploadDocument() {
            document.getElementById('doc-title-input').value = '';
            openModal('upload-modal');
        }

        async function executeUpload() {
            const title = document.getElementById('doc-title-input').value;
            if (!title) return showToast('Please enter a title.', 'error');
            
            const res = await window.api.uploadStudentDocument({ studentId, title });
            if (res.success) {
                showToast('Document uploaded successfully!');
                closeModal('upload-modal');
                loadDocs();
            } else if (res.error) {
                showToast(res.error, 'error');
            }
        }

        async function viewDoc(fileName) {
            const url = await window.api.getDocumentUrl(fileName);
            if (!url) return showToast('File not found.', 'error');
            
            const isPdf = fileName.toLowerCase().endsWith('.pdf');
            const previewContent = document.getElementById('preview-content');
            
            if (isPdf) {
                previewContent.innerHTML = `<embed src="${url}#toolbar=0" type="application/pdf" class="w-full h-full rounded-2xl">`;
            } else {
                previewContent.innerHTML = `<img src="${url}" class="max-w-full max-h-full object-contain rounded-2xl shadow-2xl">`;
            }
            
            document.getElementById('preview-filename').textContent = fileName;
            openModal('preview-modal');
        }

        async function openInSystem() {
            const fileName = document.getElementById('preview-filename').textContent;
            await window.api.openDocument(fileName);
        }

        async function deleteDoc(id) {
            if (!confirm('Are you sure you want to delete this document?')) return;
            await window.api.deleteDocument(id);
            loadDocs();
        }

        function toggleAccordion(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById('icon-' + id);
            const isHidden = el.classList.contains('hidden');
            
            // Close all others
            document.querySelectorAll('[id^="exam-"]').forEach(e => e.classList.add('hidden'));
            document.querySelectorAll('[id^="icon-exam-"]').forEach(i => i.classList.remove('rotate-180'));

            if (isHidden) {
                el.classList.remove('hidden');
                icon.classList.add('rotate-180');
            }
        }

        load();
    </script>
    
    <!-- Upload Modal -->
    <div id="upload-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-sm">
            <h3 class="text-xl font-black text-slate-800 mb-6">Upload Document</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Document Title</label>
                    <input type="text" id="doc-title-input" class="premium-input bg-slate-50 w-full px-4 py-3 rounded-xl text-sm font-bold" placeholder="e.g., Birth Certificate">
                </div>
                <div class="flex gap-3">
                    <button onclick="executeUpload()" class="flex-1 bg-prime text-white py-3 rounded-xl font-black text-sm shadow-lg shadow-prime/20">Select File & Upload</button>
                    <button onclick="closeModal('upload-modal')" class="px-6 py-3 rounded-xl border-2 border-slate-100 text-slate-400 font-bold text-sm">Cancel</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Preview Modal -->
    <div id="preview-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-5xl h-[90vh] flex flex-col p-0 overflow-hidden bg-slate-900/90 backdrop-blur-xl border border-white/10">
            <div class="px-8 py-4 border-b border-white/10 flex items-center justify-between bg-white/5">
                <div>
                    <h3 class="text-sm font-black text-white uppercase tracking-wider">Document Preview</h3>
                    <p id="preview-filename" class="text-[10px] text-white/40 font-bold mt-0.5 truncate max-w-[300px]"></p>
                </div>
                <div class="flex gap-4">
                    <button onclick="openInSystem()" class="px-4 py-2 bg-white/10 hover:bg-white/20 text-white rounded-xl text-xs font-black transition-all border border-white/5">Open In System Viewer</button>
                    <button onclick="closeModal('preview-modal')" class="w-8 h-8 flex items-center justify-center rounded-full bg-rose-500/20 text-rose-500 hover:bg-rose-500 hover:text-white transition-all"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            <div id="preview-content" class="flex-1 overflow-auto p-8 flex items-center justify-center bg-transparent">
                <!-- Content injected here -->
            </div>
        </div>
    </div>
</body>
</html>
