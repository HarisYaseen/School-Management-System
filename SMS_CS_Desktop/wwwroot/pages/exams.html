<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Exams & Results</title>
    <script src="tailwind.js"></script>
    
    
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1600px] mx-auto space-y-8">
                
                <!-- Exams Header & List -->
                <div class="flex justify-between items-end">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800">Exams & DMCs</h2>
                        <p class="text-slate-400 font-bold uppercase tracking-widest text-xs mt-1">Academic Performance Management</p>
                    </div>
                    <button onclick="openExamModal()" class="bg-prime text-white px-8 py-4 rounded-2xl font-black text-sm flex items-center gap-3 hover:scale-[1.02] transition-all shadow-xl shadow-prime/20">
                        <i class="fa-solid fa-plus"></i> Create New Exam
                    </button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Left: Exam List -->
                    <div class="lg:col-span-1 space-y-4" id="exam-list"></div>

                    <!-- Right: Result Entry & Management -->
                    <div class="lg:col-span-2">
                        <div id="result-view" class="bg-white rounded-[2.5rem] shadow-sm border-2 border-prime/5 p-10 hidden relative overflow-hidden h-full min-h-[600px]">
                            <i class="fa-solid fa-graduation-cap absolute -right-20 -top-20 text-[15rem] text-prime/5 -rotate-12 pointer-events-none"></i>
                            
                            <div id="no-selection" class="flex flex-col items-center justify-center h-full text-center py-20">
                                <div class="w-24 h-24 rounded-3xl bg-slate-50 flex items-center justify-center text-slate-200 mb-6">
                                    <i class="fa-solid fa-file-signature text-4xl"></i>
                                </div>
                                <h3 class="text-xl font-black text-slate-800">Select an Exam</h3>
                                <p class="text-slate-400 text-sm max-w-[280px] mt-2 font-medium">Choose an exam from the left list to start entering marks or printing DMCs.</p>
                            </div>

                            <div id="active-exam-content" class="hidden space-y-8 relative z-10">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h3 class="text-2xl font-black text-slate-800" id="active-exam-name">Exam Name</h3>
                                        <p class="text-slate-400 font-bold uppercase tracking-wider text-[10px] mt-1" id="active-exam-date">Date</p>
                                    </div>
                                    <div class="flex gap-3">
                                        <select id="class-filter" onchange="loadResults()" class="premium-input bg-slate-50 px-6 py-3 rounded-xl text-xs font-black outline-none border-0">
                                            <option value="">— Select Class —</option>
                                        </select>
                                        <button onclick="loadFromSettings()" class="bg-prime text-white px-6 py-3 rounded-xl font-bold text-xs flex items-center gap-2 hover:bg-slate-700 transition-all shadow-lg shadow-prime/10">
                                            <i class="fa-solid fa-sync"></i> Auto-Load Subjects
                                        </button>
                                        <button id="print-all-dmcs-btn" onclick="printAllDMCs()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold text-xs flex items-center gap-2 hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-600/10 hidden">
                                            <i class="fa-solid fa-print"></i> Print All DMCs
                                        </button>
                                    </div>
                                </div>

                                <div id="results-table-container" class="hidden space-y-6">
                                    <div class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl hidden">
                                        <div class="flex gap-4" id="subject-tabs"></div>
                                    </div>

                                    <div class="overflow-x-auto rounded-2xl border border-slate-100">
                                        <table class="w-full">
                                            <thead class="bg-slate-50 border-b border-slate-100">
                                                <tr id="results-header-row">
                                                    <!-- Dynamic headers will be injected here -->
                                                </tr>
                                            </thead>
                                            <tbody id="results-body" class="divide-y divide-slate-50"></tbody>
                                        </table>
                                    </div>
                                    <div class="flex justify-end">
                                        <button onclick="saveAllMarks()" class="bg-emerald-500 text-white px-10 py-4 rounded-2xl font-black text-sm hover:bg-emerald-600 transition-all shadow-xl shadow-emerald-500/10">
                                            <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save All Changes
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Create Exam Modal -->
    <div id="exam-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-sm">
            <h3 class="text-xl font-black text-slate-800 mb-6">New Exam</h3>
            <form onsubmit="saveExam(event)" class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Exam Title *</label>
                    <input type="text" id="e-name" class="premium-input w-full px-4 py-3 rounded-xl text-sm font-bold" placeholder="e.g. 1st Term Exam 2024" required>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Date</label>
                    <input type="date" id="e-date" class="premium-input w-full px-4 py-3 rounded-xl text-sm font-bold">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-1 bg-prime text-white py-4 rounded-xl font-black text-xs shadow-lg">Create Exam</button>
                    <button type="button" onclick="closeExamModal()" class="px-6 py-4 rounded-xl border border-slate-200 text-slate-400 font-bold text-xs">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Subject Modal -->
    <div id="subject-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-sm">
            <h3 class="text-xl font-black text-slate-800 mb-6">Add Subject</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Subject Name *</label>
                    <input type="text" id="s-name" class="premium-input w-full px-4 py-3 rounded-xl text-sm font-bold" placeholder="e.g. Mathematics" required>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Total Marks *</label>
                    <input type="number" id="s-total" class="premium-input w-full px-4 py-3 rounded-xl text-sm font-bold" value="100" required>
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="addSubjectToClass()" class="flex-1 bg-indigo-500 text-white py-4 rounded-xl font-black text-xs shadow-lg">Add to Class</button>
                    <button type="button" onclick="document.getElementById('subject-modal').classList.add('hidden')" class="px-6 py-4 rounded-xl border border-slate-200 text-slate-400 font-bold text-xs">Cancel</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Enter Student Marks Modal -->
    <div id="student-marks-modal" class="modal-overlay hidden">
        <div class="modal-box max-w-md">
            <h3 class="text-xl font-black text-slate-800" id="modal-student-name">Muhammad Masharib Hadi</h3>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 mb-6" id="modal-student-roll">Roll #01</p>
            
            <div id="modal-subjects-container" class="space-y-4 max-h-[350px] overflow-y-auto pr-2">
                <!-- Subject input fields will be loaded dynamically here -->
            </div>
            
            <div class="flex gap-3 pt-6 border-t border-slate-100 mt-6">
                <button onclick="saveStudentMarksFromModal(false)" class="flex-1 bg-prime text-white py-4 rounded-xl font-black text-xs shadow-lg shadow-prime/20 hover:bg-prime-dark transition-all">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save Marks
                </button>
                <button onclick="saveStudentMarksFromModal(true)" class="flex-1 bg-emerald-500 text-white py-4 rounded-xl font-black text-xs shadow-lg shadow-emerald-500/20 hover:bg-emerald-600 transition-all">
                    <i class="fa-solid fa-chevron-right mr-2"></i> Save & Next
                </button>
                <button type="button" onclick="closeStudentMarksModal()" class="px-6 py-4 rounded-xl border border-slate-200 text-slate-400 font-bold text-xs hover:bg-slate-50 transition-all">Cancel</button>
            </div>
        </div>
    </div>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('exams');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Exams & DMCs');

        let allExams = [], selectedExamId = null, activeClassId = null, activeSubject = null, activeClassSubjects = [], studentsList = [];

        async function init() {
            const [exams, classes] = await Promise.all([
                window.api.getExams(),
                window.api.getClasses()
            ]);
            allExams = exams;
            renderExamList();
            
            const classSelect = document.getElementById('class-filter');
            classSelect.innerHTML = '<option value="">— Select Class —</option>' + 
                classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            
            // Check URL for specific exam
            const params = new URLSearchParams(window.location.search);
            if (params.get('id')) selectExam(params.get('id'));
        }

        function renderExamList() {
            const container = document.getElementById('exam-list');
            if (!allExams.length) {
                container.innerHTML = '<div class="bg-white p-10 rounded-[2rem] text-center border-2 border-dashed border-slate-200 text-slate-300 font-bold uppercase text-xs tracking-widest">No Exams Found</div>';
                return;
            }
            container.innerHTML = allExams.map(e => `
                <div onclick="selectExam(${e.id})" class="group bg-white p-6 rounded-3xl border-2 ${selectedExamId == e.id ? 'border-prime shadow-xl scale-[1.02]' : 'border-slate-200 shadow-sm'} hover:border-prime/40 hover:shadow-md transition-all cursor-pointer flex justify-between items-center relative overflow-hidden">
                    <div class="relative z-10">
                        <h4 class="font-black text-slate-800 text-lg">${e.name}</h4>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">${e.date || 'TBA'}</p>
                    </div>
                    <div class="flex gap-2 relative z-10">
                        <button onclick="event.stopPropagation(); deleteExam(${e.id})" class="w-10 h-10 rounded-xl bg-rose-50 text-rose-400 opacity-0 group-hover:opacity-100 transition-all hover:bg-rose-500 hover:text-white flex items-center justify-center">
                            <i class="fa-solid fa-trash text-xs"></i>
                        </button>
                        <i class="fa-solid fa-chevron-right text-prime/20 group-hover:text-prime transition-colors flex items-center"></i>
                    </div>
                    ${selectedExamId == e.id ? `<div class="absolute right-0 top-0 bottom-0 w-2 bg-prime"></div>` : ''}
                </div>
            `).join('');
        }

        function selectExam(id) {
            selectedExamId = id;
            const exam = allExams.find(e => e.id == id);
            renderExamList();
            
            document.getElementById('no-selection').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            document.getElementById('active-exam-content').classList.remove('hidden');
            
            document.getElementById('active-exam-name').textContent = exam.name;
            document.getElementById('active-exam-date').textContent = exam.date || 'No date set';
            
            loadResults();
        }

        async function loadResults() {
            activeClassId = document.getElementById('class-filter').value;
            if (!activeClassId || !selectedExamId) {
                document.getElementById('results-table-container').classList.add('hidden');
                document.getElementById('print-all-dmcs-btn')?.classList.add('hidden');
                return;
            }

            const raw = await window.api.getStudents();
            const allStudents = raw.filter(s => s.status !== 'deleted');
            const subjects = await window.api.getExamSubjects({ examId: selectedExamId, classId: activeClassId });
            activeClassSubjects = subjects;
            renderSubjectTabs(subjects);

            if (subjects.length > 0) {
                const results = await window.api.getExamResults({ examId: selectedExamId, classId: activeClassId });
                renderResultsTable(results);
                document.getElementById('results-table-container').classList.remove('hidden');
                document.getElementById('print-all-dmcs-btn')?.classList.remove('hidden');
            } else {
                document.getElementById('results-body').innerHTML = '<tr><td colspan="4" class="py-20 text-center text-slate-300 font-bold uppercase text-xs tracking-widest">No subjects added for this class. Click "Add Subject" to begin.</td></tr>';
                document.getElementById('results-table-container').classList.remove('hidden');
                document.getElementById('subject-tabs').innerHTML = '';
                document.getElementById('print-all-dmcs-btn')?.classList.add('hidden');
            }
        }

        function renderSubjectTabs(subjects) {
            const container = document.getElementById('subject-tabs');
            if (!subjects.length) { container.innerHTML = ''; return; }
            
            container.innerHTML = subjects.map(s => `
                <div class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider bg-white text-slate-600 border border-slate-100 flex items-center gap-3 shadow-sm">
                    ${s.subject_name}
                    <i onclick="event.stopPropagation(); removeSubject('${s.subject_name}')" class="fa-solid fa-times-circle hover:text-rose-400 transition-colors cursor-pointer text-slate-300"></i>
                </div>
            `).join('');
        }

        function setActiveSubject(name) {
            activeSubject = name;
            loadResults();
        }

        function renderResultsTable(results) {
            // Group results by student to handle multiple subjects
            const studentsMap = {};
            results.forEach(r => {
                if (!studentsMap[r.student_id]) {
                    studentsMap[r.student_id] = { 
                        id: r.student_id,
                        name: r.student_name, 
                        roll: r.roll_no, 
                        marks: {}, // key: subject_name, value: obtained_marks
                        totalObtained: 0,
                        hasAnyMarks: false
                    };
                }
                
                // Track obtained mark for each subject
                if (r.obtained_marks !== '' && r.obtained_marks !== null && r.obtained_marks !== undefined) {
                    studentsMap[r.student_id].marks[r.subject_name] = parseFloat(r.obtained_marks);
                    studentsMap[r.student_id].totalObtained += parseFloat(r.obtained_marks);
                    studentsMap[r.student_id].hasAnyMarks = true;
                } else {
                    studentsMap[r.student_id].marks[r.subject_name] = null;
                }
            });

            // Convert to array and save globally
            studentsList = Object.values(studentsMap);

            // Calculate overall ranks based on GRAND TOTAL of all subjects combined!
            const marksGroups = {};
            studentsList.forEach(s => {
                if (s.hasAnyMarks) {
                    const total = s.totalObtained;
                    if (!marksGroups[total]) marksGroups[total] = [];
                    marksGroups[total].push(s);
                }
            });

            const sortedTotals = Object.keys(marksGroups).map(Number).sort((a, b) => b - a);

            const studentRanks = {};
            let rank = 1;
            sortedTotals.forEach(total => {
                marksGroups[total].forEach(s => {
                    studentRanks[s.id] = rank;
                });
                rank += marksGroups[total].length;
            });

            // Dynamically inject a super clean header
            const headerRow = document.getElementById('results-header-row');
            headerRow.innerHTML = `
                <th class="text-left px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest w-20">Roll #</th>
                <th class="text-left px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest">Student Name</th>
                <th class="text-left px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest w-32">Grand Total</th>
                <th class="text-right px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest w-36">Actions</th>
            `;

            const body = document.getElementById('results-body');
            body.innerHTML = studentsList.map(s => {
                const pos = studentRanks[s.id];
                let badge = '';
                if (pos === 1) {
                    badge = `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[9px] font-black uppercase tracking-wider bg-amber-50 text-amber-700 border border-amber-200 shadow-sm"><i class="fa-solid fa-trophy text-amber-500"></i> 1st Position</span>`;
                } else if (pos === 2) {
                    badge = `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[9px] font-black uppercase tracking-wider bg-slate-50 text-slate-600 border border-slate-200 shadow-sm"><i class="fa-solid fa-medal text-slate-400"></i> 2nd Position</span>`;
                } else if (pos === 3) {
                    badge = `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[9px] font-black uppercase tracking-wider bg-orange-50/60 text-orange-700 border border-orange-200/60 shadow-sm"><i class="fa-solid fa-award text-orange-500"></i> 3rd Position</span>`;
                }

                return `
                <tr onclick="openStudentMarksModal(${s.id})" class="hover:bg-slate-50/50 transition-colors group cursor-pointer border-b border-slate-100/50">
                    <td class="px-4 py-4 text-sm font-bold text-slate-400">${s.roll}</td>
                    <td class="px-4 py-4">
                        <div class="flex items-center justify-between gap-4">
                            <div class="font-black text-slate-700 leading-tight text-xs">${s.name}</div>
                            <div class="flex-shrink-0">${badge}</div>
                        </div>
                    </td>
                    <td class="px-4 py-4 text-sm font-extrabold text-slate-600">
                        ${s.totalObtained.toFixed(1)}
                    </td>
                    <td class="px-4 py-4 text-right" onclick="event.stopPropagation()">
                        <div class="flex gap-2 justify-end">
                            <button onclick="openStudentMarksModal(${s.id})" class="w-8 h-8 rounded-lg bg-indigo-50 text-prime hover:bg-prime hover:text-white transition-all flex items-center justify-center shadow-sm">
                                <i class="fa-solid fa-pen-to-square text-xs"></i>
                            </button>
                            <button onclick="printDMC(${s.id})" class="w-8 h-8 rounded-lg bg-slate-50 text-slate-400 hover:bg-slate-500 hover:text-white transition-all flex items-center justify-center shadow-sm">
                                <i class="fa-solid fa-print text-xs"></i>
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        let activeModalStudentId = null;

        async function openStudentMarksModal(studentId) {
            activeModalStudentId = studentId;
            const student = studentsList.find(s => s.id == studentId);
            if (!student) return;

            document.getElementById('modal-student-name').textContent = student.name;
            document.getElementById('modal-student-roll').textContent = `Roll # ${student.roll}`;

            const container = document.getElementById('modal-subjects-container');
            container.innerHTML = activeClassSubjects.map((sub, idx) => {
                const mark = student.marks[sub.subject_name];
                return `
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100/50 flex justify-between items-center gap-4">
                    <div>
                        <div class="font-black text-slate-800 text-xs uppercase tracking-wider">${sub.subject_name}</div>
                        <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Total Marks: ${sub.total_marks}</div>
                    </div>
                    <input type="number" step="0.1" 
                        class="modal-mark-input premium-input bg-white w-32 px-4 py-3 rounded-xl text-sm font-black border border-slate-200 transition-all focus:border-prime focus:ring-4 focus:ring-prime/5 text-right"
                        data-subject="${sub.subject_name}"
                        data-total="${sub.total_marks}"
                        value="${mark !== null && mark !== undefined ? mark : ''}"
                        placeholder="Enter marks"
                        onkeydown="handleModalInputKey(event, this, ${idx})">
                </div>`;
            }).join('');

            document.getElementById('student-marks-modal').classList.remove('hidden');

            // Auto focus the first input inside the modal
            setTimeout(() => {
                const firstInput = container.querySelector('.modal-mark-input');
                if (firstInput) {
                    firstInput.focus();
                    firstInput.select();
                }
            }, 150);
        }

        function handleModalInputKey(event, input, idx) {
            const inputs = Array.from(document.querySelectorAll('.modal-mark-input'));
            if (event.key === 'Enter') {
                event.preventDefault();
                if (idx < inputs.length - 1) {
                    inputs[idx + 1].focus();
                    inputs[idx + 1].select();
                } else {
                    // Last subject! Save marks!
                    saveStudentMarksFromModal(false);
                }
            } else if (event.key === 'ArrowDown') {
                event.preventDefault();
                if (idx < inputs.length - 1) {
                    inputs[idx + 1].focus();
                    inputs[idx + 1].select();
                }
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                if (idx > 0) {
                    inputs[idx - 1].focus();
                    inputs[idx - 1].select();
                }
            }
        }

        async function saveStudentMarksFromModal(nextStudent = false) {
            if (!activeModalStudentId) return;
            const container = document.getElementById('modal-subjects-container');
            const inputs = Array.from(container.querySelectorAll('.modal-mark-input'));

            const promises = [];
            inputs.forEach(input => {
                const subjectName = input.dataset.subject;
                const totalMarks = parseFloat(input.dataset.total) || 100;
                const val = input.value;

                promises.push(window.api.saveExamResult({
                    exam_id: selectedExamId,
                    student_id: activeModalStudentId,
                    subject_name: subjectName,
                    total_marks: totalMarks,
                    obtained_marks: val !== '' ? parseFloat(val) : null
                }));
            });

            try {
                await Promise.all(promises);
                showToast('Marks saved successfully!', 'success');

                // Reload the results table to update ranks & totals
                await loadResults();

                if (nextStudent) {
                    // Find the next student in the list
                    const currentIdx = studentsList.findIndex(s => s.id == activeModalStudentId);
                    if (currentIdx !== -1 && currentIdx < studentsList.length - 1) {
                        const nextId = studentsList[currentIdx + 1].id;
                        openStudentMarksModal(nextId);
                    } else {
                        closeStudentMarksModal();
                        showToast('All student marks completed!', 'success');
                    }
                } else {
                    closeStudentMarksModal();
                }
            } catch (err) {
                showToast('Error saving marks', 'error');
            }
        }

        function closeStudentMarksModal() {
            document.getElementById('student-marks-modal').classList.add('hidden');
            activeModalStudentId = null;
        }

        async function addSubjectToClass() {
            const name = document.getElementById('s-name').value;
            const total = document.getElementById('s-total').value;
            if (!name || !total) return;

            // Fetch students of this class
            const students = await window.api.getExamResults({ examId: selectedExamId, classId: activeClassId });
            
            // Map students to results creation (if they don't exist, saveExamResult handles it)
            const promises = students.map(s => window.api.saveExamResult({
                exam_id: selectedExamId,
                student_id: s.student_id,
                subject_name: name,
                total_marks: total,
                obtained_marks: 0
            }));

            await Promise.all(promises);
            document.getElementById('subject-modal').classList.add('hidden');
            activeSubject = name;
            showToast(`Subject "${name}" added to all students`);
            loadResults();
        }

        async function loadFromSettings() {
            if (!activeClassId) return showToast('Please select a class first', 'error');
            const subjects = await window.api.getSubjects(activeClassId);
            if (!subjects.length) return showToast('No subjects defined for this class in Settings', 'error');

            const results = await window.api.getExamResults({ examId: selectedExamId, classId: activeClassId });
            const students = [...new Set(results.map(r => r.student_id))];

            if (!students.length) return showToast('No students found in this class', 'error');

            showToast('Loading class subjects...');
            const promises = [];
            for (const sub of subjects) {
                for (const sid of students) {
                    promises.push(window.api.saveExamResult({
                        exam_id: selectedExamId,
                        student_id: sid,

        function numberToWords(num) {
            const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];
            const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
            
            if (num === 0) return 'Zero';
            
            function convertLessThanOneThousand(n) {
                if (n < 20) return ones[n];
                const digit = n % 10;
                if (n < 100) return tens[Math.floor(n / 10)] + (digit ? '-' + ones[digit] : '');
                return ones[Math.floor(n / 100)] + ' Hundred' + (n % 100 === 0 ? '' : ' and ' + convertLessThanOneThousand(n % 100));
            }
            
            let val = Math.floor(num);
            let decimalPart = Math.round((num - val) * 100);
            
            let words = convertLessThanOneThousand(val);
            if (decimalPart > 0) {
                words += ' Point ' + convertLessThanOneThousand(decimalPart);
            }
            return words + ' Only';
        }
