<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Connect - Digital Daily Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <script>tailwind.config = { theme: { extend: { colors: { prime: '#1e293b' }, fontFamily: { outfit: ['Outfit','sans-serif'] } } } }</script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased h-screen flex overflow-hidden font-outfit">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div id="topbar-container"></div>
        <div class="flex-1 overflow-auto bg-[#F8FAFC] p-10">
            <div class="max-w-[1200px] mx-auto">
                <div class="grid grid-cols-12 gap-8">
                    <!-- Left: Entry Panel -->
                    <div class="col-span-12 lg:col-span-4 space-y-6">
                        <div class="bg-white rounded-[3rem] p-8 shadow-sm border-2 border-prime/5">
                            <h3 class="text-xl font-black text-slate-800 mb-8 flex items-center gap-3">
                                <i class="fa-solid fa-pen-nib text-prime"></i> New Diary Entry
                            </h3>
                            <div class="space-y-5">
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Select Class</label>
                                    <select id="d-class" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold appearance-none">
                                        <!-- Classes injected -->
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Subject</label>
                                    <input type="text" id="d-subject" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold" placeholder="e.g., Mathematics">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Entry Date</label>
                                    <input type="date" id="d-date" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Homework / Activity Details</label>
                                    <textarea id="d-content" class="premium-input bg-slate-50 w-full px-5 py-4 rounded-2xl text-sm font-bold h-32" placeholder="Write homework details..."></textarea>
                                </div>
                                <button onclick="saveDiary()" class="w-full bg-prime text-white py-5 rounded-2xl font-black text-sm hover:bg-slate-700 transition-all shadow-xl shadow-prime/20 mt-4">Save Entry</button>
                            </div>
                        </div>
                    </div>

                    <!-- Right: History Feed -->
                    <div class="col-span-12 lg:col-span-8 space-y-6">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-xl font-black text-slate-800">Recent Diary Entries</h3>
                            <div class="flex gap-2">
                                <button onclick="filterDiary('all')" class="bg-white px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-slate-100 hover:border-prime transition-all">All</button>
                                <button onclick="filterDiary('today')" class="bg-white px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-slate-100 hover:border-prime transition-all">Today</button>
                            </div>
                        </div>
                        <div class="space-y-4" id="diary-feed">
                            <!-- Diary items -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="layout.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = buildSidebar('diary');
        document.getElementById('topbar-container').innerHTML = buildTopbar('Digital Daily Diary');

        async function load() {
            const classes = await window.api.getClasses();
            document.getElementById('d-class').innerHTML = classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            document.getElementById('d-date').value = new Date().toISOString().split('T')[0];
            
            loadFeed();
        }

        async function loadFeed() {
            const diary = await window.api.getDiaryEntries();
            const feed = document.getElementById('diary-feed');
            
            feed.innerHTML = diary.map(e => `
                <div class="bg-white rounded-[2.5rem] p-8 border-2 border-prime/5 shadow-sm hover:shadow-md transition-all relative overflow-hidden group">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="flex items-center gap-3 mb-2">
                                <span class="bg-prime text-white text-[9px] font-black uppercase px-3 py-1 rounded-full tracking-wider">${e.class_name}</span>
                                <span class="text-slate-400 text-[10px] font-bold">${formatDate(e.entry_date)}</span>
                            </div>
                            <h4 class="text-lg font-black text-slate-800 tracking-tight">${e.subject}</h4>
                        </div>
                        <button onclick="deleteDiary(${e.id})" class="text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                    <p class="text-sm text-slate-600 leading-relaxed font-medium bg-slate-50 p-6 rounded-2xl border border-slate-100">${e.content}</p>
                </div>
            `).join('') || '<div class="text-center py-20 text-slate-300 font-bold">No diary entries found.</div>';
        }

        async function saveDiary() {
            const data = {
                class_id: document.getElementById('d-class').value,
                subject: document.getElementById('d-subject').value,
                entry_date: document.getElementById('d-date').value,
                content: document.getElementById('d-content').value
            };

            if (!data.subject || !data.content) return showToast('Subject and content are required.', 'error');

            const res = await window.api.createDiaryEntry(data);
            if (res.success) {
                showToast('Diary entry saved!');
                document.getElementById('d-subject').value = '';
                document.getElementById('d-content').value = '';
                loadFeed();
            }
        }

        async function deleteDiary(id) {
            if (!confirm('Delete this entry?')) return;
            await window.api.deleteDiaryEntry(id);
            loadFeed();
        }

        load();
    </script>
</body>
</html>
